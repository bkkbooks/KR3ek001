body:
  text: 卷三項部證治計五證筋脈頸項俗名脖項之前有缺盆缺盆之中即任脈之天突穴為頸前居中第一行脈缺盆之上有人迎穴喉間開一寸五分屬胃為頸前第二行脈人迎後一寸五分名扶突穴屬大腸即頸前第三行脈扶突後名天窗穴屬小腸即頸中第四行脈天窗後為膽脈頸中無穴乃第五行脈膽脈後名天牖穴屬三焦即頸中第六行脈天牖後天柱穴屬膀胱即頸中第七行脈天柱後居頸之中央者督脈也名天府自前中一行至此為第八行脈缺盆缺盆穴在橫骨上左右各一為一十二經之道路手陽明大腸手太陽小腸足陽明胃足少陽膽手少陽三焦脈俱入缺盆手太陰肺足陽明胃足少陽膽足太陽膀胱俱結缺盆癰疽就簡天柱疽生項後高骨即大椎骨也患形初起如臥蠶極癢魚尾毒生項後髮際下兩旁骨俗名燕尾即偏腦疽之小證也左右同百脈疽初發漫腫大小數塊環繞頸項其色紅紫痛熱不食氣逆咳嗽結喉癰生項前結喉之上又名猛疽以其毒氣猛烈也夾喉癰生結喉之兩旁俱按陽癰陰疽則例治法腦後發俗名對口生項後入髮際正中因與口對故俗名對口患偏兩旁則名偏對口治當辨其紅白色紅者用五通丸醒消丸敗毒散潰後托毒散醒消丸色白者用陽和湯十全大補湯如口乾作渴飲水不歇小便頻數或淋瀝作痛舌上燥黃如雞內金者乃腎水枯竭心火上炎此證最惡急用加減八味丸以滋補之否則不救余按癰疽治法五通丸通用五十醒消丸通用四十七敗毒湯通用三內托散通用三十八陽和湯通用五十全大補湯通用二十六加減八味丸通用四十六失榮生於肩之上耳之前後初起腫核皮色如常日漸長大堅硬如石推之不移按之不痛半載一年方作陰痛由憂思恚怒痰氣凝結而成初宜服紫元丹消之每隔兩日進一服所隔之兩日以陽和湯犀黃丸早晚輪服外敷抑陰散如潰貼陽和解凝膏內亦以陽和湯犀黃丸輪服日日不間可冀收功若經久潰氣血衰弱形體瘦削破爛紫斑滲流血水或腫泛如蓮穢氣燻人愈久愈大越潰越堅者俱屬敗證不治紫元丹通用五十一陽和湯通用五犀黃丸通用四十八陽和解凝膏通用七十七抑陰散通用五十八瘰癧小者為瘰大者為癧生於項間初起一小核在皮裡膜外不覺疼痛皮色不異漸大如桃李旁增不一諸書辨其名類云形軟遇怒即腫盛者名氣癧堅硬筋縮者名筋癧形如蛤蜊堅硬作痛作腫者名馬刀瘰癧一包而生數十枚者名蓮子癧繞項而生者名蛇盤癧其形大小不一連接數枚者名子母癧如黃豆結莢一般者名鎖項癧形小多癢者名風癧生項間延至胸腋者名瓜藤癧一枚上堆纍三五枚盤疊成攢者名重臺瘰癧生如鼠形名鼠癧又名鼠瘡纍纍如串俗名老鼠串要皆屬肝腎虛損氣結痰凝而成初起用子龍丸每服三分淡薑湯下日三次外敷烏骨膏小孩不能服丸者用小金丹日日敷之至愈乃止數年忌食香橙食則復發一內潰爛或成膿未潰者或兼有未盡成膿者則用犀黃丸止其已潰之痛松其成膿未潰之脹消其未盡成膿之核其已成膿者用咬頭膏穿之兼服溫補祛痰活血壯氣之劑如陽和湯加味二陳湯加味保元湯四物養榮湯皆可隨宜選用外貼陽和解凝膏一潰爛延至肩胸脅下不堪之極四五年不能愈者用洞天救苦丹三服犀黃丸六服按潰爛不斂規法服之外用荊芥根下一段剪碎煎湯溫洗良久敷雄樟散待幾日後皮色變白孔內紅活接服大棗丸肌肉漸長用生肌藥收功一有爛至咽喉飲熱湯外覺熱痛者乃危險之極稍遲則爛穿咽喉不救急取硬柴心一根量本人中指量其三指共積一薪隨其長短男左女右就手之左右即在手下之腳骨正中骨頂之處定準一直量上盡頭以墨記取艾團連灸三壯膏藥掩之可保咽喉不穿然後按前治法一凡潰後瘡中或有紫塊切不可妄用針刺當聽其自化雄樟散雄黃樟腦等分上研粉麻油調頻掃患上灸瘰癧祕法存驗取肩尖肘尖骨縫交接處各有一穴即手陽明經肩顒曲池二穴也當以指甲掐之覺有痠麻方是各灸七壯在左灸左在右灸右左右俱病者俱灸之按景嶽云嘗用此法甚效又瘰癧不論已成未成已潰未潰俱宜灸之以手仰置肩上微舉起則肘骨尖自見即是灸處以三四十壯為度如患三四年不愈者辰時灸至申時三次灸即愈更服溫補之劑按此法乃單灸曲池以多為貴也然但用前法則已妙矣倘有不應者又當以此法治之子龍丸通用五十六小金丹通用五十二犀黃丸通用四十八陽和湯通用五加味二陳湯通用十八加味保元湯通用二十九四物養榮湯通用二十七洞天救苦丹通用五十三烏龍膏通用六十陽和解凝膏通用七十七大棗丸通用五十五咬頭膏通用六十一瘰癧多由風熱毒邪與血氣相搏鬱結成核如貫珠於耳項之間腫硬白色搖奪不動而有根者便是瘰癧用藥多有不效最宜於用燈火至易至妙燈火燋法如癧在左則燋左邊癧在右則燋右邊前至頸上耳腳下起離六分地一點一點直下乳次過脅上至肺俞穴頸上耳後正在瘰上周圍一燋第二次照原路空處補之便愈若只有核而搖動者不是瘰癧初起紅腫便是癰疽不可作瘰癧治陳士鐸先生治瘰癧方名消串丹白芍一兩白朮一兩柴胡二錢天花粉三錢茯苓五錢陳皮一錢附子一片甘草一錢蒲公英三錢五分紫背天葵五錢上藥煎連服八劑將藥減半再服十劑而瘰癧盡化再服一月全愈接服六君子湯以為善後之計斷不再發此方妙在蒲公英與紫背天葵為消串之神藥然非佐之以白芍柴胡則肝木不平非輔之以白朮茯苓則脾土不健何以勝攻痰破塊之烈哉又得附子之力以引群藥直搗中堅所以能起沉疴於旦夕耳又云人有久生瘰癧兩頸之間盡多潰爛胸膈之上無非痰塊已有破頭欲腐者遂至身體寒熱肌肉消瘦飲食少思盜汗自汗驚悸慌惚此等證原系難治然治之有法尚可救也大約瘰癧初起以解鬱為先而佐以補虛以消其毒倘執尋常法祛痰敗毒為事鮮不速斃者方用轉敗散轉敗散人參二兩柴胡二錢白芍三錢銀花三兩當歸二兩半夏五錢白朮一兩生甘草三錢水煎服四劑胸間之痰塊盡消再服四劑頸上潰爛亦愈將前方減半再服十劑瘡口悉平再不發也內消瘰癧應驗方土貝母白芷各五錢共為細末糖霜調陳酒下三錢重者三服愈又方用鼠矢兩頭尖者為雄圓者為雌揀開各曬乾研末男用雌女用雄將雞子一個頂上打一小洞傾去白但存黃入鼠矢在內以滿為度攪勻用皮紙封固洞口飯上蒸熟去殼臨臥時搓碎火酒送下隔一日再服雖遠年破爛者不過三四次即愈末破者即消鈕扣風生於頸下天突穴之間由汗出之後邪風襲於皮腠起如粟米搔癢無度抓破津水誤用水洗浸淫成片輕者用芥菜花一味細末醋調敷之最妙或樟硫散熟豬脂調搽亦妙甚者須兼服消風散消風散荊芥防風蒼朮當歸薄荷蟬蛻石膏木通牛蒡子各一錢五分生地三錢甘草七分水煎食遠服樟硫散硫黃一錢樟腦川椒紅生白礬各二錢研末用白羅卜一個掏空將藥填滿以羅卜蓋之紙包三四層灰火內煨半時許俟冷取出同熟豬油調稠搽患上項強俗名落枕頸項強急轉移不便乃膀胱經感風寒濕氣所致或閃促亦令項強用硼砂研細以骨簪蘸津挑硼砂點兩目內淚出稍松連點三次立時即愈胸部證治計四證筋脈胸結喉下曰缺盆缺盆下曰胸在膺之下胸下曰𩩲骭乃蔽心之骨心位在此手太陰肺脈布胸中筋結胸中手少陰心筋結胸中足太陰脾筋脈皆散胸中足厥陰肝脈上胸中足少陽膽脈下胸中足少陰腎脈入肺注胸中手厥陰胞絡脈起胸中筋散胸中膺胸上兩旁高處曰膺足陽明胃脈到膺足少陽膽經系膺癰疽就簡甘疽生胸堂兩旁肉高處膻中疽生胸窩之上兩乳中央膻中穴脾發疽生心窩下兩旁左右同蜂窩疽生胸側乳房之上形如蜂窩蠹疽生胸之上項之下鎖子骨內軟陷中又名鎖骨疽𤷍癧發生乳旁以上六證患盤不大俱按陽癰陰疽則例治法井泉疽一名慢心鋭毒生於心胸屬任脈中庭穴初起心口內似有物塊漸大心窩發高殆至毒陷即死此危險之證醫皆縮手治宜用灸法以本人兩手十指用線量其長短共積於線在喉管正中處雙環至背脊之中看兩線頭盡處則為中穴又以本人中指之中一節用柴心量准作一寸在中穴之左右各開若許皆以墨記分立三穴如圖每穴用艾三大壯一齊灸之灸畢全愈一起如豆粒腫痛燥熱者名穿心疔宜時服護心散以防毒陷按陽癰則例同疔瘡門參治護心散通用四十一心漏胸前潰竅血液常流日久年深諸治罔效者鹿茸補漏丸主之人有胸間生瘡不慎酒色遂成漏竅常流血液久則神形困備腰痛難伸傴僂人以為心漏也孰知是腎衰而成漏乎方用溫腎丹鹿茸補漏丸鹿茸酥炙附子炮等分鹽花減半上棗肉搗為丸緑豆大每酒吞三十丸溫腎丹鹿茸二枚附子二個青鹽少許人參二兩蔥二枝紅棗四兩上為細末紅棗煮熟搗為丸每空心酒下三十丸服半月而腰痛減服月餘而心漏愈龜胸一名雞胸生於胸中因陽虛痰凝氣結胸膛突起如雞胸狀堅塌不痛不醫遂成終身殘疾初起可治年久難治從生下得之可治從胎中帶者難治治之之法先用六君子湯數劑調其脾胃然後以紫元丹每隔兩日進一服所隔之兩日以小金丹陽和湯或陽和丸合加味二陳湯煎早晚輪服輕者半月重者一月即愈如患經潰不救由感風熱凝注為痰停滯心胸咳嗽喘促肺氣脹滿攻於胸膈漸成龜胸或乳母過食辛辣夏哺熱乳亦成此證治宜寬氣化痰丸寬氣化痰丸大黃三分杏仁百合木通桑皮甜葶藶天冬石膏各五錢上為細末蜜丸黍米大食後臨臥白熟水送下六君子湯通用二十一紫元丹通用五十一陽和湯通用五陽和丸通用六加味二陳湯通用十八龜背由客風吹背傳入於髓故背突如龜或咳嗽久以致肺虛腎無所生腎主骨風寒乘虛而入於筋骨致精血不能流通故骨弓而駝治以松蕊丹松蕊丹松花枳殼防風獨活各一兩麻黃前胡大黃桂心各五錢上為末蜜丸黍米大每服二十丸粥飲下外以龜尿滴脊背中縫即愈按龜胸龜背乃先天大虛不足之敗證百中難救一二豈寬中化痰松蕊丹遂可治乎姑附之乳部證治計五證筋脈乳房屬足陽明胃經乳頭屬足厥陰肝經乳癰乳房內結一塊紅腫熱痛大則言癰小則言癤由忿怒鬱結或多食厚味致厥陰之氣不行竅不通陽明之血壅怫於內故也初起用開結散五錢陳酒送服一服即愈如潰用醒消丸一服酒送以止其痛外貼洞天膏如潰久或老年人氣血衰傷膿出反痛惡寒發熱者須用八珍湯補之自愈開結散香白芷炒制乳香制沒藥浙貝母當歸等分上為末每服五錢熱陳酒調服專治乳癰乳癤一服即消又方存驗紫河車草貝母各三錢上為末黃糖拌陳酒沖服醉蓋取汗醒消丸通用四十七洞天膏通用七十六八珍湯通用二十五乳疽乳房結腫一塊皮色不異堅硬木痛治法同流注倘遇潰爛之甚者按潰爛不斂治法七日後接服大棗丸日服收功大棗丸通用五十五吹乳吹乳者所乳之子口氣焮熱含乳而睡熱氣鼻風吹入乳孔氣逆乳凝遂致結腫於初起時急煎蔥湯避風熏浴忍痛輕揉令稍軟任孩吮令乳透自可消散否則成癰癤則按前乳癰治法乳岩乳岩者於乳房結成隱核大如棋子不痛不癢肉色不變多由憂鬱患難驚恐日夕積纍肝氣橫逆脾氣消沮而然積二三年後方成瘡陷以其形嵌凹似巖穴之狀故名岩至此則不可救矣須於初起時用犀黃丸每服三錢酒送下十服即愈或用陽和湯加土貝母五錢煎服數劑即可消散如誤服寒劑誤貼膏藥定致日漸腫大內作一抽之痛已覺遲治再若皮色變紫難以挽回勉以陽和湯日服或犀黃丸日服或二藥早晚兼服服至自潰而痛則外用大蟾六隻每日早晚取蟾破腹連雜將蟾身刺數十孔貼於患口連貼三日內服千金托毒散三日後接服犀黃丸十全大補湯可救十中三四如潰後不痛而癢極者無一毫挽回大忌開刀開刀則翻花萬無一活男女皆然犀黃丸通用四十八陽和湯通用五千金托毒散通用三十八十全大補湯通用二十六乳懸此乃怪證也亦偶有之産後兩乳伸長形如雞腸垂過小腹痛難刻忍急用芎歸各一斤先各取四兩切片水煎頻服以所餘斤半切大塊産婦面前置桌桌下放火爐將芎歸入爐慢火燒令婦伏於桌上口鼻吸烟如藥盡未痊再如前法煎服熏吸便可縮上倘不能復舊即取萆麻子粒冷水磨塗頭頂其腸即縮即時洗去乃愈但日後再産復發萬無救矣按乳懸其痛難忍原系怪證至危之病也是胃虛血燥而致用解懸湯時服救之外用芎歸各一斤切大塊産婦面前熏吸有人左乳內忽大如桃不覺痛癢色亦不赤身體發熱形漸瘦損此肝木不舒痰氣鬱結用加味消遙散服十劑愈解懸湯人參二兩當歸身四兩川芎二兩荊芥三錢益母草一兩三錢麥冬一兩炮姜一錢水煎連服四劑而乳頭收再四劑全愈加味消遙散柴胡二錢白芍五錢當歸三錢陳皮五錢甘草一錢白朮三錢茯神三錢人參一錢川芎一錢栝蔞三錢半夏三錢水煎服和乳湯治吹乳貝母三錢花粉三錢當歸一兩蒲公英一兩生甘草二錢穿山甲土炒研一錢五分或二錢水煎服一劑乳通腫消此方用貝母天花粉消胃中之壅痰痰壅而乳房之氣不通化其痰則胃火失其勢用蒲公英穿山甲解其熱毒利其關竅自然不攻而散矣又恐前藥過於迅逐加入當歸甘草補正和解正氣無傷而邪退舍矣腋脅肋三部證治計三證筋脈腋俗名胳肢窩手太陰肺筋脈入腋手少陰心手太陽小腸筋結腋足少陽膽筋走腋手厥陰胞絡抵腋胠腋下為胠脅胠下為脅足厥陰肝足少陽膽脈俱布脅手厥陰胞絡筋脈俱挾脅季脅脅之下小肋骨也俗名軟肋手太陰肺筋抵季脅足少陽膽脈乘季脅䏚季脅之下無肋骨空陷軟處為䏚足少陽膽筋乘䏚肋脅後為肋足太陰脾筋結肋足厥陰肝脈布肋癰疽就簡腋癰腋疽在腋窩居中淵疽在腋下三寸胠腋間肋癰肋疽一名夾熒在肋條骨間脅癰脅疽生在肋下近軟肉處又為季脅癰疽俱按陽癰陰疽則例治法黯疔生胳肢窩中堅硬勢如釘頭其色紫黑癢而且痛寒熱往來四肢拘急或煩躁作嘔痛引半背治法同疔瘡狐臭一名體氣患狐臭者腋中有棕紋數孔臭從孔出治之方法頗多鮮能除根止堪塞竅耳惟用銅青好者不拘多少米醋調成膏先以皂角湯洗淨腋下用輕粉摻過將膏塗之內用蒜肚方時常作饌食之其氣味可漸而退蒜肚方公豬肚一具入大蒜頭四十九枚去殼入肚內以線扎口水煮極爛用鹽醋蘸肚隨便食之又法用癩蝦蟆一個同入肚內如前煮爛去蝦蟆大蒜用熱酒食之洗浴發汗避風三日其臭頓改蝦蟆氣右脅有聲如蝦蟆常欲以手按之否則聲聲相接此因驚氣入臟而成鎮驚硃砂丸主之以利為度鎮驚硃砂丸硃砂飛雄黃附子炮去皮臍各一兩麝香一分巴豆仁二十粒去油上共研勻細末蜜搗丸麻子大每服三丸不拘時以車前草煎湯下數日必下利如不利更加三丸至七丸以利為度肩部證治筋脈肩手陽明大腸手太陽小腸手少陽三焦筋脈俱至肩手太陰肺筋結前髃足少陽膽脈至肩上肩井穴足太陽膀胱筋結肩髃肩解背上兩角為肩解手太陽小腸脈出肩解肩胛肩解下成片肉為肩胛手陽明大腸手太陽小腸筋脈俱繞肩胛癰疽就簡肩癰肩疽生肩正中干疽生肩前廉過肩疽生肩後廉髎疽生肩下腋之後外層歧骨縫間肩風毒生肩梢骨縫中樂疽生肩後前腋之上骨縫開合空陷之中俱按陽癰陰疽則例治法膊臂手三部證治計十九證筋脈肩下曰膊膊下對腋曰臑臑盡處曰肘肘當背腕肘以下為臂臂掌交接處為手腕手腕以上大指本節後肥肉隆起處統謂之魚按手大指一名巨擘屬肺肺脈自腋入臑至大指出其端肺筋起於大指端少商穴之次穴在大指內側去爪甲如韭葉為肺井循手掌直上大指本節後有魚際穴為肺滎掌後橫紋頭有太淵穴為肺腧太淵後有經渠穴為肺經手腕後一寸五分有列缺穴為肺絡背腕曲中有尺澤穴為肺合循內側上臑次指一名食指屬大腸大腸筋脈皆起於次指端商陽穴之次穴去爪甲如韭葉為大腸井溜於本節前內側為二間穴為大腸滎注於本節後三間穴為大腸腧過於合谷穴為大腸之原上側中有陽溪穴為大腸經腕後三寸有偏歷穴為大腸絡肘曲紋頭盡處有曲池穴為大腸合由是歷三里肘髎五里三穴直上中指一名將指屬心包絡之脈自腋循臑入肘背至中指出其端其筋即起於內側之未中衝穴之次穴去爪甲如韭葉為心井心為天君其井腧等俱在包絡屈中指無名指兩者之間取勞宮穴為心滎掌後兩筋之間有大陵穴為心腧去腕二寸兩筋間有內關穴為心絡去腕三寸有間使穴為心經至肘曲中央陷中有曲澤穴為心合循臑天泉穴而止無名指即小指之次指屬三焦三焦筋脈俱起無名指外廉關衝穴之次穴去爪甲如韭為三焦井溜於小指次指歧骨陷中名液門穴為三焦榮注於本節後陷中名中渚穴為三焦腧結於手腕陷中之陽池穴為三焦原直上腕後二寸名外關穴為三焦絡腕後三寸名支溝穴為三焦經結於肘外大骨上陷中名天井穴為三焦合於是上臑小指內側屬心外側屬小腸心脈循臑下肘出小指之端心筋起小指之端內側少衝穴之次穴去爪甲如韭葉直上入掌內後廉歷神門穴在掌後兌骨中又歷通里穴在腕後一寸陷中又歷少海穴在肘後大骨外去肘端五分屈肘上頭得之又歷極泉穴在背內側下筋間小腸筋脈俱起於小指外側少澤穴之次穴去爪甲一分為小腸井溜於小指外側本節前陷中名前谷穴為小腸榮注於小指外側本節後名後溪穴為小腸腧直上至於腕起骨陷中有腕骨為小腸原踝下有陽谷穴為小腸經腕後五寸有支溝穴為小腸絡肘下兌骨之後有小海穴為小腸合由是上臑癰疽就簡臑癰臑疽生肩之下肘之上藕包毒生臑後垂肉處一名鴨蛋毒石榴疽生肘尖上寸余肘癰生手腕背面兌疽生於手腕裡面橫紋前梢動穴之間穿骨疽生掌後橫上三寸兩筋陷中手背發生於手背掌心毒生手心勞宮穴若偏於掌邊名穿掌毒一名穿梗毒又名鷀癰有單方用新桑葉不拘多少研爛罨之虎口疽生於大指次指歧骨間又名丫毒又名擘蟹毒初起漫腫色白本痛堅硬者按疽例治若初起黃色小泡麻痛根深隱隱有紅線上攻腋內合谷疔須將疔眼挑去當紅線盡處用針砭斷按疔瘡用治法手丫發生於丫骨縫間除大指合谷穴其餘手丫生患者皆同此名俱按陽癰陰疽則例治法病蝦一名肉蛋癰生於手背形勢如蝦高梗橫長赤腫疼痛用嫩桑葉七錢生地三錢冰片一分搗爛敷之又方用食鹽酒糟香油同炒令香淬以滾湯淋洗患處即消內服仙方活命飲如潰按陽癰陰疽則例治法仙方活命飲通用一調癰患生手大指初漫腫漸如李青紫麻木癢痛徹心宜刺破出膿血貼洞天膏服仙方活命飲倍黃芩洞天膏通用七十六仙方活命飲通用一蛇頭疔天蛇毒此二證俱生手指頭尖初起小泡色紫疼痛堅硬如釘者名蛇頭疔初起悶腫無頭色紅痛如火燎者名天蛇毒其治法相同取白羅卜一段挖空以雄黃填入蒸半熟套患指上或取烏梅捶碎去核肉只取仁研粉米醋調塗皆可消如患色白者當作疽治小金丹服愈小金丹通用五十二蛇眼疔蛇背疔蛇節疔蛇腹疔泥鰍癰此五證名雖殊而治一也蛇眼疔生於指甲兩旁形如豆粒色紫半含半露硬似鐵釘蛇背疔生於指甲根後高腫色紫蛇節疔一名蛙節疔生於中節繞指俱腫其色或黃或紫蛇腹疔生於指中節前面腫如魚肚色赤疼痛泥鰍癰一指通腫色紫形如泥鰍焮熱痛連肘背五證俱敷雄黃散內服仙方活命飲潰貼洞天膏即愈雄黃散明雄黃一錢輕粉五分蟾酥二分冰片一分上共研細末新汲水調濃重湯燉溫敷於患指用薄紙裹之日三次仙方活命飲通用一洞天膏通用七十六代指生於指甲之內先腫焮熱疼痛應心初宜用蔥葉烏梅仁捶碎去核肉只取仁共研和醋浸之或用甘草朴硝各五錢煎水浸之亦瘥若至三四日後指甲背上微透一點黃白色此係內膿已成但無頭路潰出急用線針在指甲身上就膿頭處針一小孔膿方得出捏盡余膿以膏貼之若失治或過敷涼藥致毒膿遏郁必潰浸好肉爪甲脫落用洞天膏貼之一兩月方愈脫疽一名羌螂蛀脫疽多生手指節中無名指上最多不紅不熱腫如蟾腹疼痛乃少陰痰氣凝滯書云急剪去其指可保其命遲則腫延手足背救無術矣殊不知此亦疽也大人用陽和湯小孩用小金丹最重者用犀黃丸皆可消之若初起色紅者則按泥鰍癰治法陽和湯通用五小金丹通用五十二犀黃丸通用四十八瘑瘡生於指掌之中形如茱萸兩手相對而生亦有成攢者起黃白膿包癢痛無時破津黃汁水時好時發極其疲頑用藜蘆苦參各一兩豬油八兩將二味炸枯濾去渣入制松香末枯礬末各八錢雄黃細末一兩攪勻候溫塗之以痊為度忌食動風雞鵝魚腥等物狐尿刺此證大成書名狐貍刺外臺總録二書名狐尿刺乃螳螂當甚暑交媾精汁染於諸物干久有毒人手足誤觸之即成此患初起紅紫斑點肌膚乾燥悶腫焮痛十日後潰腐瘡口日寬宜服敗毒湯外以蒲公英連根濃煎洗之如得鮮蒲公英搗汁塗患上更佳蓋螳螂又名野狐鼻涕此證取名乃本於此也一云狐尿刺有孔刺痛有蟲用曲末和獨蒜杵勻納瘡孔中蟲出愈鵝掌風手足掌心燥癢起皮堅厚枯裂者以豆腐漿沫熱洗之輕者搽砒油每日三四次至愈乃止如日久延及遍手枯裂極重者用二礬湯砒油方紅砒一錢敲細如粞上用麻油一兩煎至砒枯煙盡為度去砒留油聽用凡患風之處先以火烘皮熱以油擦之日三次至愈乃止二礬湯白礬皂礬各四兩兒茶五錢側柏葉半斤上用水十碗煎湯先用桐油搽抹患上取紙拈蘸桐油點著以煙焰向患上熏之片時方將前藥湯乘滾貯淨盆內以架上用布蓋令湯氣熏蒸勿令泄氣待湯微熱蘸洗良久一次可愈七日忌下湯水永不再發鵝爪風即油灰指甲用白鳳仙花搗塗指甲上日日易之待至鳳仙過時灰甲即好倒甲爪甲忽然倒生肉內刺痛如錐食葵菜即愈丫指手生丫指疼痛無奈用通草為末雞子清調敷即愈治丫指方用石灰內未燒透石子澆生蜂蜜在粗石上椎融敷患處一夜即愈血餘十指斷壞惟有筋連無節肉蟲出如燈心長數寸遍身緑毛名血餘用茯苓胡黃連煎服即愈擘蟹毒即手大指之間所生俗名丫指用活蟹杵爛塗之背部證治計一證筋脈背從脊開一寸五分對第三椎曰肺俞對第五椎曰心俞對第七椎曰鬲俞對第九椎曰肝俞對第十椎曰膽俞對第十一椎曰脾俞對第十二椎曰胃俞對第十三椎曰三焦俞對第十四椎曰腎俞對第十六椎曰大腸俞對第十八椎曰小腸俞對第十九椎曰膀胱俞從脊開三寸對肺俞曰魄戶故肺藏魄對心俞曰神堂故心藏神對肝俞曰魂門故肝藏魂對脾俞曰意舍故脾藏意對腎俞曰志室故腎藏志膏肓對四椎督脈主脊手陽明大腸筋挾脊手少陰心脈與脊裡細絡相連貫足太陰脾筋著脊足少陰腎脈貫脊足太陽膀胱筋脈挾脊分左右上頂膂脊兩旁曰膂足太陽膀胱脈循膂足少陰腎脈挾膂發背發背乃癰疽中大患因其患位對心對肺對臍耳偏曰手搭發背因手可搭而名紅腫痛甚者屬陽以陽癰治法初起用五通丸醒消丸早晚以散毒湯輪服則皮皺痛息再服至愈如潰即用內托散醒消丸亦早晚輪服外貼洞天膏收功此陽發背之治法也色白腫痛或平塌不痛者屬陰以流注陰疽治法初起用加味二陳湯加陽和丸或即用陽和湯消之皮色稍變痛急難忍惟服陽和湯以止其痛消其未成膿之餘地使已成膿者至不痛而潰既潰貼陽和解凝膏內服陽和湯氣虛者兼加味保元湯毒深兼犀黃丸早晚輪服至愈乃止愈後或背上仍如負板舒轉不快者用小金丹十丸每日早晚兩進消其毒根自好此陰發背之治法也再按背部之患如蓮子發蜂窩發陰陽二氣疽串疽連珠發禽疽痰注發黃瓜癰諸書名類頗多概名之發背洞曉陰疽陽癰變通治法則無誤矣五通丸通用五十醒消丸通用四十七陽和丸通用六加味二陳湯通用十八陽和湯通用五犀黃丸通用四十八小金丹通用五十二加味保元湯通用二十九陽和解凝膏通用七十七洞天膏通用七十六腰部證治計三證筋脈腰即脊骨十四椎下十五十六椎間尻之上也足厥陰肝足少陰腎脈入腰足太陽膀胱脈抵腰腎俞發生腎俞穴在脊骨兩旁陷肉處按陽癰陰疽則例治法紅癗毒腰間發一紅癗如瘤兩邊各生一紅線纏至臍腹則死用墨水磨濃調雄黃末塗之即愈纏腰火丹生腰肋間纍纍如珠形有乾溼不同紅黃之異乾者色紅赤形如雲片上起風粟作癢發熱屬肝膽風熱宜服龍膽瀉肝湯濕者色黃或起白水泡大小不等作熱爛流水較乾者更疼屬肝脾濕熱宜服胃苓湯加山梔防風石膏其小泡用線針穿破外俱用糞桶箱炭火燒存性研末香油調敷或用蛇蛻煅毛廁蹲板上泥等分麻油調敷俱效此證不速治纏腰已遍毒氣入臍令人膨脹悶嘔者危險須急治之胃苓湯蒼朮陳皮澤瀉厚朴豬苓生甘草上水煎溫服除濕逐丹湯治蛇串白泡防風五錢蒼朮三錢赤苓五錢陳皮一錢厚朴一錢山梔三錢甘草三分白朮三錢薄桂三錢水煎服連服數劑丹退而愈龍膽瀉肝湯通用九腹部證治計四證筋脈臍人生胞蒂之處手少陰心筋足太陰脾筋結臍足陽明胃筋脈挾臍少腹臍之下曰少腹亦曰小腹足厥陰肝脈抵少腹癰疽就簡幽癰生臍上七寸上脘穴中脘疽生臍上四寸中脘穴嚇癰生臍上三寸建里穴沖疽生臍上二寸下脘穴臍癰生臍正中神闕穴箭袋癰生腹旁左右同少腹癰疽生少腹氣海丹田關元三穴之際緩疽生少腹旁左右同俱按陽癰陰疽則例治法橫痃生於少腹兩旁大腿界中形如腰子皮色不異硬如結核按之微痛是也初起每日取皂角刺六錢為末布袋盛之同糯米二合煮粥頻食三四日即消或用子龍丸每服三分淡薑湯下日三次至愈乃止切忌用刀針刺破無膿惟出白膩漿主三百日內死自潰者亦然一有自潰者用生料補中益氣湯小金丹日令輪服亦有收功者少壯之人血氣未傷能自保攝雖潰猶可救援十中二三也一有身患楊梅又患橫痃者其間用藥最難惟用犀黃丸每日空心時酒送三錢輕者十服重者加倍二證全愈子龍丸通用五十六犀黃丸通用四十八臍中出水臍中不痛不腫甚癢時流黃水或浸淫成片此腸胃積濕宜服芩連平胃散外撒三妙散即愈忌酒面生冷果菜庶不復發芩連平胃散黃連三錢陳皮三錢蒼朮一兩炒生甘草三錢茯苓一兩厚朴三錢上共研細末每服三錢白滾湯調下按臍中出水不腫不痛其無熱可知用此方當去黃連加防風三五錢為妙三妙散檳榔蒼朮生黃柏各等分上共研細末干搓臍上小兒臍濕臍瘡小兒沐浴不可久在水中任意洗濯既包裹畢宜時常留意不可令尿濕浸臍如不知慎遂致肚臍浸潰不幹名曰臍濕宜用枯礬龍骨等分共研細末干撒臍上甚則焮赤成瘡名曰臍瘡用螵蛸散敷之螵蛸散通用六十八小兒臍突嬰兒肚臍突出赤腫虛火是也用二豆散敷之日二次其腫漸消一初生旬日外兒臍忽腫如吹不紅捻動微響或驚悸作啼者此受寒濕也用白芍藥湯加苡仁煎汁頻灌嬰兒敷藥如前白芍藥湯白芍酒炒一兩澤瀉五錢生甘草一錢二分肉桂一錢揀薄者刮去粗皮上共研粗末每用二錢水一鍾煎四分空心服如臍下痛加鉤藤一錢姜一片食鹽五釐同煎二豆散赤小豆淡豆豉天南星去皮臍白蘞各一錢上為細末每服五分芭蕉汁調敷臍四旁日二次前陰證治計二十二證筋脈前陰即陰器男女同足太陰脾筋足陽明胃筋聚陰器足厥陰肝筋脈結陰器絡諸筋毛際小腹下橫骨間叢毛之際也宗筋會於毛際足陽明胃筋脈入毛際足少陽膽脈繞毛際跨馬癰生腎囊之旁大腿根里夾縫中腫如鵝卵隕墜壅重赤色焮痛初宜服仙方活命飲消之潰後用托毒散犀黃丸愈之如初起患白色而硬則名冬瓜疽當按陰疽則例治法仙方活命飲通用一犀黃丸通用四十八內托散通用三十八便毒一名血疝便毒者言於不便之處為患也按便毒生小腹下腿根上折紋縫中即橫痃之部位古書無橫痃之名故稱橫痃為便毒且謂因交感不潔遭淫毒而患者最多每每先起下疳下疳未已便毒繼之斯言誠是也然既稱橫痃又名便毒二者證治迥殊何堪混同以治法論之初起色紅焮熱腫痛大小便祕澀者此濕熱穢毒所發則為便毒用三黃丸每日熱陳酒送服醉取汗或兼龍膽瀉肝湯早晚輪服即消而愈如初起一核形微長如蛤色白不紅堅硬木痛者乃勞損虛弱之證則為橫痃當按腹部橫痃治法或有兼下疳楊梅而發者亦屬虛損所致須二證皆宜之藥除犀黃丸外別無他法日令服之自可痊愈一魚口即斯證潰後之別名也因生小腹下大腿根縫中其瘡口漸大身立則口必合身屈則口必張形如魚口開合之狀故有魚口之名最難斂口當問其初起色紅色白按法治之兼服補益氣血之劑以冀僥幸三黃丸通用四十九犀黃丸通用四十八龍膽瀉肝湯通用九懸癰一名騎馬癰一名老鼠偷糞生肛門前陰根近後陰兩相交界之處初起細粒漸如蓮子數日大如桃李其色紅焮痛者急用生甘草熟軍各三錢酒煎空心服一劑即愈如成膿則用醒消丸既潰兼以國老煎輪服以速斂為貴其色白堅硬者用小金丹消之如潰兼以鹿角膠三錢清晨酒化下每日輪服或用溫補氣血之劑同小金丹早晚輪服亦妙至愈乃止斯證潰後一經走泄即生管成漏大小便從此浸出血脈瀝盡而死證同怯損諸漏可治獨此不能治治則漏管愈大遂成海底漏懸癰多有由忍精提氣而成所謂欲泄不泄化為膿血是也最難療治以其部位皮肉與他處不同蓋他處皮肉或橫生或直生俱易合口而懸癰之處橫中有直直中有橫一有損傷不易收功初起色赤焮痛者用逐邪至神丹銀花四兩蒲公英二兩人參一兩生甘草一兩當歸一兩大黃五錢天花粉二錢水煎服一劑消毒二劑全愈潰者三劑可以收功此方用銀花蒲公英佐之參歸又用大黃五錢攻逐虛人似乎非宜初起毒正盛乘其初起之時正氣未衰補而兼瀉之藥方為得宜倘因循失治或畏縮不前及至流膿出血正氣蕭索始用參耆補氣往往用至數斤尚不能復原何不早用補藥於化毒之中正氣無傷毒又解散矣國老煎粉甘草一兩截斷用澗內水浸潤漫火炙透上一味細銼用無灰酒煎服醒消丸通用四十七小金丹通用五十二囊癰陰囊紅腫焮熱疼痛乃肝脾濕熱下注龍膽瀉肝湯加澤瀉主之如潰則按後囊脫治法子癰腎子作痛下墜不能升上外現紅色者子癰也或左或右故俗名偏墜遲則潰爛莫治當其未成膿時用枸橘湯一服可愈小兒偏墜腎囊子或一個腫大一個小用香薷厚朴枳殼薑汁炒木通扁豆生薑甘草車前葉煎服或用萬年青根五寸去黑皮搗碎白酒煎服不吃渣即愈枸橘湯枸橘全個川楝子秦艽陳皮赤芍生甘草防風澤瀉各三錢上水煎食前頓服按此方當加柴胡一錢五分為妥熱痛者更加梔仁一錢或黃芩一錢囊脫陰囊生毒破爛腎子落出臭氣難聞外用紫蘇煎湯日洗更取紫蘇連梗葉為末日敷以青荷葉裹之內服黃連五分黃芩歸尾連翹木通各一錢五分甘草一錢煎服俟其爛孔收小肌色紅白服歸芍地黃湯敷生肌藥收功腎子爛出老杉木燒灰存性蘇葉末各等分研細末敷上仍以蘇葉包之腎囊腫如琉璃燈樣用塘內水上無根浮萍以篩盛之下用水一盆置篩於盆上烈日曬乾為末每服二三錢即消腫痛如用鍋焙萬不能幹歸芍地黃湯通用三十七腎囊風一名繡球風腎囊燥癢系膀胱風熱用合掌散以右手中指蘸滿香油黏藥塗入左手心合掌磨擦數次只有藥氣不見藥形為度將兩掌搓擦患處每日早晚擦二三次三日即愈再擦三四日不發一有濕熱抓破成瘡者則用黃丹枯礬生牡蠣等分為末擦散即愈或以蛇床子同白礬煎湯洗之亦愈合掌散硫黃一兩鐵鏽一錢二分紅砒五分上共研極細如面取蔥汁調和塗入大碗內勿使厚薄以碗復於瓦上取艾置碗下熏之待熏至藥干敲藥碗聲同空碗無異為度取藥再研極細聽用膀胱氣陰囊腫大如斗陰莖縮內小便不快此腎虛受邪五苓散加蔥白茴香鹽主之外取生蔓菁根即諸葛菜根搗敷奇效五苓散豬苓一錢去黑皮茯苓一錢白朮一錢二分澤瀉一錢肉桂五分上水煎服或為細末開水調服又方用蛇床子為末雞子黃調敷陰頭癰陰頭紫腫疼痛名陰頭癰用鱉甲煅為末雞子清調敷下疳瘡下疳一證屬肝腎督三經之病諸書分下疳生馬口下蛀疳生玉莖上袖口疳莖上生瘡外皮腫脹包裹蠟燭笑疳久遍潰雞肛疳痛引睪丸陰囊重墜瘙疳痛而多癢潰而不深形如爛杏根疳馬口旁有孔如棕膯眼眼內作癢捻之有微膿出楊梅疳生楊梅瘡時誤用熏擦等藥以致腐爛如血楊梅內疳生楊梅瘡時服輕粉水銀打成劫藥以致便溺尿管內刺痛等名其治不離乎內因外因兩法內因者由欲火猖動不能發泄致敗精濕熱留滯為患加味逍遙散六味地黃丸主之外敷螵蛸散濕熱既清其瘡自愈無足慮也外因者由娼婦陰器瘀濁未淨輒與交媾致淫精邪毒感觸精宮為患最不易愈如治得法亦必發出便毒穢瘡下疳以泄其毒始愈宜服龍膽瀉肝湯三黃丸疼痛難忍者用聖靈丹五分數服奏功倘潰爛日久真陰虧損須禁用苦寒惟用三黃丸六味地黃湯早晚輪服為妙外以忍冬生甘草各一兩赤皮蔥三莖槐枝六十寸煎湯日洗二次螵蛸散敷之近録槐花蕊一方治疳甚效不拘內因外因凡毒輕者宜用之景嶽先生云嘗治一少年因觸穢毒遂患下疳始潰龜頭敷治不效隨從馬口延入尿管以漸而深直至肛門逐節腫痛形如魚骨每過夜則膿結馬口脹不得出潤而通之則先膿後尿敷洗皆不能及甚為危懼余曾遇一山叟傳得槐花蕊方因以治之不十日而莖根漸愈半月則內達外退至馬口而全愈疳愈後即現些微廣瘡復與五加皮飲十餘劑而全愈毒結龜頭生疳往往有腐爛連龜身爛落者世人多以外敷藥治之雖外藥不可少然不先治其內遽用外藥以止遏不啻如石壓卵也先用毒神散黃柏三錢茯苓一兩生甘草三錢炒山梔三錢肉桂一錢水煎服四劑則內證火毒從小便出疼痛稍止然後用生勢丹敷之炒黃柏三兩兒茶一兩冰片三分生草一兩大黃三錢乳香一錢沒藥一錢麝香三分丹砂一錢各為極細末和勻摻之摻上即止痛逢濕即滲不數日膿盡血乾肉筋再長如舊一月全愈但不能再長龜頭也愈後須補氣血用十全大補湯服數十劑則外勢仍然伸縮尚可種子一有疳瘡初發多先病魚口苟不急治必遍身生瘡遷延歲月腐爛身體多不可救故必須早治為妙治法宜於補中藥內加消毒藥則毒盡出不致身體虧損方用人參一兩生耆一兩當歸一兩遠志三錢生草三錢銀花一兩大黃一兩石膏一兩柴胡二錢白朮一兩天花粉三錢水煎服一劑而大便瀉出惡物臭穢不堪恐外人傳染須掘土埋之再服二劑惡穢盡泄不留於腸胃矣後去大黃石膏加土茯苓二兩同煎再四劑則一身上下與頭面之間必有隱隱瘡影現於皮膚之內再服二劑瘡影漸消再服二劑全愈永不發矣此方用大黃以泄其毒石膏以消其毒甘草銀花以化其毒柴胡天花粉以散其毒更助以大補血之藥此方余親試而取效也倘病人陰虛陽燥方中可加熟地數兩或加元參一兩亦可余藥不可亂加也一下疳明礬皂礬各等分為末裝一大五倍子內燒灰存性研細末再加冰片三分兒茶少許先用甘草水洗淨然後搽之百發百中橄欖核燒灰敷下疳良下疳陰癢生甘草煎湯熏洗用海螵蛸散搽之又方鱉甲為末雞子清調敷附方存驗生甘草上一味研細末蜜調塗疳瘡神效加味逍遙散通用十六三黃丸通用四十九六味地黃湯通用四十三龍膽瀉肝湯通用九槐花蕊通用四十二螵蛸散通用六十八聖靈丹見楊梅結毒猴子疳是證小兒多得之從肛門或陰囊邊紅暈爛起漸至皮膚不結靨或眼稍口旁亦紅若不早治必至爛死此證切忌洗浴只用軟棉帛蘸甘草湯拭淨用藥雖延蔓遍身可保立愈此方已屢試見效矣緑豆粉一兩輕粉一錢五分漂砂一錢冰片一分或二三分為極細末將金汁調鵝毛蘸敷上如無金汁雪水亦可或甘草燈心湯亦可一方輕粉用二錢加牛黃一分內再服退毒散乳母亦宜藥戥分增減諒精神強弱服之黃連銀花連翹甘草赤芍當歸牛膝桔梗黑山梔薄荷木通等分用新汲水煎滓再煎食遠服小兒莖腫小兒莖腫莖即陽物如腫痛用黃連木通各一錢煎服即愈膀胱氣痛膀胱氣痛凡小兒小腸氣痛與膀胱氣痛皆在臍下氣海兩邊筋腫到腎囊邊痛不可忍治用川楝子橘核小茴香荔枝核俱焙炒為末白酒熱調三四錢服之不數服即愈陰蝨瘡一名八腳蟲前陰毛際內由欲後失洗不潔搏滯生蟲起疙瘩或紅或白瘙癢難忍用百部浸燒酒頻擦之即愈或以生白果仁擦之亦效如毛內如豆如餅發癢結如蠟皮者楊梅毒也當按楊梅瘡治法強中一名腎漏一名妒精玉莖強硬不痿精流不止痛如針刺乃腎滯漏疾也用韭菜子破故紙各一兩炒為末每六錢水一碗煎半服接服大劑六味地黃湯六味地黃湯通用四十三陰挺陰戶中突出如菌芝或挺出數寸此因胞絡傷損或分娩過勞或熱鬱下墜治當升補元氣為主補中益氣湯加味逍遙散早晚輪服外用生豬脂調藜蘆末塗之陰腫一名蚌疽陰腫陰戶忽然腫而疼痛由肝脾傷損濕熱下注肝傷而翻突如餅如雞冠或潰爛四物湯加柴胡山梔丹皮膽草主之脾傷則悶腫墜痛補中益氣湯加丹皮山梔主之外用甘菊苗葉不拘多少搗爛以滾水淋汁熏浸洗之四物湯通用二十三補中益氣湯通用三十陰癢一名陰蝕一名陰䘌陰癢三蟲在腸胃因臟虛蝕陰微則癢甚則痛或外生疙瘩或膿水淋漓宜用加味逍遙散加槐實白蘞外用蛇床子一兩白礬五錢煎湯淋洗用桃仁研膏和雄黃末或用雞肝納陰中此證亦有肝脾虧損濕熱下注而癢者補中益氣湯加山梔丹皮芍藥加味逍遙散通用十六補中益氣湯通用三十陰脫陰戶開不閉癢痛出水由腎元不固陰分有火用加味逍遙散加味歸脾湯如産後得者補中益氣湯加五味子醋炒白芍外俱用荊芥枳殼訶子五倍子各一兩煎湯熏洗陰冷婦女陰冷有寒證有熱證寒由陽虛熱由濕熱濕熱者必小便澀數黃赤大便燥結煩渴加味逍遙散主之陽虛者必小便清利腹中冷或痛畏寒八味地黃湯主之加味逍遙散通用十六八味地黃湯通用四十五陰㿗俗名㿗胡盧陰㿗即婦人子宮脫出乃氣虛下陷小便先似有堵塞之意因而努力久之隨努而下須令穩婆扶正葫蘆患婦仰臥以枕墊腰吹嚏藥取嚏收之倘不收用萆麻子肉搗爛貼頂仍如前法仰臥墊腰吹嚏藥收之既收入隨去萆麻子肉令其緊閉陰戶以布帛將兩腿並縛內用補中益氣湯倍升麻黃耆大劑服之如因産而患者治法亦同補中益氣湯通用三十陰疝陰疝小腸兩旁頂起脹疼系肝腎寒邪逍遙散加木香沉香檳榔主之逍遙散通用十五後陰證治計六證筋脈後陰即肛門手太陰肺手陽明大腸所主之地尻尾骶骨曰尻足少陽膽經結尻臀尻旁大肉足太陽膀胱脈貫臀筋亦結臀癰疽就簡鸛口疽坐馬癰生尾尻高骨尖處臀癰臀疽生臀肉厚處上馬癰下馬癰生臀肉之上分左右左為上馬右為下馬俱按陽癰陰疽則例治法臟毒臟毒者醇酒厚味勤勞辛苦蘊毒流注肛門結成腫塊其證有內外虛實之別發於外者肛門兩旁突腫形如桃李大便祕結小水短赤甚者肛門重墜緊閉下氣不通刺痛如椎脈數有力此屬實熱易治用四順清涼飲內消沃雪湯通利大小便外用田螺水搽之發於內者在肛門內結腫刺痛如椎大便虛祕小便淋漓或咳嗽生痰或寒熱往來遇夜則尤甚脈數無力此屬陰虛濕熱滲注難治用四物湯加焦黃柏知母甘草木通兼六味地黃丸調治自安元氣虛陷及潰膿水者用補中益氣湯加地黃槐花天花粉或兼六味地黃湯早晚輪服四順清涼飲連翹赤芍防風當歸山梔仁生甘草檳榔木香各一錢大黃二錢炒上酒水各半煎內消沃雪湯青皮陳皮制乳香制沒藥當歸丹皮甘草節廣木香皂角刺穿山甲山梔浙貝各一錢五分上酒水各半煎服便祕者加大黃田螺水用大田螺一個刀尖挑起螺靨入冰片末五釐平放瓷盤內待片時螺竅滲出漿水用雞翎蘸點患處按此方治痔腫外痛亦妙四物湯通用二十三補中益氣湯通用三十六味地黃丸通用四十三痔瘡附痔漏一痔瘡有患肛門內者有患肛門外者其肛門邊生出數瘡腫而突出膿潰即散者為牝痔肛門邊露出如珠狀如鼠奶淋血流膿者為牡痔腸口顆顆發癗且痛且癢血淋漓者為脈痔肛門內結核出血發寒熱登廁則脫肛者為腸痔肛門腫痛遇怒即發怒息即安者為氣痔酒醉即腫痛流血者為酒痔同房後即腫痛發者為色痔每大便注有血不止者為血痔名類頗多總因醉飽入房筋脈橫解精氣脫泄熱毒乘虛下注或好淫強固其精以致木乘火勢而侮金或炙爆厚味過多或勞傷元氣陰虛火熾皆成斯疾未破曰痔已破曰漏生管者難治久病咳嗽而生痔者多致不救皆宜戒房勞忌河豚海腥辛辣椒酒等物一外痔用蘇合膏塗患處日二次至愈乃止內服牡痔丸一內痔用枯痔散用時令患者登廁翻出肛外側臥其痔盡出勿使收入亦有痔自翻出者大如茶杯形如一菌糞從菌心而出痛極上面如盆四邊高心陷下如菌根糞後用杜枸根搗爛煎汁熱熏溫洗或甘草湯蔥椒湯俱可洗淨以洞天膏攤如菜碗大中剪一孔以四邊剪開通於孔孔烘熔加於菌根貼放屁眼四邊圍護好肉誠恐上藥時致藥汁淋於好肉耳每取藥一二分入杯津調筆蘸拂菌之外面四邊各拂一次菌之中心通連屁眼大忌拂藥倘有流入大痛難當拂一兩日毒水流出菌形漸縮而軟再拂一兩日漸硬而黑菌邊日有枯皮脫下換藥以碗盛湯用筆輕輕洗去舊藥再上新藥仍用護藥如前法三四日之後黃水出將盡可用藥一錢內增硃砂一分如前津調日夜照拂則菌縮小黑硬再拂至菌根自落痊愈內服槐花蕊虛人先用八珍湯數劑然後用上法治之一痔已通腸汙從漏孔出者用胡連追毒丸如服後膿水反多者藥力到也勿以為懼待膿血追盡用黃連閉管丸一漏有管者用黃連閉管丸早晚服一次重者四十日可愈一有血箭痔生肛門或成堵塞墜腫每逢大便用力則鮮血急流如箭不論糞前糞後由腸胃風熱所致生熟三黃湯主之如唇白麵色痿黃四肢倦怠屬氣血兩虛宜用十全大補湯去肉桂加柴胡升麻倍參耆服之外用自己小便洗之或童便熱洗更妙其血自止一有痔大如拳貫於腸頭發則疼痛僵仆先用荊芥湯洗之次以艾灸其上三五壯如覺一道熱氣貫入腸中必大瀉鮮血穢血一時頓覺痛甚其疾乃愈一有勤苦勞役之人及婦女輩不能外治則從內里服藥惟用補中益氣湯隨證加減最妙此常治驗之方也其加減如結腫脹悶加槐角木香梔子之類作痛作癢加防風生地槐花之類下血加地榆烏梅黑荊芥之類潰膿加黃芩銀花生地之類因産而患者加桃仁紅花川芎之類瀉而患者加蒼朮車前熟地之類因痢而患者去黃耆加木香黃芩白芍之類各推病因以施加減在人神而明之不可膠柱鼓瑟痔漏世人治法多用刀針掛線徒受苦楚而內毒未除外口難長經年纍月難奏功效豈果漏瘡之不可治乎抑酒色之戒不嚴而治之不得其法耳惟以補中消其濕熱之毒則何漏之不可痊哉方用青龜丸人有大便時先瀉血幾許而始便糞者人以為便血病也孰知肛門暗生血痔日久變為漏管流膿血不知受病不同而見證亦異此等之證多得之飲燒酒過多熱入直腸不得遽泄結成小痔不化久則皮破血流乃出於直腸之外非出於直腸之中系膀胱之血也用清源散蘇合膏蘇合油槐花各一兩研粉猩膽末冰片末各五錢上研和入洞天嫩膏一兩五錢和勻固貯勿令泄氣臨用取塗患上日二次至愈乃止枯痔藥好白礬四兩生砒四錢五分上研為細末共入陽城罐內一法先將砒入罐底次將礬末蓋之外圍炭火煅之至礬熔有煙起煙即砒毒人立上風忌聞受其毒俟煙盡礬枯去炭冷定取出將礬研極細如粉每取一錢加入飛過硃砂一分研和聽用按此藥只是借砒氣於礬內又有硃砂以解之地骨皮大生地各三兩黃芩丹皮各一兩五錢槐花一兩甘草黃柏各五錢炒焦蒼朮一兩炒焦上為末白蜜為丸每早晚各服五錢胡連追毒丸胡黃連切片薑汁拌炒研末一兩刺蝟皮炙切片再炒黃研末一兩上共和一處研勻軟飯為丸如麻子大每服一錢食前開水送服黃連閉管丸胡黃連淨末一兩穿山甲油炸石決明煅槐花各五錢微炒上研細末煉蜜為丸如麻子大每服一錢空心清米湯下早晚服兩次至重者不過四十日愈可代刀針藥線之力如漏管四邊有肉突起者加殭蠶二十一條研末入藥內按殭蠶一方作蠶繭退管丹方存驗用黃荊條所結之子取炙燥為末每服五錢黑糖拌空心陳酒服專治漏痔之管服至管自退出方止生熟三黃湯生地熟地各二錢黃連黃柏黃芩人參白朮蒼朮厚朴陳皮歸身地榆防風澤瀉甘草各一錢烏梅一個上水煎溫服青龜丸龜一個茯苓五兩羊蹄後爪四副土炒穿山甲五錢土炒人參二兩干青苔一兩當歸三兩瓦松二條陰乾不用火焙生黃耆八兩白芷一兩槐米一兩苡仁六錢各為細末將龜用石臼搗死以藥末拌之飯內蒸熟將龜肉與甲火焙乾為末用蜜為丸每服二錢服之一月而漏瘡干服至二月而漏管滿服完痊愈可不再發但服藥必獨宿戒酒色三月倘服藥時不斷酒色不能奏功此方治漏去濕而不散氣敗毒而不損血醫治多人實有神效非謬語也陳士鐸先生治痔方茯苓一兩白芍一兩地榆三錢苡仁一兩穿山甲一片土炒為末水煎連服四劑而肛門寬快又四劑內外之痔盡消再將前方加增十倍修合為丸每日早空心滾水服五錢服一料即愈此方利水去濕不傷脾胃服之立效八珍湯通用二十五十全大補湯通用二十六槐花蕊通用四十二補中益氣湯通用三十坐板瘡生臀股之間形如黍豆或如風癬色紅作癢破流黃水浸淫微痛甚則焮痛延及穀道由溽暑坐日曬几凳暑濕凝滯肌腠所致初用芫花川椒黃柏煎湯燙洗即消如毒盛癢痛仍不止者用硃砂雄黃末各一錢輕粉枯礬黃柏各五分共為末敷之愈如濕腫流水者用五美散敷滲坐板瘡方先用川椒煎水洗後再用敷藥硃砂雄黃各一錢輕粉枯礬黃柏各五分共為末敷之即愈五美散通用六十七肛門作癢肛門作癢或兼赤腫微痛者蟲蝕也視其下唇內必生小白瘡或耳之前後結小核如串珠者是經云唇有瘡蟲蝕其肛蘆薈丸主之外用雄黃銅緑等分為末撤之蘆薈丸蘆薈子青皮白雷丸白蕪荑川連胡連鶴蝨草各五錢木香一錢麝香五分上共研末蒸餅糊丸麻子大每服一錢空心米湯送下又方杏仁搗作膏敷之或研爛以棉蘸塗穀道中脫肛脫肛屬氣虛有虛寒而脫者有熱極而脫者寒則洞泄不澀熱則澀總以大補元氣兼升提為主補中益氣湯寒加蒼朮炮姜熱加芩梔槐花血虛倍歸身加熟地外用肥皂水洗五倍子末塗之又方赤石脂伏龍肝白礬為末敷之截腸大腸頭出寸余痛苦之極干則自落落則又出腸盡則死初覺截時急用器盛芝麻油坐浸之飲大麻子汁數升可愈股部證治計四證筋脈股臀下曰股股之內側曰陰股足三陽筋脈循外股足三陰筋脈循陰股詳見足部筋脈中癰疽就簡附骨疽生大腿外側咬骨疽生大腿內側伏兔疽生大腿正面用力肉高處肛門癰生大腿肚箕門癰生大腿肚旁偏於里側俱按陽癰陰癰則例治法貼骨疽一名環跳疽一名縮腳疽生跨骨白環穴皮色不異腫硬作痛甚者腰難屈伸宜用白芥子搗粉白酒釀調塗或以大戟甘遂二末白蜜調敷內服陽和湯每日一劑四五日可消消後酌服子龍丸或小金丹以杜患根大忌開刀開刀則定成縮腳疽陽和湯通用五子龍丸通用五十六小金丹通用五十二腿遊風兩腿裡外忽生赤腫形如堆云焮熱疼痛治宜先施砭法放去惡血隨服雙解通聖散一劑次用加味逍遙散加荊芥外貼牛肉片以拔風毒雙解通聖散防風荊芥連翹去心當歸赤芍白朮炒梔子各一錢生黃芩桔梗各二錢滑石三錢生甘草一錢石膏三錢上水煎溫服加味逍遙散通用十六青腿牙疳此證方書罕載其名僅傳雍正年間北路隨營醫官陶起麟頗得其詳略云軍中凡病腿腫色青者其上必發疳凡病牙疳腐爛者其下必發青腿二者相因而患推其原皆因上為陽火炎炙下為陰寒閉郁以致陰陽上下不交為寒為熱自相凝結相近內地間亦有之邊外人雖有不甚多惟內地人初居邊外得此證者十居八九蓋中國之人本不耐邊外嚴寒更不免坐臥濕地寒濕凝結於下致腿青腫其證形如雲片色似紫如黑肉體頑硬又緣邊外缺少五穀多食牛羊等肉其熱與濕合蒸瘀胃膈毒火上熏致生牙疳牙齦腐腫出血若穿腮破唇腐爛為危候相傳止有令服馬乳一法麟初到軍營診視此證亦僅知投以馬乳閲歷既久因悟馬腦子之力較馬乳為效倍速於是用馬腦子一個竹刀挑去筋膜放在碗內先攪勻再以滾黃酒沖令患者服之是夜即能發出大汗而解諸病減矣蓋腦性溫暖流通故耳兼服活絡流氣飲加味二妙湯通其經絡宣其血氣使毒不得凝結外用三稜針形如錐挺者向腿上之青處黑處不拘穴道量其黑之大小針一分深或十針或二十針俱可務令黑血流出以殺毒勢更以牛肉割片貼針眼並黑處以拔積毒如無牛肉即用芥菜子搗面燒酒調敷黑腫處不數日而愈蓋黑血出則陰氣外泄陽氣即隨陰氣而下降雨相交濟上下自安也若病人形氣衰敗飲食不思者不治牙齒俱落紫黑流血腐臭穢者不治滿腿大腫或細而乾枯者不治活絡流氣飲一名沖和既濟湯蒼朮木瓜羌活獨活牛膝生附子山楂肉麻黃各二錢烏藥檳榔枳殼乾薑黃柏各一錢五分甘草八分黑豆四十九粒上加生薑三片水四鍾煎一鍾服藥滓再用水三鍾煎八分服如牙疳盛減去乾薑附子加胡黃連二錢龍膽草二錢牙疳輕腿腫痛盛加肉桂二錢寒熱已退減去羌活麻黃加威靈仙二錢五加皮二錢加味二妙湯黃柏生蒼朮米泔水浸牛膝各三錢檳榔澤瀉木瓜烏藥各二錢當歸尾一錢五分上加黑豆四十九粒生薑三片水三鍾煎一鍾渣再用水二鍾半煎八分搽牙牛黃青黛散牛黃青黛各五分硼砂二錢硃砂一錢人中白龍骨各一錢冰片三分上共研細末先以甘草湯將口漱淨再上此藥驛馬打破騎驛馬兩股打破用雞蛋清攤作膏貼之即愈如腫痛未破用水洗淨在炭火上烤之即愈膝部證治計四證筋脈詳見後足部筋脈中癰疽就簡膝癰疵疽生膝蓋分紅白緩癰緩疽生膝兩旁委中毒生委中穴穴在膝後膕中央俗名腿坳俱按陽癰陰疽則例治法鶴膝風一名遊膝風一名鼓槌風初起膝蓋骨內作痛如風氣一樣因循日久膝腫粗大上下股脛枯細形似鶴膝總由足三陰虧損風寒濕流注之為病也大防風湯主之不論已成未成已潰未潰但逐日服之可愈外用白芥子研細粉白酒釀調塗患處至愈乃止此證經久潰爛出水漸致偏枯或成漏證及脈大消渴者不治人有足脛漸細足膝漸大骨中痠痛身漸瘦弱此鶴膝風證也其證有二一本於水濕之入骨一本於風濕之入骨大約水濕之證入骨重難移風濕之證骨輕可走至於痠痛則一也然亦有微別水濕之痛在一處而不遷風濕之痛移來移去而無定二者治法不同水濕用蒸膝湯風濕用散膝湯又有瀉痢久而成此證者紅腫作痛成膿用補中益氣湯小兒患鶴膝風非必為風寒所痹多因先天所稟腎氣衰弱陰寒凝聚於腰膝現於外可知其內也用六味丸補腎中之水加鹿茸補腎中之火加牛膝引至下部骨節而壯其擷裹之筋乃治本之良方也蒸膝湯生黃耆八兩金叉石斛二兩牛膝五錢苡仁二兩肉桂二錢水煎兩碗先服一碗即擁被而臥覺身有汗意再服一碗兩足如火熱任其出汗切不可坐起張風俟汗出到腳底湧泉之穴始可去被一劑病減大半再劑全愈散膝湯黃耆五兩防風三錢肉桂五錢茯苓一兩水煎服服後亦擁被臥出汗汗出愈多病去愈速要知邪由汗出而正自復也風濕用薏苡防桑湯亦效薏苡防桑湯防風三錢桑葉二兩陳皮一錢補骨脂二錢苡仁一兩水煎服亦必大汗而愈只消一劑也白芷膏存驗用鮮白芷酒煎至成膏瓷瓶收貯每日取膏二錢陳酒送服再取二三錢塗患處至愈乃至此乃全生集專治鶴膝風之方也按鶴膝病多由氣血虛餒不能充灌經髓外邪乘而痹之治宜溫補血氣為主兼去其邪自無不愈白芷膏祛邪通經固妙而於扶虛溉枯之功無有也故必以大防風湯為主而兼服白芷膏為盡善之法大防風湯通用三十五補中益氣湯通用三十六味地黃丸通用四十三膝眼風在膝蓋下左右兩旁空陷中隱隱疼痛是也如風勝其痛則走注不定寒勝則痛如錐刺濕勝則外見胖腫屈不能伸者其病在筋伸不能屈者其病在骨動移不遂者沉寒痼冷之候也俱主以大防風湯治之外用蒜搗爛攤患處以艾鋪蒜上灸之蒜壞再易皮膚倘破不妨此證日久失治即漸成鶴膝風一有因秋夏露臥為寒所襲怫熱內作而搏於肢節痛徹於骨遇寒尤甚以熱尉之則稍減者亦主以大防風湯大防風湯通用三十五上水魚生委中折紋兩梢腫如高埂更似魚形色紫作痛由血熱猝遇外寒稽留滯結而成外用砭法向腫硬上砭去惡血用大黃硫黃等分共研細末香油調敷即愈人面瘡此證傳為怪病多生兩膝或生兩肘腫類人形眉目口鼻皆全本草云瘡口能食諸藥無效惟敷貝母其瘡皺眉閉口自此日用貝母末和水調灌數日瘡消結痂而愈書又云素積冤譴所致須清心懺悔據所治之方辛熱疏散之品抑或因風寒溫三氣凝結之所化未必盡由冤譴之所致也其方未詳故不録載謹按未詳之方即流氣飲及大苦參丸見外科金鑑茲附於後流氣飲人參製厚朴桔梗防風紫蘇鹽水炒黃耆麩炒枳殼當歸酒炒白芍肉桂烏藥甘草川芎木香白芷檳榔引加生薑大苦參丸苦參蔓荊子赤苓山藥白芷荊芥防風白附子川芎生山梔首烏皂角白蒺藜泡川烏黃耆赤芍獨活羌活炮草烏細末面黏丸脛部證治計十一證筋脈詳見後足部筋脈中癰疽就簡三里發生膝下三寸外側前廉兩肋間初腫形如牛眼拘急冷痛其色青黑潰出紫血稀膿黃鰍癰生腿肚裡側長數寸赤腫疼痛形如泥鰍接骨發生腿肚之下接骨之上脛骨與足後跟骨相接處初如核桃其硬如物打磕磞之狀附骨疽生內踝骨之上三寸系三陰交穴潰難收斂夾棍疽生足踝近腕之處在外踝者名腳拐毒在內踝者名走緩又名鞋帶疽在內外踝齊患者名穿踝疽如潰爛日久形如驢眼者變為臁瘡治當問其初起紅白治法以上諸證凡初起色赤高腫熱痛者用仙方活命飲醒消丸以解壅毒潰後用生料補中益氣湯加川芎白芷銀花赤芍煎湯服或與六味地黃湯早晚輪服至愈乃至或色白或黯色不甚痛者用隔蒜灸法以行壅滯助陽氣服陽和湯大防風湯既潰惟大防風湯最妙或與小金丹並進尤妙其外敷貼藥俱按陽癰陰疽側例治法魚肚癰生小腿肚高腫焮赤此肉緊筋橫一身用力之處最痛難忍外用萆麻拔毒法扎上孕婦忌用用則胎墮內以五通丸醒消丸每日早晚輪服初起者即消如已成膿不可開刀須用藥咬潰庶無傷筋縮腳之虞貼洞天膏服內托散加乳香沒藥數劑收功若患色白者則按陰疽則例治法忌用前藥並扎法洞天膏通用七十六臁瘡生於兩脛內外臁骨外臁屬足三陽濕熱下注外邪搏聚易治內臁屬足三陰虧損虛邪纏綿難治初發先癢後痛紅腫成片人參敗毒散加牛膝木瓜苡仁主之熱加酒炒黃柏癢加防風痛加乳香沒藥破流紫水八味逍遙散加減如前日久腐爛膿水淋漓內熱倦怠或瘡內出血不止或瘡色紫黯日輕夜重則用補中益氣湯加茯苓酒炒白芍鹽炒黃柏兼六味地黃丸服之外用蔥艾湯洗夾紙膏貼以軟帛縛定三日一易一有年久頑瘡皮烏黑下陷起肛臭穢不堪輕則按後爛腿法重則按翻花起肛治法一有初起不紅但漫腫作痛或硬腫不甚痛或色黯肢體畏寒飲食少思乃屬脾腎虛敗須用八味地黃丸及陰疽治法若誤投攻伐清涼傷損胃氣絶其化源危矣夾紙膏黃蠟五兩黃丹飛鉛粉各四兩輕粉乳香沒藥各五錢冰片三分末麻油春夏二兩秋冬三兩上先將蠟油煎五六沸下沒乳末再二三沸下輕粉隨下丹粉槐柳枝攪十餘次取起冷定後下冰片攪勻瓶盛浸水中一宿出火毒用時先以苦茶洗瘡將膏用薄油紙較患處長闊一倍以膏攤一面餘一面刺孔數十折束蓋膏以有孔一面向患處貼三日一換三帖即愈又方存驗制松香一兩乳香沒藥各五錢輕粉末五錢上將松香乳香沒藥同入銅銚熔化傾水中候冷取出加輕粉研末真麻油調攤油紙上再用油紙一層針刺孔數十眼掩藥上貼之以軟帛縛定三日一易又方用修船舊油灰煅熟石膏煉丹各等分研極細末先將豆腐溫水洗淨患處以麻油調藥敷之極厚三日一換無有不愈又方用生過三胎母豬糞燒灰存性入生桐油調搽瘡上神效人參敗毒散通用三加味逍遙散通用十六補中益氣湯通用三十六味地黃丸通用四十三八味地黃丸通用四十五爛腿生於小腿血凝氣滯男人謂之爛腿女人謂之裙風初起或腿上抓破或生小瘡濕癢因經熱湯燙洗或食毒物或用瘡癤膏貼爛成一孔經年纍月腐臭憎人宜用烏金膏照患孔大小剪如膏藥一方針刺二三十眼取光面貼孔日煎紫花地丁湯洗孔並洗膏二次三日毒水流淨色變紅活以飛過伏龍肝撒上仍用前膏貼外收功戒多立行走房事發物凡婦人須待月信之後貼起烏金膏烏鉛一斤砒三錢上同入銚熔化次日鉛面刮下者名金頂砒再以鉛溶化澆薄如紙片聽用流火生小腿紅腫放亮熱痛如燒不潰不爛多在小腿肚之下時醫惟知以刀鐮血出或以鱔魚血塗總無全愈之日時常發作復鐮復塗而已須用礦石灰化於缸內次日水面上結一層如薄冰者取起以桐油對調膩厚每日拂上二三次數日全愈不復發忌食豬肉附方存驗用馬前子磨水敷之一日數次其痛止又方用鮮鳳仙花鮮紫蘇二味洗淨邊根葉搗爛放木盆內以滾水衝入腳架盆上熏至可洗以軟帛洗之立愈十餘年者不過洗三四次不發矣腎臟風腎虛風邪乘於臁脛皮膚如癬搔癢起久則成膿水淋漓漸延上股甚則延及遍身日輕夜重眼目暈花口燥吐痰腰腿倦怠發熱盜汗治法用六味地黃丸補腎水為主佐以四生散祛風邪若脾胃虛弱者兼服補中益氣湯外以蔥椒湯洗繡球丸擦之四生散黃耆獨活白附子白蒺藜等分上為末每服三錢用豬腰子一枚批開入藥末濕紙包煨熟空心連腰子細嚼鹽湯下六味地黃丸通用四十三繡球丸方見疥瘡下補中益氣湯通用三十熱毒流注生兩腿脛流行不定或發一二處色赤腫痛潰膿乃濕熱下注內服仙方活命飲加牛膝以解毒壅外貼洞天膏易愈如患色微紅或初起粟米漸大癢痛相兼破流黃水浸淫成片甚至腿肉浮腫皆屬脾腎虧損難治須內用補中益氣湯為主加防風獨活痛加丹皮山梔仁甚者加炒黃柏兼服六味地黃丸外以貫衆煎湯淋洗五倍子細末津調於逐瘡四圍塗之自外收內每日一次漸漸自愈不可妄投攻發即如前濕熱下注之證服活命飲後亦當接用補中益氣湯六味地黃丸以補精氣為善仙方活命飲通用一洞天膏通用七十六補中益氣湯通用三十六味地黃丸通用四十三瓜藤纏繞脛結核數枚不紅微痛或不痛初起以子龍丸每服三分淡薑湯每日服三次至消乃止或小金丹亦可若日久腫痛腐潰不已者則必服犀黃丸兼服溫補祛痰之劑外貼陽和解凝膏漸冀收功子龍丸通用五十六小金丹通用五十二犀黃丸通用四十八陽和解凝膏通用七十七腳氣一名壅疾頭疼發熱惡寒狀類傷寒始必兩腳痠軟惟濕乃腳氣主病濕傷脾胃外復感風寒暑濕內外相搏氣不行則痛血不行則腫又必察其足脛色赤者為濕熱黃白色者為寒濕又腫者為濕腳氣不腫者為乾腳氣腳氣壅疾也喜通惡塞宜用抉壅湯熱加黃柏寒加肉桂愈後接服六斤丸調補腳氣能令人死紅腫如雲根自足起上升入心則嘔血而死腎目與額皆黑則沖胸喘急而死一腳氣瘡脛足胖腫生瘡癢痛出黃水結黃痂頗類黃水瘡惟身體壯熱心神煩躁經久難痊用抉壅湯加黃柏山梔外敷五美散人兩胕忽然紅腫發熱兩脛俱浮作痛頗類傷寒證中原有腳氣之條然腳氣非傷寒也腳氣感染濕熱證從下受傷寒感冒風寒先從上受故傷寒乃陽證而腳氣乃陰病也夫濕熱下感宜從下治消其濕熱濕熱下行身熱自解若用風藥解之反濕邪上犯以風藥多陽升之藥也宜用消胕飲抉壅湯蒼朮苡仁木瓜牛膝川芎羌活獨活木通防風上水煎熱服六斤丸木瓜牛膝肉蓯蓉去甲膜洗淡明天麻枸杞子鹿角膠各一斤上為末蜜丸梧子大空心黃酒下百丸久服腳氣可以除根消胕飲茯苓一兩茵陳一錢防己一錢炒梔子一錢苡仁一兩澤瀉三錢木瓜一錢水煎服一劑小便利二劑身熱解再用二劑兩腳腫消再二劑全愈五美散通用六十七腳漏怪疾腳氣成漏跟有小孔深半寸其痛異常用初取濕人中白火煅有水出滴入瘡口鱔漏有人腿肚生一瘡久遂成漏百治不效自度必死一村夫見之曰此鱔漏也用石灰溫湯泡熏洗覺癢即是也洗不數次即愈石灰燙洗後用陳石灰敷之更妙按鱔漏生腿肚初起類濕瘡癢痛相兼破爛孔數處其孔深如鑽眼津流黃水綿綿不已復入瘡孔多致惡寒肌冷腿瘡不愈用生甘草五錢煮豆腐一塊極老敷上一時許取去另用血餘五錢舊船底上石灰三錢陀僧一錢五分黃柏四錢生肌散三錢共末用麻油熬成膏多敷即愈足部證治計十八證筋脈踝下曰足足背曰跗一名足趺俗名足面足後跟曰跟足指曰趾趾者別於手也足之趾節與手指節同其大趾之本節後內側圓骨形突者名核骨足大趾爪甲後為三毛毛後橫紋為聚紋毛足下面著地者為踵俗名腳底版足大趾外側屬肝內側屬脾脾筋脈皆起於足大趾隱白穴為脾井溜於節後陷中大都穴為脾榮注於內側核骨下太白穴為脾腧循大趾本節後一寸公孫穴為脾絡歷內踝前三分陷中商丘穴為脾經由是循脛骨後結於膝內輔骨陰陵泉之次為脾合從此直上至陰股結於髀箕門穴之次肝筋脈皆起於足大指外側叢毛之際大敦穴為肝井溜於趾縫中行間穴為肝滎行跗上注於本節後二寸動脈中太衝穴為肝腧結於內踝前一寸中封穴之為肝經循踝上五寸蠡溝穴為肝絡直上內輔骨下橫紋盡處曲泉穴為肝合陰股五里陰臁之次足二趾即大趾之次趾足三趾一名中趾屬胃胃筋脈起於足中趾內側歷兌穴為胃井溜於次趾外側陷中內庭穴為胃滎注入內庭後二寸陷谷穴為胃腧過於跗上去內庭五寸衝陽穴為胃原自足跗直上循足脛歷腕上系草鞋處解溪穴為胃經又歷外踝上八寸豐隆穴為胃絡結於膝下三寸三里穴為胃合上膝循伏兔結於髀膝上起肉處為中趾內間其支者別跗上入大趾間出其端足四趾即小趾之次趾屬膽膽筋起足四趾外端竅陰穴之次為膽井趾岐骨間有俠溪穴為膽滎俠溪上寸半有臨泣穴為膽腧俠溪上四寸五分有丘墟穴為膽原外踝上四寸陽輔穴為膽經外踝上五寸光明穴為膽合由是上走髀分為兩歧前者結伏兔後者結於尻直者上季脅其支自陽白直下出膝外臁循經抵外踝至足胕入四趾之間支者別附上入大趾貫爪甲後足小趾趾下屬腎外側屬膀胱筋脈俱起小趾之下斜趨足心湧泉穴為腎井又斜趨內側內踝前一寸大骨下有然谷穴為腎滎跟踵踵即跟突出者踝上硬筋處陷中有太溪穴為腎腧自跟別至跟後踝中大骨上兩筋間有大鐘穴為腎絡踝上二寸復溜穴為腎經上腨腿中肚曰腨出膕內廉結於內輔骨下陰谷穴之次為腎合從是並太陽之筋上循陰股膀胱筋起小趾外側至爪甲一分至陰穴之次為膀胱井曆本節之前陷中有通谷穴為膀胱滎本節之後陷中有束骨穴為膀胱腧外側大骨之下有京骨穴為膀胱原外踝後跟骨上有崑崙穴為膀胱經循跟直上至外踝上七寸有飛陽穴為膀胱絡貫腨結於膕膕即委中在膝脘內約紋中為膀胱合由膕直上結於臀其脈從腰抵膕出小趾外側足發一名足跗發足背上為足背發凡腳赤腫痛潰膿足三陽濕熱可治微赤微腫膿清或出水足三陰虧損難治濕熱者用仙方活命飲既潰用內托散加金銀花外貼膏出膿而愈虧損者用補中益氣湯六味地黃丸聽其漸愈蓋四肢皆稟氣於胃胃氣血盛則善步胃血氣少則少肉善寒漸成痿厥足痹故足疾必用補中益氣湯不可不知若黑黯不腫痛不潰膿煩熱作渴小便淋漓者陰敗未傳惡證也急著肉灸之以行壅滯助陽氣內服十全大補湯八味地黃丸以壯脾土滋化源亦有生者仙方活命飲通用一補中益氣湯通用三十內托散通用三十八十全大補湯通用二十六六味地黃丸通用四十三八味地黃丸通用四十五湧泉疽一名足心發俗名病穿版又名穿窟天蛇生足底湧泉穴乃腎經虛損之證當別紅白按陽癰陰疽則例治之一凡足心或熱或癢痛或麻或腫脹皆腎虛六味八味消息用之一有足心疼如中箭忽發忽歇此腎之風毒瀉腎則愈六味地黃湯加獨活黃柏六味地黃丸通用四十三八味地黃湯通用四十五脫疽敦癰生足趾初起色白麻痛或不痛者名脫疽初起色赤腫痛如湯潑火燎者名敦癰脫疽以手部脫疽法治之敦癰以脛部毒熱流注法治之四淫厲癰靈樞云發於足上下名曰四淫其狀大急治之百日死發於足旁名曰厲癰其狀不大急治之去其黑者不消輒益不治百日死按此二證亦不外乎色紅色白癰疽別治足跟疽古名兔齧俗名腳攣跟足跟腫痛或瘡如豆粒當辨其色紅色白按陽癰陰疽則例治法但此乃二蹺發源之處腎經所由之地若瘡潰不合則蹺氣不發生腎氣從此漏泄須兼以補中益氣湯六味八味丸隨宜取用以滋化源蓋患先得於虛既潰膿水淋漓以虛益虛雖大補氣血猶恐不及若專治其外務末忘本必不能愈補中益氣湯通用三十六味地黃丸通用四十三八味地黃丸通用四十五土栗一名琉璃發生足跟旁形如棗栗色黃而亮腫若琉璃由行崎嶇之路勞傷筋脈而成初用仙方活命飲加木香宣通壅滯膿熟針之余按陽癰則例治法仙方活命飲通用一田螺泡生足掌初如火燎隨生紫白黃泡悶腫硬疼不能著地連生數泡皮厚難於自破三五日成片濕爛甚則足跗俱腫寒熱往來此肝脾風濕攻注用苦參菖蒲野艾熬湯熱洗次用線針將泡挑破泄去毒水貼洞天膏內服解毒瀉肝湯如濕重流水者則以五美散撒之更用膏蓋貼解毒瀉肝湯防風山梔石膏黃芩蒼朮木通生甘草各二錢上加燈心三十根水酒各半煎食前服洞天膏通用七十六五美散通用六十七冷疔初起紫白泡疼痛徹骨漸至腐爛深孔紫黑血水腥穢日久不愈宜用蔥湯洗淨鉛粉散敷之愈鉛粉散黑鉛四錢鐵杓內化開傾入水中取起再化如此百遍以鉛淨為度去水取澄者三錢制松脂一錢飛黃丹輕粉各五分麝香一分上共為細末麻油調勻塗瘡口油紙蓋之牛程𨇥一作牛乘𨇥生於腳掌皮硬高腫色黃疼痛不能步履由腳熱著冷水寒熱搏滯而成宜略去老皮以生草烏酒磨厚塗日數次至愈乃止若內已成膿則用針刺破出膿水每日米泔水熱洗洞天膏貼之四圍頑皮浮起則輕輕剪去搽生肌藥而愈洞天膏通用七十六臭田螺俗名爛腳丫腳丫起粟米白泡極癢搓至皮爛津腥臭水覺疼時其癢方止次日仍癢如故經年不愈亦或癢痛出水腫焮腳面此皆陰虛濕熱下注三陰不足主治補中益氣湯六味地黃丸間服自愈外以五美散摻之爛腳趾縫方鮮鵝掌黃皮陰乾燒灰存性為末摻之極效又方好黃丹一味摻三五次即愈補中益氣湯通用三十六味地黃丸通用四十三五美散通用六十七甲疽趾甲旁起一胬肉突出潰爛浸黃水疼痛難忍常時舉發者名甲疽用耆毒油日三次毒消口斂耆毒油黃耆二兩酒浸一宿狼毒一兩豬脂五兩上微火上煎取二兩絞去渣退火氣以封瘡口效又方存驗用緑礬置鐵片上煅沸色赤如熔金者為真沸定取起研末以鹽湯調搽之嵌甲足趾甲入肉作瘡不能行履用陳皮濃煎湯浸之良久甲肉自離輕手剪去以虎骨末敷之即安或緑礬煅末敷之蝕惡肉生新肉細細剪去甲角旬日即效肉刺俗名雞眼生於腳趾形如雞眼根陷內里頂起硬凸疼痛步履維艱女子每因纏傷或著窄鞋男子因窄鞋遠行皆生此疾用紫玉簪根搗塗又方用蔥剖開將有汁沫一邊貼之包住數次即消足釘怪疾兩足心凸腫上生黑豆瘡硬如釘脛骨生碎孔髓流出身發寒顫惟思飲食此是肝腎冷熱相吞用韭子煎湯日服外以炮川烏末敷之無名毒有指頭忽先發癢已而作痛指甲現黑色第二日腳趾俱黑三日連足面俱黑至腳上脛骨此為無名腫毒因多服春藥是火熱之毒非腳疽脫骨疽可比若脫骨疽腳疽只黑在腳趾而不黑在腳面也治法必須大補氣血瀉毒之味用顧步湯若已潰爛多服數劑無不愈也顧步湯牛膝金叉石斛各一兩人參三錢黃耆一兩當歸一兩金銀花三兩上水煎服一劑而黑色解二劑而疼痛止三劑全愈腳泡凡遠行腳趼成泡用白麵水調塗之一夜即平附方女人裹腳方名脫骨湯杏仁一錢桑白皮四錢水五碗新瓶煎三碗入朴硝五錢乳香一錢封口煎化置足於上先熏後洗三日一作十餘次後軟若束綿矣其生瘡潰爛者荊芥末敷之遠行腳腫方草烏細辛防風各等分為末鋪鞋底內以水拌濕布襯踏之行冬月手足坼裂方名黃蠟膏清油五錢慢火煎沸入黃蠟一塊同煎光粉少許熬紫色為度先用熱水洗患處火烘乾取藥填敷以紙貼之其痛立止入水亦不落每臨用以火炙動挑敷但藥內粉不可多多則硬
