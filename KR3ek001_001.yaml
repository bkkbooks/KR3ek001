body:
  text: 卷一癰疽證治統論問曰癰疽何為而發也答曰人之一身氣血而已非氣不生非血不行氣血者陰陽之屬也陰陽調和百骸暢適苟六淫外傷七情內賊飲食不節起居不慎以致臟腑乖變經絡滯隔氣血凝結隨其陰陽之所屬而攻發於肌膚筋脈之間此癰疽之所以發也曰然則癰疽有別乎曰癰者壅也邪熱壅聚氣血不宣其為證也為陽屬六腑高腫色紅焮熱疼痛而其發也必暴故所患浮淺而易治疽者沮也氣血虛寒陰邪沮逆其為證也為陰屬五臟漫腫色白堅硬木痛而其發也必緩故所患深沉而難療此癰疽之所以別者然也曰然則其治之也當若何曰初起者審其證而消之成膿者因其勢而逐之毒盡者益其所不足而斂之此治癰之大旨也於是乎未出膿前癰則宣其陽毒之滯疽則解其陰寒之凝已出膿後癰則毒滯未盡宜托疽有寒凝未解宜溫即患陰疽雖在盛暑之時必用辛熱之劑以助陽氣如生陽癰雖在嚴寒之時必用寒涼之劑以瀉火邪不拘盛暑嚴寒但當舍時而從證也曰然則視其外即可知其內歟曰吾聞之醫者意也有諸內則形諸外故四診為醫家辨證之筌蹄而望居其一是以外科之證形色可憑善惡可準一定而不移顯然而易見非若傷寒證有傳經之變也蓋色紅焮痛者實熱壅聚也色白陰痛者虛寒沮逆也憎寒發熱者表邪未解也口渴便祕者里邪未通也紅活高腫者氣血拘毒於外也白塌漫腫者氣血冰結於內也根紅散漫者氣虛不能攝血緊附也不痛堅硬者血凝不能附氣流行也外紅里黑者毒滯不化也紫暗不明者胃氣大傷而肌肉死敗也按之陷而不即高頂雖溫而不甚熱者膿尚未成也按之隨指而起頂已軟而熱甚者膿已灌足也膿色濃厚者氣血強旺也膿色清淡者氣血衰弱也諸如此類審其外悉其內按其委溯其源此所謂望而知之者也曰然則瘡疥之與癰疽同乎否有不發為癰疽而發為瘡疥者何也曰人之軀殼計有五層皮脈肉筋骨也發於筋骨間者疽是也發於脈肉間者癰是也發於皮腠間者瘡疥之屬是也大抵營衛不足濕熱邪風肥甘濁氣淫於肌膚留滯不散則瘡疥所由生或癢或痛或膿或水名類頗多治法不一熱則涼之濕則利之蟲則殺之風則散之燥則潤之滋之更宜戒沐浴以避濕氣忌厚味以清營衛而瘡瘥矣此所以較癰疽之證治有大同而小異者焉噫人能慎養氣暢血盈不使形體有衰則癰疽瘡疥從何而發苟或不然百病叢生又豈惟癰疽瘡疥而已哉古人不治已病治未病非虛語也安得人人及乎其未病而治之歟癰疽部位名記紅腫曰癰白塌曰疽部位既殊稱名亦異在頭為大頭毒於頭頂中為玉頂發百會疽前囟門際為透腦疽側下為侵腦疽囟門前為佛頂疽於額為額疽額角為旁額疽腦後為玉枕疽下為腦後發為對口腦疽偏為偏腦疽為燕尾魚尾毒為腦鑠於發內為油風為蛀髮癬白禿瘡髮際瘡為蠟梨瘡其於嬰孩也為鱔拱頭為螻蛄癤在面為面遊風為肺風粉刺為白屑風為雀斑為黧皯𪒟為黑痣於眉為鳳眉疽為眉心疽眉尾為瘭疽於眼為時火眼為淹纏赤眼為眼丹為偷針為皮翻證為眼疱痰核為眼疱菌毒為睛目中胬肉為椒瘡為漏睛瘡於鼻為鼻癰鼻疔為鼻淵腦漏控腦砂為鼻𧈟為鼻痣為酒皶鼻為鼻衄其下為馬刀瘡於唇以上為唇疽為龍泉疽於唇為唇風為繭唇為反唇疔為鎖口疔唇以下為虎鬚毒於顴為顴瘍顴疔為羊鬍子燕窩瘡為落下頦在鬢為鬢疽為勇疽為顴疔在耳為耳病耳竅內為黑疔耳疳耳挺耳痣耳菌耳上梢後折間為耳後疽耳折間連耳輪通腫為耳發耳垂後為耳根毒耳後縫間為旋耳瘡耳後一寸三分高骨後左為夭疽右為鋭毒於腮為痄腮為發頤為頰瘍為頰疔為面發毒為凍風其口內於大人為口破口糜為牙癰為牙宣為牙疔為齒𧈟為風火蟲牙為齒衄為齒齲為骨槽風為舌腫為紫血脹為舌衄為重齶為痰核為舌疔為舌疳舌菌瘰癧風為舌硬生衣為痰包為重舌為喉痹為喉閉啞瘴喉風為弄舌為乳蛾蛾子喉風為纏喉風為鎖喉為喉癬為喉疳為喉珠為喉菌喉瘤為上齶癰為骨梗其於嬰孩也為鎖牙疳為走馬牙疳為垂癰為白口瘡為鵝口瘡在項為結喉癰為雙發喉側為夾疽夾喉癰為落頭瘡為失榮為瘰癧為氣癭為氣癰為百脈疽項下鎖骨陷中為蠹疽缺盆疽鎖骨疽項後為天柱疽稍下為脾肚癰其於婦人也為鈕扣風在肩正中為肩中疽肩穴中為肩擔肩前廉為干疽肩後廉為過肩疽肩後腋外為膠疽肩稍尖為肩風毒肩前腋上骨縫開合凹陷中為樂疽於臑為臑癰為藕包毒臑後垂肉處為魚肚發肘尖上寸余為石榴疽當肘為肘癰於臂為臂癰臂疽臂外廉為骨螻疽掌後橫紋上三寸為穿骨疽掌後橫紋上二寸為螻蛄串腕背面為腕癰腕裡面橫紋前梢動脈間為兌疽於手為手發背為病蝦為掌心毒為瘑瘡為鵝掌風為虎口疽丫叉毒為合谷疔為紅絲疔為手丫發於大指為調疽於指頂堅硬有頭為蛇頭疔悶腫無頭為天蛇毒指甲旁為蛇眼疔指甲後為蛇背疔指骨節為蛇癤疔指裡面如魚肚為蛇腹疔一指通腫為泥鰍疽指甲身內為代指為甲疽指骨節粗大為蜣螂蛀油灰甲為鵝爪風兩手及臂紅紫斑爛為狐尿刺其於胸也乳上肉高處為甘疽兩乳中央為膻中疽心窩中為井前疽心窩兩旁為脾發疽胸側乳上瘡孔多為蜂窩疽乳旁為𤷍癧癰其於內也為肺癰為胃癰為脾癰為肝癰為腸癰其於婦也為內外吹乳為乳岩為乳疽為乳髮乳癰為乳懸為乳中結核於腋為腋癰腋疽為腤疔為鴨蛋毒於肋為肋疽腋下三寸為淵疽肋骨延及腰胯為內發丹毒肋下軟肉為季腋癰疽在背上下為對肺發對心發對臍發為蓮子發為蜂窩發為酒毒發為丹毒發為連珠發為痰蛀發為陰陽之氣疽為禽疽為肉龜黃瓜癰偏為上中下搭手背脅間為串疽其於腹也臍上七寸為幽疽上四寸為中脘疽胃疽上三寸為嚇疽上二寸為沖疽於臍為臍癰為臍中出水為腹皮癰偏為箭袋為少腹疽旁內緩疽其於內也為息賁為伏梁為痞氣為肥氣為奔豚其於孩兒也為臍突為臍瘡於腰為腎俞發為蛇串纏腰火丹於腎為疳瘡久而偏潰為蠟燭瀉為子癰為囊癰囊脫為腎囊風為懸癰腎囊後為穿襠發大腿根里側縫夾空中為跨馬癰小腹下陰毛旁結腫為橫痃小腹下腿根上折紋中左為魚口右為便毒陰毛際為八腳蟲陰蝨瘡其於婦人也為陰挺為陰腫為蚌疽為陰蝕𧈟瘡為陰脫為陰㿗總名陰瘡在臀為臀癰為臀疽為坐板瘡中尾骨尖為鸛口疽尻骨前肛門後為湧泉疽肛門兩旁為臟毒肛門內外為痔瘡肛門前陰根後中間為偷糞鼠潰經走泄為海底漏尻骨高骨略上為坐馬癰左臀下折紋中為上馬癰右臀下折紋中為下馬癰白為東瓜癰其於孩兒也為脫肛為肛門作癢在股外側跨尖後為股陽疽在胯骨節間為環跳疽大腿外側為附骨疽大腿里側為咬骨疽股內合縫下近囊側為股陰疽右腿夾陰縫折紋中為陰疽大腿正面膝蓋上六寸高肉處為伏兔疽大腿肚為肚癰大腿里側近膝為箕門癰繞腿為腿遊風腿起云片茄色腫硬毒攻牙齦為青腿牙疳於膝為膝癰為疵疽為膝眼風為鶴膝風膝兩旁為緩疽膝後折紋中為委中毒腿凹折紋兩梢旁為上水魚膝腫似人形為人面瘡於腿脛腿肚為腎氣遊風膝眼下三寸外為三里發小腿里側長數寸為黃鰍癰小腿肚下長二三寸為青蛇毒脛骨下足後跟相接處為接骨發內踝上三寸為附陰疽在內為走緩鞋帶疽在外踝為腳拐毒裡外踝骨通腫不紅為穿踝疽生脛骨一二寸為濕毒流注繞脛而生為瓜藤纏於小腿為流火小腿肚中為腓腨發腿肚為魚肚癰孔如鑽眼黃水綿綿為鱔漏腿脛廉骨或里或外為臁瘡兩腿坳及兩腳灣為四灣風脛骨曲坳處為風疽於腳骨為夾棍疽潰為驢眼足背為足背發足心為湧泉疽腳底為牛程蹇足掌起如豆粒黃泡為田螺疱大拇指爛為臭田螺足指色黑旁有紅暈為脫疽足無名指患色白而痛甚為脫疽足指甲旁胬肉高起突為甲疽為肉刺雞眼足跗兩旁小如棗栗為歷疽癰足跗之前上下大如癰為四淫足攣跟為足跟疽足跟旁如棗栗黃腫若琉璃為土栗足跟底起紫白泡為冷疔膝下足上腳氣於腳丫為腳丫疽其於婦人也為裙帶風瘡至若發無定處者為時毒為黃水瘡為惡核為石疽為癭瘤為流注為疔瘡為多骨疽為痼發為蛇瘴瘭疽為大麻風為楊梅瘡為結毒為血箭為痣為血風瘡為白駁風為血疳為赤白遊風為汗斑紫白癜風為癧瘍風為破傷風為發痙為風疳為頑癬為㾦癗為蛇風蝨白疕為疥瘡為大赤瘡為貓眼寒瘡為魚脊瘡為翻花瘡為漆瘡為天泡瘡為栗瘡作癢為傲冬瘡為瘡鼓為天火丹毒為瘴疽為痛風為癢風為毒氣攻心為瘡口誤入毒水為諸瘡生蠅蛆為暑令瘍毒小癤為體氣為黑子痣其於嬰孩也為遺毒爛斑為胎瘤為痘癰痘疽為痘爛為痘風為奶癬胎𤼏瘡或跌撲為金瘡為杖瘡為夾傷為拶傷為湯火傷為鐵針入肉為箭頭入肉為竹木刺入肉為人咬傷為熊虎狼咬傷為馬咬傷為犬咬傷為豬咬傷為貓咬傷為鼠咬傷為蛇咬傷為蜈蚣咬傷為射工傷為蠍螫傷為蠼螋傷為蚯蚓傷為蜘蛛咬傷為羊辣子螫傷為蜂螫傷為蠶咬傷為壁虎咬傷為螻蛄咬傷為螞蝗咬傷為蟻螫傷為砂蝨傷為石蛭傷為海水傷又其惡瘡也為天行瘡為頑瘡為癩瘡為罕瘡為無名瘡其奇疾也為血擁為棠梨疱為肉人為肢鼓為肉蝶為肉線産婦腹中癢為氣旋為氣奔其怪蟲也為號蟲為歷蝨為紅線蟲為續命蟲為濕蟲為腐蟲為肉蛆為信蟲為月望蟲諸名有辨治證無論初起未潰當觀現在之形已潰潰久須問初起之色初起色紅應施癰藥初起色白當用疽丹識證惟精奏效如響胃氣論胃屬土胃氣即土氣也土為萬物之源胃為養生之本胃強則人強胃弱則人弱有胃氣則生無胃氣則死甚矣胃氣之關於人者不亦巨哉經脈別論云食氣入胃濁氣淫於心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟此可知臟腑形體莫不皆有胃氣也凡證之現五善七惡者非臟腑胃氣存亡之明徵乎胃氣一失便為凶候故善治外證者無論大小輕重必先顧其胃氣察其能食不能食以驗之能食者胃氣強內顧無憂固可專治外證不能食者胃氣弱中州坐困禍起蕭牆必須先定內患令其能食待血氣有所資賴然後再治外證所謂本立而道生也然理脾胃者人只知參苓朮草楂朴麥芽之類為脾胃之藥而不知風寒濕熱飲食勞倦皆能傷脾如風邪傷者宜散之寒邪傷者宜溫之濕邪傷者宜燥之熱邪傷者宜清之飲食傷者宜行之勞倦傷者宜補之但去其傷脾胃之病即是理脾胃之正藥也奈何今之業外科漫守一二成方開口便云有毒概用寒涼漫施攻伐以致受害而斃命者不可勝數豈古方之不宜於今也抑藥證之大相背謬耶蓋不察其胃氣之強弱病因之虛實為何如耳且夫古人資稟朴質其從七情干涉者少而從風寒濕熱外感凝滯者多故證之初起每每用霸藥取效今之穿鑿太過七情六欲煩擾之甚而陰陽血氣無有不虧傷者亦偏用霸藥成方以試之是投之於井而更加之以石也吾知其胃氣微虛者猶可出入而胃氣大虛者斷難假借也故曰癰疽外證肌肉之病所用之藥有病則病受之於脾胃何涉乎殊不知肌肉乃脾胃所主治藥乃胃氣所關肌肉不能自病脾胃病之諸藥不能自行胃氣行之諸藥入口必先入胃而後行及諸經以治其病也未有藥傷其脾胃而能愈病者亦未有不能運行飲食之脾胃而反能運行諸藥者也惟明鑑者察之論腫癰疽之起總由血氣壅滯所致如河渠淤塞者然苟使血氣流暢何癰疽之有故火毒壅滯則紅腫焮痛而成癰寒痰壅滯則白塌木腫而成疽癰作突熱治疽作虛寒治一目瞭然不俟診脈可知也及其壅滯既久變好血而成膿創好肌而破口苦矣哉當初未作膿之時急隨癰疽證治消治之俾其痛止腫平安然暢適豈不快歟每見恃能刀針不細察病情當用刀針否漫云泄毒乃殺人不轉睫之徒也不但病人負痛已甚又何能堪此痛苦更有妄施刀針以致潰爛難斂七惡蜂起仁心仁術者諒不妄為若此也論潰癰疽初起失治致肌膚潰爛凡癰將潰之時則先消其未成膿之地而潰不致於延爛既潰之後則補托其未盡之毒而潰不致於翻花有膿成而不自潰者虛人內服代刀散外用咬頭膏無有不潰如氣血壯盛皮肉粗厚之人即以針刺分許亦可但疽始終總以溫補開腠消解為治王洪緒先生云疽初起即見平塌安可用托托則致潰即流注瘰癧惡核等證倘有潰者仍不敢托托則潰者縱斂增出者又如何耶旨哉言也洪氏曰凡大癰潰後世人往往投炙草炙耆或用半炙半生殊不知內托散等方用人參者非以補其虛不過以人參助黃耆托毒之力而無補毒之害蓋炙耆止補氣不能托毒炙草只補中不能解毒倘毒氣未盡誤投炙耆炙草致毒反受補助大痛內攻將如之何余之治凡遇初潰大癰止其痛痛息則毒散其腫亦退色轉紅活體虛年老者參耆甘草皆炙也如體旺家貧者無參亦可收功論斂肌肉者脾胃所主收斂者血氣所關苟使脾胃強血氣旺則昨腐今生朝膿夕斂何致遷延歲月臭爛起肛受苦萬狀故曰初腫宜消其壅滯之漸既潰宜托其惡毒之餘毒盡宜斂斂之法但當大壯血氣純補脾胃不可泛敷生肌之藥蓋毒盛自潰毒儘自斂如水到渠成不容矯強以圖速效若餘毒未盡妄敷生肌藥阻蓋毒氣反致延邊腐臭為害非淺果其痛失腫平色轉紅活而內補外敷不日可斂矣學者審之論痛諸痛皆由氣血瘀滯不通而致凡寒熱虛實膿瘀風氣皆能為痛不可不為之辨夫色赤焮痛者熱也色白痠痛者寒也不脹不悶揉按暫安者虛也又脹又悶畏人挨按者實也痛如筋牽雞啄惡寒惡熱者膿也痛如肉拗氣抽微脹者瘀也痛而走注者風也痛而刺脹者氣也諸痛如此而止痛之法要在臨病制宜熱毒之痛以寒涼折其熱而痛自息寒邪之痛以溫熱和其寒而痛自除因虛而痛者補其虛因實而痛者瀉其實因燥而痛者潤之因塞而痛者通之因膿血閉郁者開之因惡肉浸潰者化之因陰陽不和者調之因經絡祕澀者利之隨機應變方為上上治法也論癢癢雖屬風亦各有因風初起作癢者風熱相搏搔甚即痛是也潰後作癢者膿漚冒風突起顆瘩是也將斂作癢者因初時肌肉結滯氣血不通至此氣血漸和助養新肉癢若蟲行是也他如皮膚搔癢由血燥而風生疥癬延綿屬風淫而蟲蝕證有不同治有微別勿視為一類也五善歌心善精神爽言清色潤鮮瘡疼兼不渴寤寐兩安然肝善身體便睛明不怒煩指頭紅活色起坐自平安肺善聲音響無痰韻更長肌膚多滑潤大便自尋常脾善唇滋潤肢溫便不難膿稠無臭惡知味且加餐腎善誠為要水深火自降口和無燥渴小水得稀長七惡歌一惡神昏憒心煩舌燥干瘡形多紫黑言語自呢喃二惡腰身強睛斜體自寒瘡頭流血水驚悸是傷肝三惡形消瘦膿清臭穢生瘡形多軟陷脾敗不知疼四惡皮膚稿聲嘶韻不長痰多兼喘促鼻動肺將亡五惡成消渴昏眠體不伸形容多慘黑囊縮腎無根六惡身浮腫腸鳴嘔厄頻大腸多滑瀉臟腑並將傾七惡瘡回陷形如剝鱔同四肢多逆冷汙水自流通飲食宜忌論古人治病雖賴乎藥亦資乎餌藥之所忌關乎人之死生餌之宜忌涉乎病人輕重餌者飲食之類也凡病人姿啖無忌以致證候因循反復變態無常固然不可而每有斷戒幾盡若一無可啖者亦不通之甚也夫飲食之所忌者以其與所患之證相妨者也如椒薑面蛋煎炒爆炙之屬俱能助壅動熱患陽癰者忌之瓜果梨柿生冷性寒之屬俱能損胃傷脾患陰疽者忌之雞鵝蝦蟹海味腥膻之屬俱能動風發癢患瘡疥者忌之其餘不與證相妨礙者以及豬肉腰肚海參老鴨蔬菜之品食之無庸忌也況大患潰後氣血兩虛脾胃並弱非有味之物何以滋補虧傷若徒恃區區無情之草木以為調理吾知其無病者且不可而謂其有病者為宜乎人之維身止此血氣血氣已虛不為回護至胃敗陰虛枯陽燔熾七惡變亂而成敗證者是誰之咎歟此乃醫家病家之積弊所以不可不亟講也至於忍餓傷精過飽傷氣茹冷成痞等類又惟在知命者自愛焉陽癰證治則例凡患色紅疼痛根盤寸余者癰也毒發三四日尚未成膿以抑陽散通用五十七圍患外內以醒消丸通用四十七熱陳酒送服三錢其痛即止夜間得睡次日患皮起皺再一服全消如過四五日患將作膿亦以醒消丸與服消其四圍腫硬痛息毒散此以大變小之法有膿之患頂取咬頭膏通用六十一貼加以代刀散通用三十九三錢酒服穿之或以針刺分許穿之以洞天膏通用七十六貼不幾日收功如患盤數寸者或居背心腦後腰肚胸腋陰囊等險穴處則用五通丸通用五十三錢醒消丸三錢早晚以敗毒湯通用二輪服皮皺痛止再服至愈倘潰即用內托散通用三十八醒消丸亦早晚輪服一初起兼發熱惡寒肢體拘急者散消飲通用十一主之待表證退再按前法治之一潰後忽見惡寒發熱等表證者托邪飲通用十二主之待表退按前治法一大便乾燥祕澀雖數日不解宜潤之不可下也潤腸煎通用十三主之如有表證只宜解表表解而里自通設仍不通投以潤腸煎一大癰不論已潰未潰但發熱而不惡寒者此熱勝血也敗毒湯加四物湯通用二十三主之一妊婦患癰不可與醒消丸以丸內有麝香故也宜以仙方活命飲通用一去山甲愈之如即潰餘毒未盡腫硬不消治以內托散去川芎加乳香沒藥一醒消丸內麝香價貴如有家貧不能服者以仙方活命飲代之然不及醒消丸速效陰疽證治則例陰疽之形皆闊大平塌根盤堅硬皮色不異或痛或不痛乃外科最險之證倘誤服寒涼其色變如隔宿豬肝毒攻內臟神昏即死治之之法非麻黃不能開其腠理非肉桂炮薑不能解其凝寒腠理一開寒凝一解氣血流行則患隨消矣血氣不能化毒者則宜溫補排膿雖當潰膿而毒氣未盡腫硬未消亦仍以溫氣血開腠理為要大抵初起患輕未經誤藥者可用加味二陳湯通用十八納陽和丸通用六同煎數服消之如曾經誤藥或皮色稍變須服陽和湯通用五其甚者與犀黃丸通用四十八早晚輪服潰後亦然如失榮惡核石疽等證初起毒根深固者須更兼紫元丹通用五十一間服方能全消凡詳見於各部中宜同參用一初起兼頭痛發熱惡寒肢體拘急等表證者先以保安萬靈丹通用五十四汗之或人參敗毒散通用三去獨活加桂枝一錢汗之待表證退按前法治之一潰後忽見表證則以托邪飲通用十二加桂枝一錢煎服少傾啜熱粥一甌暖臥微汗取效不可令大汗如未效再進待表勢解須接補元氣用補中益氣湯加茯苓半夏熟地最妙一初起或潰後欲嘔而別無表證者胃氣虛也六君子湯通用二十一加炮乾薑主之一潰後但惡寒而不發熱者陽氣虛也十全大補湯通用二十六加薑附主之一潰後見晡熱內熱證者陰血虛也四物湯通用二十三去川芎倍熟地加參朮地骨皮甘草主之一大患久潰或膿血去多忽見發熱惡寒面赤煩躁口雖渴而喜熱飲者此血虛發躁急以當歸補血湯通用三十三或當歸黃耆湯通用三十四服之否則發痙一潰後口乾作渴飲水不歇小便頻數或淋漓作痛或舌上燥黃如金色者乃腎水枯竭心火炎熾此證最惡急用加減八味丸通用四十六以滋補之否則不救遲治亦不救一潰後喘促咳嗽脾肺虛也補中益氣湯去升麻加茯苓半夏五味子主之或加熟地口燥者加麥門冬一潰延日久病人脾虛氣滯者則先服六君子湯加芎歸數劑參朮草宜生忌炙待其飲食復常再按前法治之凡經表汗後亦如是治一好飲之人每發酒毒如陰疽狀發無定處初起漫腫內似結核不紅或淡紅重著板痛多有兼頭暈發熱汗出嘔吐之證此元氣大傷酒毒熏蒸結滯經隧治宜清利濕熱培補元氣內服加味解酲湯見發無定處痼發下外以赤小豆為末滾水或米醋調敷或以烏龍膏通用六十敷之若誤投陽和湯小金丹等甘熱之藥輕則嘔吐膿血重則神昏發狂成痙不救此證從前未經發明余歷視頗多特表揭於此毫釐千里生死攸關業醫者細心審辨焉一凡色白大少陰疽忌貼洞天千捶鯽魚等膏蓋寒涼不利於陰疽且內有巴豆萆麻子未潰者貼則致潰已潰者貼則致命有孕者貼則墮胎故凡陰疽未潰者宜敷抑陰散通用五十八既潰後宜貼陽和解凝膏通用七十七一犀黃丸通用四十八小金丹通用五十二內有麝香妊婦忌服當以陽和湯愈之愈後再服三四劑以代小金丹永杜後患一小兒不能服煎劑者以小金丹化服代之爛潰不斂治法凡潰爛不堪之患外用藥湯通用洗法洗淨撒山蓮散通用七十三內以洞天救苦丹通用五十三每服三錢陳酒送服醉蓋取汗隔兩日又送一服再隔兩日再送一服所空隔之兩日以醒消丸通用四十七每日一服服後毒水流盡七日後再服醒消丸兩次接用大棗丸通用五十五每日早晚各進五錢最危險者可奏奇功翻花起肛治法凡癰疽年久不斂定致翻花四圍起硬肛治之取老蟾破腹連雜以蟾身刺數孔貼蓋患口輕者日易一次重者日易兩次貼蟾之日內服醒消丸通用四十七每服三錢陳酒送下止其疼痛三日後毒盡再服醒消丸通用四十七消其翻花軟其硬肛功效不凡也如大患初潰者亦如前法其毒則從蟾孔出倘肛門硬患孔深取活牛蒡子草根枝葉或取紫花地丁嫩草搗爛塗入肛內皆能拔毒平肛患孔毒根治法凡爛孔有惡肉凸起名曰毒根往往有用降藥爛去者乃庸醫之誤也獨不知弱體豈可增痛況爛去仍又長出安可再爛耶凡遇此證宜貼平安餅通用六十三外以膏藥掩之一日一易輕者二三日重者六七日不癢不痛毒根自落貼時日服內托散通用二十八俟毒根落後服保元湯通用二十八四物湯通用二十三收功漏管治法潰後一經夢遺走泄即成漏管如其素有此疾則先以加減六味丸通用四十六愈之再治其漏法用附子餅豆豉餅俱見通用灸法隨患大小灸之令微熱不可令痛干則易之每灸二三十壯灸後以消管錠通用六十四或針頭散通用六十五紝入管內化之如未知內之深淺可先以豬鬃探之然後用綿紙卷藥為拈量其大小深淺塞入日易日塞至愈乃止多骨治法無論老少皆生多在牙床頦下手足腿膊等處因潰久毒氣流連外被寒邪襲入與膿毒凝滯借人氣血化成法用推車散通用六十六吹孔內如有骨次日不痛自出吹過周時無骨出則知內無多骨也大進溫補消痰之劑不致復生多骨一小兒初生身肉之中按之有如脆骨由受胎時精血交錯所致逮其人長大後其脆骨處必然發腫生疽及潰後多骨脫出其口方收此乃胎元結成稟賦自虛不可強取候其自破則取之治法皆同毒氣攻心治法凡大瘡毒氣內攻多由藥誤乃受降藥毒定致神昏煩躁噁心嘔吐等證急用生甘草一兩煎濃汁調護心散通用四十一令病者時刻呷呷至大半自然嘔止神清然後接服醒消丸通用四十七以平其勢破傷風治法破傷風者因跌撲金刃傷破皮肉及新久諸瘡未合口失於調護風邪乘虛襲入經絡宜亟治之如遲則邪陷三陰頭目青黑額上汗珠下流目瞪身汗如油腹滿自利舌卷囊縮皆莫救矣要在初受風時其證發熱惡風筋脈拘急牙關噤急傷口鏽澀腫脹或四圍起粟作癢此風熱尚郁在表急取玉真散通用四十二錢溫酒調服蓋被曖臥一時許即可消散如入里勢甚舌強口噤項背反張口吐涎沫不省人事四肢抽搐無有寧時者取玉真散三錢用童便調服雖有瘀血亦愈至於昏死心腹尚溫速進玉真散二服亦可保全其患口以熱童便洗淨生南星為末滲之或以水調塗之出水方妙待風邪勢平接進榮養氣血之劑八珍湯通用二十五為宜發痙治法癰疽發痙敗證也勢類破傷風牙關噤急四肢強徑腰背反張肢體抽搐有汗曰柔痙無汗曰剛痙皆緣癰疽大潰亡血過多筋無所養治宜大補氣血用十全大補湯通用二十六手足逆冷加桂附倘誤作中風則速其危矣瘡口誤入毒水治法瘡潰未合誤入皂角汁毒及一切汙穢毒水復致患口焮腫疼痛先以藿香湯洗淨用白礬桃丹炒等分細末撒之或烏梅嚼爛塗之亦可如患有疼痛切骨煩悶發昏恐毒內攻則用馬齒莧五錢酒煎飲之盡醉取效瘡中生蛆蟲治法夏日諸瘡潰爛失於洗滌積膿汙穢致蒼蠅叢聚生蛆用皂礬水飛末摻之其蛆即化為水或以鹿角燒灰醋調塗之或以柏枝燒瀝取油塗之亦有冬月瘡潰生蛆者陰濕所化也治法亦同頭部證治計十證筋脈巔頭頂也巔骨俗名天靈蓋足厥陰肝脈與督脈會於巔足太陽膀胱脈交巔足少陽膽脈交巔腦頭骨之髓也足少陰腎筋屬海髓足太陽膀胱脈絡腦角額兩旁稜處足少陽筋皆直上頭角額顱髮際之下兩眉之上是也亦名顙足陽明胃至額顱手陽明大腸筋上額左角手少陽三焦筋結額上角足太陽膀胱筋下額發足少陰腎主之癰疽就簡百會疽亦名玉頂發生巔頂正中百會穴佛頂疽生囟門之前勇疽亦名腦發疽生目小眥之後五分童子髎穴鬢疽生左右鬢角額疽生額正中旁額疽生額左右角上玉枕疽生腦後玉枕骨上四寸半近腦戶腦後發生玉枕之下風府穴透腦疽生百會穴之前囟門之際侵腦疽生透腦疽前側下五處穴腦鑠生腦後風府穴二大筋之中穴中央發疽生髮內囟門上小兒患名鱔拱頭俱按癰疽則例治之大頭毒俗名大頭傷寒頭目赤腫耳前後尤甚疼痛不可忍發熱惡寒咽嗌填塞牙關緊急涕唾稠黏飲食難下不得安臥此乃寒復皮毛郁遏經絡不得散聚而為腫宜以苦溫之劑溫之溫經散寒用托裡溫經湯依方服之以薄衣復其首以厚被復其身臥於暖處使經血溫腠理開寒氣散陽氣升大汗出後腫減八九再去麻黃防風加連翹牛蒡子全愈一凶荒之際疫氣流行凡患如前證而家家戶戶傳染者當按後面部時毒之法治之托裡溫經湯麻黃五分或八分升麻五分防風乾葛人參白芷當歸白芍甘草蒼朮各一錢上水二鍾煎一鍾服臥暖處得汗乃散或加柴胡鱔拱頭潰久名螻蛄串患生嬰孩頭髮內腫塊不紅初起往往錯認跌腫至高大作疼方知覺醫者每以為頭屬陽漫用清涼解毒是以潰者內膿復拱增出不一不知此患色白其膿不紅乃陰寒虛弱之證也宜用小金丹療之初起三服乃消潰後七丸而愈外貼陽和解凝膏如能服煎劑者則以加味保元湯加當歸熟地服之尤善小金丹通用五十二陽和解凝膏通用七十七加味保元湯通用二十九鬈毛瘡又名髮際瘡生頭上及頂後髮際頂白肉赤狀似葡萄痛如錐刺癢如火燎破流膿水亦有浸淫發內者惟胖人多生之乃內郁濕也宜貼以黃香餅黃香餅黃柏一兩乳香三錢上各末共研槐花煎水調作餅貼之禿瘡生頭皮上初起小者如豆大者如錢其癢難堪撓破出水結白膿痂日久延漫成片發盡根絶此證多系胎毒宜用防風通聖散料以醇酒浸透焙為細末每服一錢或二錢量其壯弱用之食後白滾湯調下服至頭上多汗為驗外於剃頭後煎滾水沖灰湯溫洗敷掃蟲散敷後不可再洗日日敷藥至愈乃止防風通聖散通用七以八劑作一料生甘草倍用掃蟲散獨核肥皂一個分開去核以洋糖填實內入巴豆仁每片兩粒半仍將肥皂合好外用線扎合泥包固火煅取出冷定去泥研為極細末輕粉末檳榔各八分上藥共研細末香油調膩敷之附方存驗大風子仁木鱉子仁蛇床子各五錢輕粉三錢上藥共研細末麻油入小鍋內熬至滴水成珠調之以刀刮去瘡痂花椒湯洗淨將藥敷上日敷一次八日愈又附方存驗藜蘆一兩上研極細末豬脂調塗之蛀髮癬頭上漸生禿斑久則運開乾枯作癢由陰虛熱盛剃髮時風邪襲入孔腠摶聚不散血氣不潮而成用生木鱉切片浸數日入鍋煮透煎湯剃髮後洗之搽蜈蚣油至愈乃止又法用草烏連皮切片炙脆研粉醋調日塗三次數日愈蜈蚣油大活蜈蚣三條用菜油三兩浸四五日後以油聽用肥瘡俗名黃水瘡隨處可生而生於頭面者居多初如粟米癢而兼痛破流黃水浸淫成片干則結成堆痂屬脾胃濕用白明礬研粉鋪綿紙上卷作長條打成結子幾個入菜油浸透放鐵篩上用火燒結結內油滴下以碗盛之燒至枯將諸結研粉稱之加制松香末等分共調油內熱以拂瘡早晚兩度五六日愈或以花椒湯洗淨擦繡球丸亦效或以六一散加枯礬麻油調搽每六一散一兩入枯礬二錢立效忌食肉蝦蟹一切動風助熱之物食則延開難愈繡球丸見發無定處瘡疥白屑風又名白駁生髮內初起微癢久則漸生白屑迭迭飛起脫之又生此風熱所化也用零陵香官白芷等分煎汁俟冷入雞子白攪勻日塗二次或以二味浸油飾發香澤異常且不起屑如有延生面目耳項燥癢者當於後面部油風參治油風又名鬼剃刺俗稱落髮頭髮乾枯成片脫落皮紅光亮癢甚由血燥有風所致夫發為血餘腎主發脾主血發落宜補脾腎故婦人産後脾腎大虛多患之丹溪云脈弦氣弱皮毛枯稿頭髮脫落黃耆建中湯主之發脫落及臍下痛者四君子湯加熟地黃鹿角膠每日清晨用醇酒化服三錢至於外治方法雖多而錯節盤根還當內治一白禿無發用川椒四兩酒浸收瓷器內蓋好不泄氣日以搽之一赤禿無發用牛角羊角燒灰等分豬脂調敷一病後發落用猴薑野薔薇枝煎汁刷之一發禿不生用嫩棗樹皮一把斫一尺許滿插空瓷瓶內勿令到底上面以火燃之則下面必有汁滴瓶內先以熱水洗頭後將此汁刷在禿處即生髮矣一毛髮黃赤用羊矢燒灰和臘豬油塗之日三次夜一次至發黑乃止一發稿不澤用木瓜浸油梳頭或用胡麻油常塗之梳須用黃楊木者佳一年少發白當拔去白髮以白蜜塗毛孔中仍用梧子搗汁塗之必生黑髮又方青羖羊矢納鯽魚腹中瓦缶固濟燒灰塗發易生而黑甚效一頭上生蝨用水銀同茶葉漬濕搗和不見水銀塞發內數日即盡又方用銅緑明礬摻之或用藜蘆末摻之俱妙黃耆建中湯桂枝木一錢炙甘草一錢芍藥三錢黃耆五錢膠飴一兩大棗六枚生薑一錢上水煎去滓入膠飴微火上燉和溫服嘔家不可用此方以甜故也四君子湯通用二十腦蝕腦中痛若有蟲蝕食髓者用桃葉作枕枕之其蟲自鼻出頭響頭響乃氣挾肝火加味逍遙散主之通用十六亦有頭內如蟲蛀響名天白蟻用茶子研細末吹鼻中即效面部證治計十六證筋脈面頭前曰面五臟之精氣上熏於面顴骨之下迎香穴之外為面中央應乎手陽明大腸兩顴之內面主之上應乎手太陽小腸其脈循頰上䪼目下眶骨斜絡於顴山眉眉心曰闕足厥陰肝脈從目系過眉上額足少陽膽筋脈過眉角顴顴為骨本即面兩旁之高起大骨也腎主之足太陽膀胱足少陽膽手陽明大腸筋皆結顴足陽明胃經合顴太陽小腸脈經顴髎穴在頄下鋭骨端陷中頰耳前顴側面兩旁之稱也手陽明大腸脈筋俱上頰手太陽小腸脈上頰足陽明胃脈循頰而上足少陽脈過頰足厥陰肝脈下頰手少陽三焦筋過曲頰脈亦交頸頷頜下結喉上兩側肉之空軟處也手太陽小腸筋結頜足少陽膽經脈俱過頜人中鼻柱之下唇之上穴名水溝手陽明大腸脈交人中督脈人中水溝穴髭在口上曰髭大腸主之血氣盛則髭美衰則無髭須在口下曰須大腸主之血氣盛則須美衰則無須髯在頰曰髯胃主之血氣盛則髯美而長血少則髯短氣少則髯少血氣皆少則無髯癰疽就簡顴瘍顴疽生顴骨尖處頰瘍生耳下頰車骨間鳳眉疽生眉稜骨眉心疽生兩眉中間又名印堂疽虎髭毒生下唇之下中央又名頦癰又名承漿疽俱按癰疽則例治之一形小如豆色紫頂焦或如泡麻癢木痛惡寒發熱者疔也當按疔瘡治法如生人中正中名龍泉疔尤惡稍遲多致不救時毒俗名大頭天行時毒者四時不正之疫氣而感於人也初覺憎寒發熱恍惚不寧肢體痠痛或兼咽痛次發腮項頷頤耳前後腫盛無頭或似結核或兼起疙瘩甚至頭面俱腫焮赤疼痛口舌乾燥咽喉不利常見年歲凶荒芻蕘之人多患之乃飢飽不時胃氣有損邪氣乘虛而入客於心肺之間上攻為患宜從輕治安里為主兼升散解毒用普濟消毒飲最善如不應則宜砭去惡血仍投前藥即應更於鼻內搐通關散取十餘嚏即效若搐藥不嚏及神昏喉塞語言不出者不治凡左右侍病之人日日用搐藥取嚏始不傳染此預防之法也閲諸書治法凡初起耳項腫痛狀似傷寒惡寒發熱者人參敗毒散微汗之兼口渴大便祕結表裡俱實者防風通聖散疏利之無表裡證或已汗下腫不消者小柴胡湯加連翹元參桔梗薄荷鼠黏子天花粉或加酒炒黃連和解之如已汗下解毒不消勢將作膿氣弱難潰者用消毒托裡此皆古人治時毒之法録備參用普濟消毒飲黃連五錢酒炒黃芩五錢酒炒橘紅二錢元參二錢生甘草二錢人參三錢連翹一錢馬勃一錢鼠黏子一錢薄荷葉一錢板藍根一錢桔梗二錢白殭蠶七分炒升麻七分柴胡二錢上為細末半用湯調時時服之半用蜜丸噙化之服盡即愈或加川芎當歸㕮咀三五錢水煎稍熱時時服之如大便硬加熟大黃一錢或二錢以利之消毒托裡散黃耆人參白朮當歸白芍川芎甘草白芷金銀花熟地黃等分量用之上水煎分瘡之上下食之前後服之通關散細辛用真者藥店每以馬蹄香草亂之薄荷豬牙皂角上等分為極細末以紙拈少許入鼻內候得嚏口開隨進湯藥一方只用二味無薄荷人參敗毒散通用三防風通聖散通用七小柴胡湯通用十四面腫面腫有虛實虛腫者形羸脈弱無痛無熱面目浮白或兼氣喘乃大虛之候用八珍湯十全大補湯主之實腫者形強脈壯紅腫面熱煩渴或按之痛乃陽明壅實風熱上攻小兒多有此證宜用防風通聖散甚者以木香檳榔丸下之外以杏仁杵膏塗腫處一因飲酒過度濕熱上蒸麵腫者用四君子湯加藿香葛根滑石天花粉主之二甑上熱氣熏面腫痛者用炊布燒存性敷之木香檳榔丸木香檳榔青皮醋炒陳皮炒枳殼炒黃柏酒炒黃連吳茱萸湯炒莪朮以上各五錢醋煮三稜五錢醋炒大黃一兩酒浸香附黑牽牛各二兩上用芒硝水丸每服一錢或二三錢量虛實服八珍湯通用二十五十全大補湯通用二十六防風通聖散通用七四君子湯通用二十面瘡亦名面發毒生面上頰車骨初起一個漸發數個形如赤豆色紅焮腫疼痛堅硬似疔時浸黃水系肺胃風邪內用地榆山梔紫草薄荷各二錢枇杷葉去毛五錢生甘草一錢竹葉二十片水煎熱服外取柳葉湯洗面土瓜根汁塗之或杏仁研如泥雞子白調敷之一有瘡如水痘延蔓遍生者用黃柏一塊豬胰塗炙酥為末濕者乾摻乾者麻油調搽二婦人面起細瘡名粉花瘡用定粉五錢菜油調泥碗內以艾葉燒煙燻之候煙盡覆地上一夜取出搽之且無瘡迹痄腮又名含腮發頤又名汗毒患生於腮有曰痄腮有曰發頤當分別治之腮內痠痛者痄腮也以赤豆散敷之病後兩頤發腫不作痠痛者發頤也宜表散風毒用白芷天麻防風荊芥各一錢陳酒煎服醒消丸三錢即愈赤小豆散赤小豆一味研細末米醋調敷立愈醒消丸通用四十七皯瘡面上起紫疱名皯瘡系肝火用四物湯加胡黃連柴胡甘草膽草黃芩人參煎服外取鹿角尖磨濃汁厚塗之一生紫塊疙瘩大如錢或滿面俱有漸成麻風用牛舌草根四兩取汁穿山甲十片燒存性川椒末五錢生薑四兩取汁研和細絹包擦如藥干加醋調連擦數次即愈忌食動風物面遊風初起面目浮腫燥癢起皮如白屑風狀次漸癢極延及耳項有時痛如針刺濕熱盛者浸黃水風燥盛者乾裂或浸血水日夜難堪治宜養血潤膚飲兼六味地黃丸早晚輪服十餘日取效外用生豬脂頻潤抹之或用鰻鱺魚汁取油塗之養血潤膚飲當歸三錢熟地生地黃耆各四錢天冬去心麥冬各二錢去心升麻片芩各一錢桃仁泥紅花各六分天花粉一錢五分上水煎溫服如大便燥結加火麻仁郁李仁各五錢如風盛癢甚加明天麻一錢五分面塵又名黧黑斑又名黧黑皯𪒟面色如塵垢日久煤黑形枯不澤或起大小黑斑與面膚相平由憂思抑鬱血弱不化外用玉容散每早晚蘸以洗面內宜疏膽氣兼清肺加味歸脾湯送六味地黃丸主之有女貞散一方方理頗佳附録備用一有好食斑鳩而致者初面生黑斑數點日久面俱黑蓋斑鳩常食半夏苗以中其毒故也用生薑一味搗取汁將渣焙乾研細即以汁糊丸每日早晚服二三錢一月可愈女貞散黃丹水飛去鹽砂炒透攤地出火氣用紫菀真者上二味等分為末每服二錢日兩服陳酒下玉容散甘松山奈茅香各五錢白殭蠶白芨白蘞白附子天花粉緑豆粉各一兩防風零陵香藁本各三錢肥皂三錢去皮弦香白芷一兩上為細末每日早晚蘸末擦面附方存驗羖羊脛骨上為細末雞子白調敷日以白梁米泔洗之三日效加味歸脾湯通用三十二六味地黃丸通用四十三雀斑生面部碎點無數其色淡黃或淡黑乃腎水不榮於上浮火滯結而成內宜服六味地黃丸以滋化源外用玉容散早晚擦洗自愈六味地黃丸通用四十三玉容散見前面塵黑痣形如黴點小者如豆比皮膚高起一線有自幼生者有中年生者系經絡之血滯於衛分陽氣束結而成用線針撥破痣頭以膏點之不可太過恐傷好肉三四日結痂其痣自落須戒醬醋愈後無根點痣膏一名水晶膏礦子石灰五錢為末濃鹼水大半茶鍾浸之以鹼水高灰二指為度取糯米五十粒撒於灰上如鹼水浸干陸續添之泡一日一夜冬月兩日一夜將米取出搗爛成膏先以線針撥破挑少許點之點多恐傷好肉眉核眉間生核初如豆日久漸大如桃宜養肝血清肝熱益元氣用逍遙散犀黃丸日服消之外以生南星末蔥汁調敷逍遙散通用十五犀黃丸通用四十八眉瘡眉叢生細瘡如疥作膿破流黃水結痂小兒多患之用穿山甲前膊上甲炙焦為末入輕粉少許研勻菜油調搽即愈又方用蒜瓣燒灰燈盞油調搽一眉毛脫下用橄欖核火煅存性研細麻油調火上燉微熱以指頭蘸油於兩眉不住揩抹又方垂楊柳葉陰乾為末用薑汁於鐵器中調之夜夜摩抹俱效一眉毛不生用白芥子半夏等分為末生薑自然汁調搽數次即生眉稜骨痛眉屬肝肝脈從目繫上額肝膽相表裡足少陽風熱與痰則眉稜骨痛用加味逍遙散加天麻防風半夏治之熱盛者加黃芩兼頭惡寒者去白芍丹皮梔子加川芎羌活一有眼不能開晝靜夜劇是濕痰則用二陳湯加蒼朮枳殼蘇子一有肝虛血少才見天明眉稜骨疼用四物湯加甘菊鮮首烏挾風加羌活防風有熱加丹皮黃芩加味逍遙散通用十六二陳湯通用十七四物湯通用二十三眉跳眉跳者眉毛搖動目瞪不能視喚之不應但能飲食乃奇證也用蒜三兩取汁酒調服落下頦落下頦乃氣虛之故不能約束機關也令患者平身正坐以兩手托住下頦左右大指入口內納槽牙上端緊下頦用力往肩下捺關竅向腦後送上即投關竅隨用絹帛兜頦於頂上半時許去之即愈又方用烏梅一枚含咽亦可自上燕窩瘡生於下頦初如粟如豆色紅熱微癢痛破津黃水頗類黃水瘡但疙瘩如攢耳系脾胃濕熱宜服芩梔平胃湯外搽碧玉散芩梔平胃湯蒼朮二錢炒甘草五分厚朴一錢二分陳皮一錢二分黃芩一錢五分山梔仁一錢五分上水二鍾煎八分食遠服碧玉散黃柏末紅棗肉焙乾存性為末上等分加枯礬減半共研細末香油調敷麵皮破凡麵皮跌破及抓破用人乳頻塗立結靨即日愈或生薑自然汁輕粉末和塗眼部證治計二十三證筋脈睛窠一名目胞即兩目外衛之胞也血之精為目窠之總絡瞳神俗名瞳人屬腎為骨之精腎水虧損英華不斂則瞳神散大無光黑珠瞳人黑輪屬肝為筋之精內連目系內廉深處目睛入腦之系肝火上衝則兩輪赤痛白珠黑輪外四圍白處屬肺為氣之精肺火上騰則白珠有紅筋目綱即上下目胞之兩瞼又名曰睫屬脾為肌肉之精足太陽膀胱細筋散於目上網足陽明胃細筋散於目下為目下網兩眥近鼻之眼角為內眥亦名大眥近鬢之眼角為鋭眥亦稱外眥屬心為血之精手太陽小腸支脈至內眥足太陽膀胱脈起內眥手太陽小腸手少陽三焦筋脈俱至鋭眥足少陽膽脈起鋭眥筋亦結內眥睫毛脾胃主之淚肝主之肝風動則淚出淚熱肝實淚冷肝虛治目大要目有專科諸書多略之然有他證兼患目者治目之道安可不明夫五臟六腑之精氣雖皆上注於目大要則在三經肝開竅於目故論目必首肝然有心神散亂卒見非常之怪或精散視歧觀一物為兩則心又為目之大關蓋諸脈皆屬目心主脈者也而脾又為諸陰之首五臟六腑皆稟脾氣上貫於目而為明脾胃虧損臟腑之精氣皆失所司不能歸明於目矣細辨虛實再辨虛實之在氣在血暴發在表為實久病在裡為虛虛者昏暗黑花瞳散在氣則澀視物不明在血則酸乾枯少潤治宜養肝血安心神尤必先理脾胃實者赤腫脹痛翳膜眵淚治宜除風散濕涼血平肝此治目大要也點洗之方只宜辛平若用寒涼阻逆之致邪熱內攻反成翳障及妄將冷水冷藥冷物浥洗致昏瞎者有之不可不慎目赤腫目為肝竅目病宜歸肝凡紅赤腫痛及少壯暫得之病皆作肝實血熱治肝為相火治當益陰陰旺而相火自平肝主風木又為外邪合之則腫而痛治當散邪邪去而內風自息閲坊書眼科多用苦寒辛散等藥非所宜豫因治復目湯一方藥雖平淡而屢用屢效蓋目為五臟六腑之精氣不堪投猛峻藥外治則用丹砂散點之最為穩妙一有時火暴甚而赤痛異常者用雞子黃連膏點眼眥勿令緊閉等熱淚湧出數次即愈一凡年及中衰或酒色過度目無腫痛但羞明昏暗瞪視無力珠痛如摳等證則皆屬肝腎之不足也治參內障條一損目破睛用牛口涎點之如睛突出者急揉進日點二次須避風即黑睛破者亦有可愈一眼目被打傷青腫者用生半夏為末水調敷之復目湯當歸二錢赤芍二錢大熟地五七錢或用生地黃芩一錢五分酒炒薄荷二錢甘菊二錢甘草五分川芎一錢上水煎食後臥時稍熱服癢加蟬蛻防風各一錢五分腫加羌活木通各一錢痛加酒連五分山梔仁一錢翳膜加木賊刺蒺藜各二錢柴胡一錢或八分傷酒加葛根二三錢目珠夜痛加夏枯草香附各二錢目中赤脈加密蒙花二錢白眼上紅不退加桑白皮三錢兩瞳痛去川芎加澤瀉一錢五分鹽炒黃柏一錢肝虛淚多加鮮首烏五七錢或一兩紅腫而不羞明者加山萸肉杜仲各二錢腫痛兩眼如桃合而為一痛不可忍者先用防風通聖散下之然後服此方加連翹蔓荊子各一錢五分丹砂散此李時珍方也點治諸眼皆妙海螵蛸去殼皮爐甘石上好者煅淬童便浸七次飛用硼砂各一兩辰砂水飛五錢用此則不枯上研極細末如灰瓷瓶收貯臨用少加冰片研點二百味草花膏羯羊膽一枚白蜜五錢要真白蜜未用上白洋糖兌過者上將膽汁同蜜和勻碗盛蒸稠如膏瓶收每用少許點之如日久藥干用人乳潤之雞子黃連膏雞子一枚黃連粗末一錢上將雞子開一小竅取雞子清以瓷碗將黃連末子摻於雞子清上用箸徹底速攪打數百使成浮沫約得半碗許傾出清汁用點眼眥勿得緊閉眼胞擠出其藥待熱淚湧出數次即愈內加冰片少許尤妙按此方治火眼暴赤疼痛熱在膚腠淺而易解者點數次可愈如熱由內發火在陰分者不宜用此寒涼非惟不能去內熱而且閉其火邪也內障內障與不病之眼相似並無腫痛翳膜惟睛昏黑無光若有所障然內實無障也其珠色青藍或微兼緑色眼科雖有烏風障緑風障青風障黃風障高風昏花障肝虛目脹振驚內障等名總由血少神勞肝腎虧損精竭視昏神竭視黑治當專補腎水兼補其氣用加味明目地黃丸或八珍湯加甘菊淮山藥牛膝山萸肉枸杞子穀精草五味子夏枯草天冬麥冬等藥酌用之一目珠痛至夜更甚連眉稜骨及頭半邊腫痛以苦寒藥點服反甚者用夏枯草香附炒各二兩甘草四錢共為末每用三錢清茶調服四五服可愈一目中見禽蟲飛走紛紛不已者肝膽病也用酸棗仁炒羌活青葙子元明粉各一兩為末每水一盞藥末二錢煎和渣服日二次加味明目地黃丸生地黃一斤酒炒人參四兩五味子三兩牛膝二兩麥冬六兩去心歸身五兩甘枸杞五兩甘菊八兩上研極細末煉蜜為丸八珍湯通用二十五外障外障者眼生翳膜如圓翳色白或大或小冰翳如冰凍堅白滑翳如水銀珠子微黃色澀翳色微赤如凝脂散翳點如魚鱗乍白橫翳橫如劍脊下微黃甚薄浮翳白色環繞瞳人沉翳藏精深處偃月翳形如月牙棗花翳周圍如鋸齒白翳黃心生小眥頭四邊白中心一點黃黑花翳青色星月聚散翳黑珠上四五點白心斑瘡入眼胬肉攀睛此皆有餘之證多由腎水虧乏陰火內郁不得升發或誤用寒涼點洗致風熱阻逆而成初起邪氣未定翳膜浮淺者易治日久邪氣已定翳膜深牢者難治治宜宣發不宜疏利疏利則邪氣內蓄為翳益深當用撥翳湯藥肝湯早晚輪服使邪動翳浮佐以丹砂散點之緩緩取效戒暴躁惱怒並忌煎炒辛熱等物一胬肉攀睛大眥赤肉堆起用杏仁十四枚去皮尖嚼吐於手心乘暖以綿纏箸頭點胬肉上日三次胬肉漸消一赤脈貫瞳人用元參為末米泔煮豬肝日食之撥翳湯生地黃三錢歸身一錢五分柴胡天花粉牛蒡子川芎防風薄荷草決明白蒺藜密蒙花穀精草白粉葛梔子酒炒木賊草去節羌活各八分川連三分酒炒甘菊二錢上加生薑一片水煎食遠服如大便祕澀者加酒炒大黃一錢五分大便通潤仍除之按每日早服藥肝湯晚服此劑藥肝湯黑羊肝七尖四兩如無羊肝即用公豬肝亦可兔糞八枚木賊去節當歸身各二錢蟬蛻二十四個去頭足上先將兔糞木賊當歸蟬蛻四味用清水二大碗入瓷罐內漫火熬滾令其性味俱出後將羊肝七尖切薄片入於湯內一刻即熟先飲湯後食肝每日清晨用之晚服撥翳湯兩月之久翳膜可消一半百日可全愈還瞳散存驗消翳膜遮睛密蒙花一斤蜜水拌蒸木賊四兩去節微炒川羌活八兩蜜炒白蒺藜四兩焙黃去刺石決明四兩九孔者良火煅上共為末每服二錢清茶下丹砂散見前目赤腫痛迎風流淚淚為肝液風行水流風動則淚出又肝熱多淚如燒竹瀝火炙瀝出迎風出淚風火合也火發風沖相搏致淚疏風散火雖是正治亦當審肝經之虛實實用復目湯加防風蔓荊子首烏虛加人參外用霜後桑葉煎水頻頻洗之復目湯見前目赤腫目癢凡目運眩多淚癢不可忍者風也風動肝木吹噓鼓舞故運眩不止無火故不痛治以疏風為主四物湯加防風荊芥蘇葉薄荷各二錢主之或加蟬蛻殭蠶四物湯通用二十三暴盲平日目無他病外不傷輪廓內不損瞳人倏然盲而不見此氣脫大虛之候急煎人參膏或保元湯大劑熬膏服之血脫者亦照此治經云血脫益氣是也一有平素好飲熱酒胃氣受傷汙濁之血積其中而然者必其形實脈澀用四物湯加蘇木桃仁紅花陳皮煎調人參服之如二三服後鼻面見紫黑色者此滯血行也再服數劑愈謹按丹溪醫案人參下有末字一有因受陰濕之氣胃陽受困忽然視物不見或有時略見而不明其人必食減神倦脈緩大無力用白朮為君黃耆茯苓為臣附子為使服十餘劑愈一有每睡起則視物不明或赤腫良久卻愈者此血熱也用生地汁浸粳米半升曝令透骨幹再浸再曝三次用瓷瓶煎湯令沸下地黃米四五匙煮成薄粥湯待溫食半飽後飲三盞即睡數日愈或用四物湯去川芎倍生地加丹皮黃芩酒炒各一錢水煎臨臥服數劑愈保元湯通用二十八四物湯通用二十三雞盲俗又名雀盲外科曰高風內障兩眼至晚不見至曉復明此元陽不足之病用蒼朮散久服自愈蒼朮散茅山蒼朮米泔水平浸一宿切片焙乾上為細末每用三錢取羊肝如無羊肝以豬肝代之二兩批開攙藥入內麻線縛定用酒一合水一碗砂鍋內煮熟臨臥服之赤眼淹纏赤眼有經年不愈者皆因肝腎陰虛邪熱留滯故耳用桑白皮杜仲各二錢厚朴檳榔各一錢共為粗末取雄雞肝一具不經水去紅筋同藥入白酒釀六兩隔湯煮熟瀝去藥渣以酒肝食之隔兩日再如法食一法接用六味地黃丸加首烏四兩密蒙花二兩同為丸服之愈六味地黃丸通用四十三爛眼眼眶沿邊赤爛垢膩乃脾經濕熱上蒸用萬金膏貼之熱盛者服瀉黃散一濕熱鬱久必生蟲用覆盆子葉搗汁以紗蒙患上滴漬下少頃蟲從紗中出其細如線赤而長不過三四日蟲盡即愈或收復盆子葉曬乾擂細末臨用以人乳少許浸半日用之萬金膏五倍子黃連防風荊芥穗當歸川芎苦參各四錢銅緑五分上生研極細末以薄荷煎汁丸彈子大臨用時以熱水化開一丸乘熱洗眼日三次神效瀉黃散石膏四兩煅防風二兩蜜水炒豬蘞草三兩酒炒曬乾梔子仁一兩生用生甘草二兩上研極細末每服二三錢小兒服一錢白滾湯調下日二服拳毛倒睫脾胃氣虛目緊皮縮眼瞼上小睫毛倒入眼中謂之拳毛倒睫補中益氣湯加石斛蟬蛻川芎主之禁用芍藥五味等酸收之劑外取蝨血點入眼內數次愈又法用木鱉子一個去殼為末綿裹左眼塞右鼻右眼塞左鼻數夜自愈一有伏熱內攻陰氣外行所致者去其伏熱眼皮便寬則毛立出宜用升陽散火湯外治同上升陽散火湯連翹黃芩蔓荊子升麻羌活柴胡各一錢五分歸身二錢生地四錢甘草一錢生用上水煎食後溫服補中益氣湯通用三十偷針眼生睫邊形如豆粒有尖以線針刺破即瘥故俗名偷針乃太陽經結熱也如刺後風邪襲入瘡口面目浮腫目赤澀痛者用芎皮散二錢菊花湯調下覆頭出汗即愈芎皮散川芎二兩青皮一兩共為細末每服二錢菊花煎湯調服附方存驗生南星末同生地黃搗膏貼太陽穴針眼自消即刺後冒風亦可愈眼丹風熱搏於眼胞則患眼丹紅腫脹痛風盛者腫軟下垂不能視物用荊防敗毒散散之熱盛者焮紅紫色堅硬或疼痛用仙方活命飲去栝蔞根加羌活川芎消之如日久不消成膿欲潰者按陽癰則例治之然須速愈若潰久潰深亦能成漏荊防敗毒散通用四仙方活命飲通用一眼瘤眼皮上突出一紅疤懸如魚膽用過江蜘蛛絲蜘蛛牽絲搭過屋者為過江纏之即脫又方用櫻桃核磨水搽漸漸自消眼痔生上下眼睫邊頭大蒂小黃殼水泡如菌形或頭小蒂大漸長垂出堅凝不痛纏綿經年不愈致成目疾初起用清涼丸洗之自消有經年皮厚藥不應者法當用軟綿紙蘸水潤眼皮菌毒處少頃用左手大指甲墊於患根右手持披針尖頭齊根切下血出不妨用翠云錠子磨濃塗之其血即止內服涼膈清脾飲忌海味魚腥煎炒清涼丸當歸尾石菖蒲赤芍各二錢川連生地膚子杏仁各一錢生羌活五分膽礬二分上共研粗末以大紅綢包之如櫻桃大滾水浸泡乘熱熏洗忌入塵土翠云錠子杭粉五兩銅緑黃連各一兩輕粉一錢上共研細末用糯米百粒水一盞煎半盞汁濃去米再煎至三分和藥作錠陰乾用時水磨令濃以雞翎蘸塗患處涼膈清脾飲生地連翹去心梔子生研薄荷荊芥防風石膏黃芩赤芍各一錢甘草五分上水二鍾燈心二十根煎八分食遠服皮翻證痘風眼翻眼皮外翻如以舌舐唇之狀小兒多有之痘風眼爛胞腫弦緊則眼皮亦翻治法皆宜瀉脾胃之積熱瀉黃散主之瀉黃散見前爛眼眼胞痰核生上下眼胞皮里肉外大者如棗小者如豆推之移動不紅不疼用生南星磨粉薑汁或米醋調濃頻敷日淺者即消日深者兼服二陳湯陽和湯即效椒瘡粟瘡二證生於眼胞之裡有如沙擦開張不便多淚而痛其纍纍堅赤者如椒粒名椒瘡其細顆黃軟形如黃粟者名粟瘡俱宜服清脾涼血湯外以清涼丸洗之如眼皮里有紅絲堆纍者乃血熱有瘀也法以燈草刮絲處令血出即愈一睛上生瘡用桑皮一兩以清水於白碗內浸半日視水碧色為度箸頭纏綿蘸點滿眼微痛勿畏良久瀝去熱汁日點十次不過二三日可愈清脾涼血湯荊芥防風赤芍元參陳皮蟬蛻蒼朮炒白蘚皮連翹去心大黃各一錢五分酒洗厚朴五分生甘草五分上加竹葉三十片水煎食遠服清涼丸見前眼痔漏睛瘡生大眼角太陽膀胱經睛明穴其穴系藏淚之所初起如豆如棗紅腫疼痛瘡勢雖小根源甚深初宜復目湯加連翹防風荊芥銀花各一錢五分生梔仁柴胡各一錢燈心五十寸水煎服之如潰後有膿從大眥內出者成漏難治可用柿餅搗爛塗之或黃丹水飛炒極細鯉魚膽汁和成膏日點三五次若潰斷眼邊弦者不治復目湯見前目赤腫痛肝脹眼前垂下至鼻大便血出此名肝脹羌活一味水煎數服愈一方用獨活血噴眼內白珠忽黑見物如舊毛髮徑直不語如醉此名血濆用五靈脂二錢酒調服愈一有目赤鼻張大喘渾身發斑發如銅鐵絲硬乃熱毒結於下焦用白明礬滑石各一兩水三碗煎一碗半不住口飲盡即愈眼衄眼中赤血如射此陰虛相火旺之病宜用生地熟地各五錢當歸白芍各二錢知母黃柏木通側柏葉柴胡黃芩各一錢桃仁紅花各五分水煎溫服小兒目疾孩兒患目赤痛不能服藥者用胡黃連細末一錢人乳調按男左女右塗腳心湧泉穴即愈如眼生白翳取桑汁以燈心點之即退一痘後毒火攻目皆因長漿時不知用藥攻漿漿不充滿故至回水收靨之際無形之毒火上炎攻注兩目眼胞紅腫不能開放急以消毒保目湯連服二三劑解之猶可免患如遲至毒火亢極翳膜遮蔽瞳人痛苦異常日夜叫啼以致兩目喪明則成廢人矣斯時治之亦當用清毒保目湯解之於前看有翳膜遮蓋黑白珠侵入瞳人者徐徐用撥翳湯治之於後或隔一日一劑雖三四月之久尚保無虞不可過用寒涼責效於數劑之間又不可聽庸俗眼科用藥磨點登時損廢一痘後初開眼內有星翳者取燕脂泡水鋪紙上以新筆在紙上蘸水拂翳日三次三日愈遲治貽害一痘後受風成迎風落淚者用蕤仁一粒去皮草紙砑浥淨油以色白為度研粉人乳和點日三次次日另換蕤仁再點藥隔宿者不用一疳眼腫痛難開隱澀多淚漸生白膜雲翳遮睛外則撏毛咬甲揉鼻喜合面而坐宜用銀柴胡胡黃連白蕪荑龍膽草各五分炒以雄雞肝不見水者和藥搗爛用好白酒釀浸一宿次日置飯鍋上蒸溫服立效忌煎炒雞魚豬首生冷發物清毒保目湯柴胡一錢蟬蛻十二個去頭足當歸桔梗各八分連翹防風荊芥穗赤芍牛蒡子川芎各七分升麻薄荷黃芩各五分酒炒梔子酒炒生甘草各三分上加燈心五十寸水煎溫服撥翳湯見前外障眯目其證淚多隱澀難開睛珠礙痛初得時宜翻轉眼皮用棉裹叉腳拔出眯物來日久多生雲翳不可忽誤一天絲風揚入目宜急治之用京墨磨濃以新筆蘸塗目內閉目少時以手張開其絲自成一塊用綿輕輕惹下則愈如未出再塗又方石菖蒲捶碎右目寒左鼻左目塞右鼻即出屢效一煙渣入目切勿用湯洗愈洗愈痛甚至瞎眼宜用亂頭髮或綜纓緩緩揉之即愈一塵屑入目急吐口津於石瓶上以人指甲磨濃骨簪點眼內少頃一抹即出一麥芒入目用石菖蒲捶碎塞鼻百發百中一沙眯目用雞膽汁點之附闢瞽仙方人龍即男孩子口內吐出食蟲將銀簪破開河水洗刮令淨陰乾末海螵蛸水煎七次為末上二味等分研極細末點盲者復明古今第一方也是書照原來初稿發刊工既竣校閲目録體裁各卷參差未能畫一因急欲行世以廣倫聲濟人之素心其改定翻刻請俟異月笠雪主人識
