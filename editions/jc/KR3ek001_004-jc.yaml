body:
  text: 卷四發無定處證計四十證疔瘡疔瘡者言其瘡形如丁蓋之狀也古方論疔有十種華元化論疔有五色千金方說疔有十三種以至外臺秘要治法神巧而其論相同然無非毒氣客於經絡及五臟內蘊熱毒初起或如小瘡或如水泡紫黃青黑無定色癢痛麻木亦無定候多生於頭面肩臂手足等處令人煩躁悶亂或憎寒頭痛或嘔吐噁心或肢體拘急治宜針刺擠出惡血見好血而止取拔疔散紝入以膏掩之其有瘡頭陷凹而針刺不痛無血者則針瘡四旁必令血出藥從針孔紝入內服奪命丹或奪命湯汗之夫疔毒險症也其害最速生頭面耳鼻之間顯而易見生臂足衣遮之處隱而難明知覺早者朝醫夕愈遲者枉死甚多每每婦女而患暗疔者初時誤作傷寒至毒陷發腫神昏牙緊遂成走黃多致不救黃即毒也疔毒內走攻心如在將昏之際急用回疔散二錢白湯送服或以奪命丹五丸為末蔥汁調灌之少傾大痛痛則毒化黃水痛止病愈一手小臂足小腿生有紅線如絲一條延走者名紅線疔走至心腹或至喉內者難救治宜在紅絲始末兩端用針刺破出血以泄其毒亦以膏貼之服藥如前此疔皆因大喜大怒氣血逆行所致急刺出血後用浮萍草根敷之立愈謹按醫宗金鑑作紅絲疔不作紅線遵改一疔瘡用針刺出毒血後服拔疔散治紅絲疔尤效紫花地丁甘菊花各一兩水煎服二劑而疔毒散三劑全愈若已潰爛亦用此方但加當歸二兩服之立愈一刀鐮疔形闊如韭葉長有寸余肉色紫黑忌行針刺用生礬三錢蔥白七根共搗爛作七塊另以蔥湯逐塊送下蓋被取汗再飲蔥湯催之汗出為度外取爛雞矢塗患上即愈遲治走黃致命一人患疔須臾半面腫不知疔患何處用蔥白七根蜜一兩同搗敷之神效奪命丹乾蟾酥酒化輕粉麝香各五分枯礬寒水石煅銅綠制乳香制沒藥各一錢硃砂三錢飛蝸牛二十一個連殼研為膏如無即不用上各研為細末取蝸牛蟾酥研勻入諸藥杵丸綠豆大每服三丸用蔥白五寸搗爛安手心內裹丸於中另煎蔥湯送下蓋被取汗如無汗約人行五里許再進一服多飲蔥湯催之汗出為度奪命湯銀花草河車赤芍各二錢蟬蛻殭蠶防風羌活獨活青皮澤蘭各一錢五分黃連甘草各一錢上水煎熱服暖臥取汗回疔散土蜂窩有子者一兩蛇蛻一條上用泥裹火煅存性為末研和聽用拔疔散硫黃蟾酥等分上為細末蔥汁和蜜搗丸小米大宜帶長以便插入疔瘡內楊梅瘡一名廣瘡因其毒出嶺南一名時瘡以時氣乖變邪氣湊襲之故一名翻花瘡因其纏綿不已形如棉花一名翻花楊梅因窠粒破爛肉反突於外色如黃蠟一名天泡瘡因其夾濕而生白泡有形如赤豆嵌於肉內堅硬如鐵名楊梅痘有形如風豆作癢名楊梅疹有先起紅暈後發斑點名楊梅斑有色紅作癢其圈大小不一二三相套名楊梅圈名形雖異要不出氣化精化二因氣化傳染者輕精化欲染者重氣化者或遇生此瘡之人鼻聞其臭或誤食其物或登圊受其不潔之氣脾肺受毒故先從上部見之皮膚作癢筋骨或疼或不疼瘡形小而且干此不過在皮毛肌肉之間每日用換肌消毒散去木瓜加荊芥防風蟬衣汗之或更以龍膽瀉肝湯接服清去濕熱自當痊愈精化者由交媾不潔精泄時毒從精道乘虛直透命門以灌衝脈所以內入骨髓外達皮毛凡衝脈所到之處無所不有多有先患下疳次便毒漸至筋骨疼痛下部生瘡或小水澀淋其瘡形大而堅硬為害最惡治之以化毒為貴熏為忌熏罨瘥者復發難治醫方有升藥為丸雄黃為衣包裹吞服數日即好或燃藥條一根口含冷水諸法皆收毒入內掩飾瞞人害人性命羞畏人知者多受其害復發則爛毒瞎眼初起宜用三黃丸每日五鼓取四錢熱陳酒送服醉蓋取汗或兼以龍膽瀉肝湯每日早晚輪服外用忍冬藤煎湯日洗血餘散日敷漸漸取效其有瘡生頭面或遍身不便處欲其速愈但用金霜散敷之則二三日可以脫落亦神妙者也然此惟治標之法耳還須服藥消其內毒稍有遺毒未消難逃後患如換肌消毒散槐花蕊方皆消餘毒妙藥一有楊梅癬用水浮萍煎汁浸洗間日一次數次即愈換肌消毒散木瓜不犯鐵器甘草各八分土茯苓一兩忍冬花三錢當歸白蘚皮各二錢薏苡仁四錢皂針二錢木通一錢五分白芷一錢五分上水煎服毒甚者加土茯苓至四五兩血餘散人指甲炙研不拘多少真血餘灰各等分上二味共研每兩加麝香一錢再研和密貯瓷罐內臨用白蜜調敷附方愈後退斑餅用黑母牛糞捻作小餅炭火煨半熟乘熱貼患處一時取去斑痕自退轉白龍膽瀉肝湯通用九槐花蕊通用四十二三黃丸通用四十九金霜散通用七十一附方一方用大蝦蟆一個肚上剖開將雄黃一兩填入用黃泥包好放炭火內鍛鍊以泥紅為度取出埋土中一夜將黑灰分作三服黃酒送下每日空心服一次毒氣盡除如用消風敗毒散一二劑則終身不發矣一患楊梅瘡服輕粉一時收斂以圖目前遮飾豈知毒藏於內必致外潰未幾而毒發於鼻自覺一股臭氣衝鼻而出第二日鼻色變黑不聞香臭須速治否則鼻柱自傾腐爛莫救急治亦須用大劑藥些小之劑無效方用護鼻散護鼻散元參三兩麥冬二兩生草一兩生丹砂末三錢桔梗五錢花粉三錢銀花三兩水煎調丹砂末一劑鼻知香臭連服四劑鼻上黑色散去可免鼻梁爛落矣更用全鼻散全鼻散元參一兩生甘草三錢銀花一兩當歸一兩麥冬五錢人參三錢水煎調入丹砂末一錢服十劑而一身之毒盡出方保無虞前方勇猛所以救其急後方平和所以補其虛而丹砂前後皆用者以輕粉之毒非丹砂不能去輕粉乃水銀所燒而丹砂乃水銀之母子見母相逢不相離丹砂出而輕粉亦出倘鼻柱已傾肉腐不堪將前護鼻散救之雖鼻不重長而性命可援不致於死也一楊梅瘡黃濃氾濫腐臭不堪世人皆以為毒盛多用敗毒之藥孰知曰敗毒而毒愈盛瘡愈多往往有腐爛者須知此證於泄精時元氣大損故毒乘虛而入不補虛以瀉毒烏能有濟乎方用二生湯二生湯生黃耆一兩土茯苓二兩甘草三錢生水煎服連服四劑瘡色紅活再服四劑瘡盡乾燥又服四劑痊愈此方如毒重疼痛非常則加當歸一兩銀花二兩倍土茯苓便結燥者加紫草三錢楊梅結毒一名瘋毒一名楊梅癰漏結毒者因患瘡時毒氣方熾誤用藥水熏蒸或輕粉內伏或點藥收斂以致毒沉骨髓關竅之中積久外攻其始也先覺筋骨疼痛漸漸腫起發無定處潰破則腐臭不堪故有鼻崩唇缺目蝕喉穿手足攣拘等證治法初起者日服三黃丸再服取忍冬藤牛蒡草甘菊紫花地丁煎湯當茶時飲不得另飲茶湯如潰則以渣煎洗日兩度接服聖靈丹可祛毒盡色轉紅活以洞天膏貼收功蓋聖靈丹治結毒萬全之功無有出其右者但方內有犀黃珍珠價皆貴重又不可減去分釐需數十金方能合就貧者奈何又結毒紫金丹楊梅癰漏湯二方用之甚效即年深者亦效藥資無多又能取效如患久虛弱者更宜補助為妙忌食火酒豬頭糟物海味茶醋椒薑大蒜牛羊雞鵝豆腐麵筋鮮魚等豬肉不忌一結毒在咽喉者可用七神散吹之服藥如前聖靈丹珍珠犀黃冰片各一錢琥珀四錢紅色者佳劈砂滴乳石各三錢明者佳即石鐘乳上各制研粉入飛羅面四兩研和密貯每服取五分煎土茯苓湯調下再以湯送服一方加肥皂子一個同土茯苓煎如結毒在鼻額者加辛夷三錢同土茯苓煎結毒紫金丹龜版放炭火上炙燥用新酒漿筆蘸漿塗上反復炙塗三次以焦黃為度研細末二兩石決明用九孔者煅紅童便內浸一夜為末硃砂六錢明亮者飛末上共研極細末爛飯或米飲為丸麻子大每服一錢量病上下食前後下筋骨疼痛用酒下腐爛用土茯苓湯下至重者四十日愈專治遠年近日楊梅結毒筋骨疼痛腐爛不堪咽喉唇鼻破壞諸藥不效者並妙功可代聖靈丹楊梅癰漏方黑鉛三兩溶化入水銀五錢乘熱擂為粉分作五分聽用後另入煎藥用土茯苓五兩忍冬一兩皂刺一錢鬱金五分上㕮咀入蔥一莖各煎去渣再入鉛粉一分煎食遠服鉛粉煎後仍可取起蓋楊梅癰漏多因服輕粉積毒而成此用水銀花椒黑鉛仍收引輕粉之毒從內出也每以五劑為一料每料初一劑要取微汗取汗法以金銀花用藤葉一兩防風荊芥花椒各五錢煎湯二斗於不透風處先熏後洗自然汗出即愈二三十年者只用四料作四次汗之無不痊愈忌牛肉燒酒發物徐春甫專用此方以治病者一一獲效故詳載之七神散黃柏蜜塗炙九次研末一錢殭蠶新瓦焙燥為末一錢兒茶五分研末制乳香五分制沒藥五分冰片五分人中白煅末一錢上共研極細末吹之三黃丸通用四十九洞天膏通用七十六小兒遺毒遺毒者乃兒在胞胎稟受父母精血遺毒故既生之後熱湯洗浴或著烘燻衣服外熱觸動內毒發於肌膚之表先出紅點次成爛斑甚者毒攻口角眼眶耳鼻及前陰穀道皮肉破爛啼叫不安治之宜早內用土茯苓湯調人中黃細末四五分服之日進數次外破爛處以蜜炙黃柏細末乾摻之或以滑石綠豆粉鋪席上令臥可救十之三四嬰兒若毒延遍身日夜啼哭不吃乳飲者此毒盛正氣衰弱無法援之癘風一名癩大風俗名大麻風癘風者有毒之風也脾主肌肉肺主皮毛肉受濕熱氣濁血虛外感酷烈暴悍之風寒內外皆毒惡凝滯而成癘風初覺遍身麻木次起白屑紅斑蔓延如癜形若蛇皮脫落成片久致四肢拳攣肌肉腐敗熱毒盛則面上起油光熱久生蟲蟲蝕五臟則形有五損蝕肝則眉落蝕肺則鼻崩蝕心則聲啞蝕脾則足底穿膝虛腫蝕腎則耳鳴啾啾或癢痛如針刺蝕身則皮癢如蟲行治者急令戒酒色耐氣寬心一切發風動氣醬鹽椒醋葷腥炙爆及大寒大熱之物皆宜禁忌只食淡飯白粥白煮時菜而已方用如酒杯之蛇一條竹刀剖腹去雜切寸段取瓦仰放炭火上以蛇段豎放瓦上蛇段跌倒者系無毒之段棄之不倒者有毒用炙存性為末按蛇靈物也不可妄殺當用白花蛇條酒浸炙末代之雖不及生蛇之力猛而走竄搜風亦非遜品一次不愈何妨再用一次據云白花蛇是草拌入飯內覓通身白毛鴨一隻與食次日鴨毛盡脫殺鴨在鍋內煮爛勻作四五日食之食後切忌見風凡吃鴨第一朝其腫者更腫第二三朝收小吃完則愈不論初起已潰及潰久腐爛不堪者並效後接用易老驅風丸東坡四神丹常服不可間斷然斯證必戒色欲禁口服辛辣發物愈後亦須守戒年餘否則復發無救矣一麻風病面生紫塊疙瘩治法在面部皯瘡內易老驅風丸黃耆枳殼防風芍藥枸杞子甘草大生地大熟地地骨皮等分上為末蜜丸東坡四神丹羌活元參當歸各二錢大生地四錢上水煎服換肌散存驗治癘風久不愈或眉毛脫落鼻梁崩壞其效如神白花蛇黑花蛇各三兩酒浸地龍去土當歸川芎赤芍天門冬去心甘草何首烏不犯鐵沙參胡麻子炒天麻紫參苦參白蒺藜細辛白芷蔓荊子威靈仙荊芥穗菊花木賊草不灰木石菖蒲定風草即草烏根制木鱉蒼朮各一兩上各另為末過戥和勻每服四五錢食後溫酒調服加飲數杯尤妙浴癘方存驗草烏麻黃根艾葉地骨皮朴硝各一兩上為末極細用水一桶椒一合蔥一斤同煎湯入醋一鍾於密室中自用手巾圍搭四肢候湯可浴浴之令汗透務使久浴面上汗如珠徐起或坐或臥片時汗收著衣避風五日再浴如此三五次內服換肌散等藥石疽石疽初起如惡核堅硬不痛漸大如拳急以陽和湯犀黃丸每日輪服紫元丹間服可消如遲至大如升斗者亦石硬不痛又日久患現筋紋偶作抽痛雖按之如石而其內已作膿矣現紅筋者其內已通血海不治現斑黑者乃自潰之證潰則流血三日內死現小塊高低如石岩者主三百日後必發大痛不潰而死惟現青筋者其內已成黃漿尚可治令日服陽和湯外用活商陸根搗爛加食鹽少許敷之數日作癢半月皺皮日敷日軟而有膿袋掛下以銀針穿之用千金內托散加熟地倍生耆各一兩同陽和湯煎服大劑補托十劑後以陽和解凝膏隨其根盤貼滿獨留患孔再加繃縛法使其皮膜相連易於膿盡生肌接用十全大補加味保元等湯參耆忌炙服至收功陽和湯通用五犀黃丸通用四十八紫元丹通用五十一千金內托散通用三十八十全大補湯通用二十六加味保元湯通用二十九陽和解凝膏通用七十七繃縛法通用法流注凡人之血氣晝夜流行周而復始自無停息或因寒痰或因風濕稽留於肌肉之中致令氣血不行合而為患故曰流注初起漫腫無頭皮色不異患無定處隨在所生板腫微痛或兼身體發熱當未作膿時用加味二陳湯入陽和丸同煎數服全消消後接服小金丹七丸杜其續發如皮色稍變疼痛難忍者須用陽和湯以止其痛消其未成膿之餘地使已成膿者不痛而潰此乃大疽變小之法也如患頂軟已有膿即為針之膿多白色貼陽和解凝膏但此證潰後定增毒痰流走患生不一故初潰五日內仍服小金丹十丸以杜後患接用犀黃丸陽和湯每日早晚輪服使毒痰消盡收功孩子不能服煎劑者初起用小金丹化服至消乃止既潰亦以小金丹日服消其餘硬之地至患不疼時針之俟其毒盡用保元湯耆草生用加肉桂五分日服收功孕婦患之當問懷胎月數如未滿六個月犀黃丸內有麝香不可服只宜陽和湯愈之愈後再服三四劑以代小金丹杜其流走潰延日久病人脾虛氣滯者先服六君子湯加芎歸數劑參術生用待其飲食復常再按前治陽和丸通用六陽和湯通用五加味二陳湯通用十八犀黃丸通用四十八小金丹通用五十二六君子湯通用二十一保元湯通用二十八陽和解凝膏通用七十七痼發此證多生於手足掌心或腰腿臂下伸縮動處疼如痛風漫腫無頭其色淡紅憎寒發熱四肢沉重煩渴由平素好飲毒壅經絡治宜疏利濕熱用散消飲去川芎柴胡加葛根微汗之敷赤豆散如表解則用加味解酲湯少加乳香沒藥消之潰後亦然貼洞天膏一由感受天地不正之厲氣壅遏肌表宜用不換金正氣散煎送五通丸發汗解表外敷沖和散表退而作膿潰者內托散醒消丸主之貼洞天膏按幼科鐵鏡痛風之證即痼發也其書云四肢上或身上一處腫痛或移動他處色紅參差成塊腫起按之滾熱便是治用羌活獨活五加皮威靈仙秦艽防風桂枝前胡如下身加牛膝各一錢煎服數劑即愈按此方甚佳但遇好飲酒者患此去桂枝易白芷曾醫邑癢生方相幼子左手右足各曲貼肉處痛曲不伸用前方煎服五劑愈如大人須用酒煮每夜儘量飲每味一兩五錢煮酒五六斤飲畢即愈此予創方屢效不爽加味解酲湯葛根三錢茯苓二錢木香五分砂仁一錢人參一錢白朮生陳皮神麯炒豬苓澤瀉各一錢五分上水煎二次服一方有枳椇子以解酒毒赤豆散赤小豆上一味磨粉蔥汁調敷此方治一切癰毒以雞子清調或醋調俱妙又用敷痄腮神效不換金正氣散見後瘴疽五通丸通用五十散消飲通用十一千金內托散通用三十八醒消丸通用四十七洞天膏通用七十六惡核大者稱惡核小者稱痰核初起堅硬不痛與石疽之起相同然其寒凝甚痼毒根最深卻不易潰未潰之前忌貼涼膏藥忌服涼劑宜用加味二陳湯入陽和丸煎服或陽和湯犀黃丸煎服至消乃止大忌開刀開則翻花難治如有翻花者用大蟾破腹刺數孔連腸雜蓋患口拔毒軟肛內服溫補托毒消痰之劑犀黃丸收功如孕婦惟用陽和湯服之外治方存驗用大田螺數個搗爛敷之即消加味二陳湯通用十八陽和湯通用五陽和丸通用六犀黃丸通用四十八癭瘤大者為癭小者為瘤癭證蒂小而下垂瘤證頂小而根大癭多生於肩項兩頤瘤則隨處可生諸書雖有五癭六瘤之名類要皆七情六慾臟腑受傷經腠乖變氣凝阻逆所致瘤證易治癭證鮮有瘥者癭證內用開結散內府神效方外用蛛絲纏法或甘草縮法緩緩消磨亦能縮愈切勿輕用刀針致血出不止立見危殆瘤證惟粉瘤最多其色粉紅多生耳項前後亦有生於下體者乃腠理津沫偶有所滯聚而不散則漸成此瘤也治宜針破擠出脂粉用生南星大黃等分為末以白玉簪花根搗汁調敷之然每有愈而復發者乃內有胳囊化淨膏貼生肌自愈又有黑沙瘤多生臀腿其腫大小不一以手攝起內有黑色者是亦用針刺出黑沙有聲軟硬不等又有發瘤多生耳後發下寸許軟小高突按之不痛亦用針刺之粉發齊出又有蝨瘤發後其癢徹骨開破出蝨無數內有極大一蝨出之方盡此三者皆同粉瘤治法或用艾灸之亦可又有蟲瘤每生脅下本憂鬱結成治難獲效又有貼骨瘤貼骨而生極疼痛用枸杞根連皮骨野菊花根連皮骨切片曬乾以多為妙再加地丁根同煎一服即愈又有胎瘤初生小兒頭上胸乳間腫起大者如饅首小者如梅李乃胎中瘀血凝滯而成不可亂治法須待兒滿三五個月外方可用針刺破出如赤豆汁內以生地黃汁飲之則安開結散桔紅四兩沉香木香各二錢珍珠四十九粒小者加倍入砂罐內鹽泥封固煅赤取出去火毒用豬厭肉子四十九枚豚豬生項間如棗子者上為末每服一錢臥時酒調徐徐嚥下患小三五服愈大者一料可愈切記酸鹹油膩滯氣之物須擇除日於靜室修合內府神效方海藻洗昆布洗海帶海粉飛海螵蛸海螺頂上搖者用長螺不搖者用海螺上各等分研細末蜜丸龍眼大每臥時噙化一丸如神系內府傳方珠絲纏法取蛛絲拈成粗線纏孔患根數日其絲漸緊瘤根漸細屢易屢細不半月瘤自脫按諸線日松惟蛛絲日緊物理之妙有當格致者甘草縮法甘草煎膏以筆塗患四圍三次後另用芫花大戟甘遂等分為末醋調另用筆塗患之中心勿近甘草次日縮小復以甘草膏塗其中將芫花大戟甘遂末塗其外二藥俱不不可相近日日互塗自然縮愈治瘤妙方存驗用麝香數釐重一整塊安放瘤當中上加蘄艾綠豆大一丸灸之不起泡不破瘤自干退如舊附遍身痰瘤作癢主治方用肥皂角二斤去邊皮以滴醋十斤徐徐熬添成膏攤貼又方用生南星末醋調或玉簪花根汁調敷之疣一名枯筋箭初起如赤豆漸漸微槁日久破裂鑽出筋頭蓬鬆枯槁如花之蕊多生於手足胸乳之間系肝虛血燥筋氣不榮治宜滋腎水以生肝血潤風燥以榮筋氣歸芍地黃湯加牛膝川芎主之或為丸常服外用銅錢一個套疣上以草紙穰代艾作七糾灸之次日即落如疣大者則將草紙蘸濕套在疣上或灸十四糾斷無不下之理然不可專用外治雖暫愈亦必復發附方存驗用牛口涎塗之自落歸芍地黃湯通用三十七瘴疽瘴疽者因受山嵐瘴氣伏藏筋骨之間初發黑色頑痹如木石重按之微痛急用不換金正氣散加附子服之自可消散如遷延浮腫變青色如拳打之狀寒戰似瘧手足厥逆此為敗證難治須用砭法令出惡血以熟附子三錢生薑五錢煎服接按陰疽則例治法不換金正氣散蒼朮二錢泔浸炒藿香二錢厚朴二錢姜炒陳皮二錢半夏曲二錢炙甘草一錢上加生薑五片紅棗二枚水煎服瘭疽一名蛇瘴初起紅點次變黑色其形小者如粟豆大者如桃李發無定處疼痛應心剝破膿如豆汁腐爛筋骨川廣煙瘴地面有之用南星半夏白芷等分生研末菜油調敷內以不換金正氣散加入仙方活命飲服之遲治妨命仙方活命飲通用一不換金正氣散見前痘毒附痘風瘡痘癩丹瘤痘後發斑孩子因出痘多服涼藥血凝氣滯乘虛發毒漫腫不紅亦無焮痛醫多以痘後火毒未盡治之致流走患生不一久則生管成漏內生多骨凡遇此證宜按流注治法宜小金丹消之然亦有火毒未盡而發者其發必紅腫焮痛身熱口渴是不得不用清解敗毒湯加荊芥防風蟬衣柴胡主之服一二劑外以三豆散敷之則紅退腫消而愈如潰者用內托散貼洞天膏痘後發瘡癢痛者三豆散敷之妙痘後遍身瘡癬如疥如癩漸次延開脂水浸淫結痂成片名痘風瘡先用升麻葛根湯一二劑接用解毒防風湯苦參丸每日輪進外以滲濕救苦散搽之兼避風戒口自愈如日久失治膿血淋漓浸淫潰爛肌無完膚即成痘癩須以大補氣血為主兼以解毒防風湯苦參丸隨宜酌用痘後發丹瘤紅腫作痛手不可近流移上下過心腎則死小柴胡加生地黃湯主之外用砭法砭去惡血自消痘後發斑但紅不腫不痛者是也化斑湯主之升麻葛根湯葛根升麻白芍甘草各等分上水一盞煎七分去渣服無時解毒防風湯防風二錢地骨皮三錢生黃耆荊芥穗牛蒡子各一錢上煎服或加升麻五分苦參丸苦參一兩白蒺藜何首烏牛蒡子荊芥穗各五錢上水煎服小柴胡湯柴胡人參黃芩各三錢炙甘草半夏制大生地各二錢上為粗末每服三錢水一盞姜三片棗二枚煎至半盞去渣溫服化斑湯人參甘草各一錢石膏生地各五錢知母元參各三錢糯米一合上水煎待米熟去渣頻頻溫服無時三豆散黑豆綠豆赤小豆等分上為粗末醋調如糊敷之干則以鵝翎蘸醋時時潤之治痘癰其效如神滲濕救苦散一名滅斑散密陀僧生白芷滑石等分上研細末乾者白蜜調搽濕者乾摻小金丹通用五十二敗毒湯通用二內托散通用三十八洞天膏通用七十六砭法通用法火赤瘡附天泡瘡初起小如芡實大如棋子燎漿水泡色赤者為火赤瘡頂白根赤者名天泡瘡或生頭面或生遍身焮熱疼痛未破不堅泡破毒浸爛不臭乃太陰陽明風熱所致宜服仙方活命飲去皂刺山甲加片芩木通外以石珍散搽之即愈天泡瘡由風熱毒氣客於皮膚搏於血氣而生始如湯燙作泡一破漿出成瘡治用山地升麻山梔藍葉大黃各一兩銼碎用豬油八兩文武火煎色變去渣瓷器盛之塗患處石珍散生石膏一兩輕粉黃柏海螵蛸各五錢上共研細甘草湯浸洗以此摻之仙方活命飲通用一貓眼瘡一名寒瘡初起形如貓眼光彩閃爍無膿無血但痛癢不常由鬱熱被外寒凝結而成宜敷真君妙貼散多食雞魚韭蒜自愈真君妙貼散蕎麵一兩硫黃二兩白麵一兩上共一處清水拌乾溼得宜捍成薄片微曬單紙包裹風中陰乾取研細末麻油調敷魚脊瘡初起白硬泡漸長形如魚脊多生筋骨之間乃陽氣虛羸寒濕搏結故發常緩慢只在皮膚堅凝臖痛破津黃水無論已破未破俱宜隔蒜灸之外敷真君妙貼散內服小金丹小金丹通用五十二漆瘡漆瘡由人腠理不密感漆辛熱之毒而生初癢而腫抓之漸如癮疹色紅遍傳肢體焮赤皮破斑爛流水甚者寒熱交作宜取杉木屑煎湯洗之用干蟹黃滑石二味研細末白蜜調敷或即以生蟹黃塗之不數次即愈胃弱之人漆瘡浸犯中氣多有作嘔不能飲食者用六君子湯加砂仁藿香酒炒白芍煎服自安忌水浴油膩發物六君子湯通用二十一凍瘡觸犯嚴寒之氣傷及皮肉致氣血凝結初起紫斑硬腫僵木不知痛癢名曰凍瘡宜用陽和解凝膏貼之若因暴凍著熱或火烘或湯泡必致皮死潰爛亦用此膏貼之三張可愈有凍跟凍耳每遇冬寒則發者用茄秸同蔥煎湯浸洗便不再發凍瘡經年不愈者用獨勝膏塗之效獨勝膏於六月初六十六二十六日用獨頭蒜杵爛日中曬熱塗搽於凍發之處即於日中曬乾忌下湯水陽和解凝膏通用七十七血風瘡燥熱內淫風邪外襲風濕相搏發為疙瘩或如粟米搔癢無度破津脂水津淫成片小便不調心煩口渴夜熱內熱日輕夜重治宜滋血潤燥驅風十二味地黃飲主之外敷雄黃解毒散或繡球丸亦妙忌椒酒雞鵝動風等物十二味地黃飲大生地六錢當歸生黃耆各三錢何首烏五錢生地骨皮三四錢丹皮荊芥穗白芷各一錢五分白芍酒炒白殭蠶白蒺藜麥冬各二錢上水煎早晚服又血風瘡方用土內桑根白皮桐油腳共搗敷之三四次神效傷手瘡方用黑豆熬水常常洗之即愈雄黃解毒散雄黃寒水石各一兩白礬二兩上共研細末滾水調敷濕爛者干撒繡球丸見後疥瘡癬初起如錢漸漸增長或圓或歪有匡廓癢痛不一其證有六一曰乾癬搔癢則起白屑索然凋枯二曰濕癬搔癢則出黏汁浸淫如蟲行三曰風癬即癢久不愈之頑癬搔之痹頑不知痛癢四曰牛皮癬狀如牛領之皮厚而且堅五曰松皮癬狀如蒼松紅白斑點相連六曰刀癬輪廓全無縱橫不定總由風邪濕熱浸襲皮膚郁久而化蟲是以搔癢無休矣宜用殺蟲滲濕逐風之藥輕者繡球丸搽之重者槿皮酒搽之年久陰頑惡癬諸治不效者鮮角膏五倍膏隨宜敷之忌動風發物自無不愈一吹花癬生面上如錢搔癢抓之如白屑發於春月故俗名桃花癬婦女多有之用綠豆搗碎將紙蒙碗針刺數小孔將豆放紙上以大炭火一塊燒豆灼盡紙將焦即去豆揭紙碗中有水取塗三五次愈又方生白果仁切片頻頻搽之或用玉蓉散淨面亦妙一胎癬俗名奶癬生嬰兒頭面或生眉端搔癢流脂成片久則延及遍身宜用紋蛤散搽之或繡球丸亦效乳母須忌一切動風濕發物槿皮酒白槿皮南星檳榔各一兩生木鱉樟腦各五錢斑蝥三十個蟾酥三錢上各為粗末共浸入滴花燒酒一斤聽用遇癬先用穿山甲刮破以酒搽之日一次至愈乃止鮮角膏五月初旬取新鮮皂刺數斤搗爛入鍋熬汁汁濃瀝出易水再熬二三度去渣以汁共歸一處加醋慢熬成膏凡遇積年惡癬先刮破以膏敷之毒水流盡再敷數次痊愈五倍膏五倍子不拘多少研碎以陳米醋熬成膏遇多年頑癬先抓破以膏敷上干則加敷以不癢為度然後去藥則其患處之皮一同黏起盡除根矣紋蛤散紋蛤四兩川椒三兩輕粉五錢上先將紋蛤打成碎塊鍋內炒黃色次下川椒同炒黑色煙起為度入罐內封口存性次日入輕粉研為細末香油調搽一方有白礬五錢繡球丸見後疥瘡玉蓉散見面部面塵疥瘡疥證有五干濕沙蟲膿也皆由氣虛血熱榮衛不清之故每先從手丫生起延繞周身搔癢無度如燥盛則生乾疥搔之皮枯而起白屑濕盛則生濕疥暴腫作痛破津黃水甚流黑汁血熱凝滯則生沙疥形如細沙焮熱癢痛抓之有水濕熱相搏則生膿窠疥形如痘爛頂含膿水或稠或清痛癢相兼若蘊毒風濕化生則生蟲疥搔癢徹骨撓不知痛夫疥雖似有餘之證而恆患於不足之人故治不可專攻其有餘尤當先顧其不足壯盛人初發時可用荊防敗毒散透之若其形勢既成無憎寒發熱之證則不用治乾疥沙疥以當歸飲子主之濕疥膿疥以黃耆飲子主之俱洗以參椒湯搽以繡球丸其濕爛痛甚者搽以二黃丹皆獲效至於日久生蟲皆因濕熱所化清其濕熱則蟲不驅自滅內服苦參丸外敷金銀散自愈即繡球丸搽亦效一有經久不痊體虛極而瘡之甚者內服神仙棗外敷二黃丹可愈一小兒疥瘡用藁本煎湯洗浴並浣衣最妙一瘡愈後及年年發者用獨聖丸常服調理最妙當歸飲子當歸三錢生地黃四五錢白蒺藜去刺荊芥赤芍連翹去心金銀花殭蠶各二錢生研上加竹葉五片水煎食遠服乾疥加丹皮二錢沙疥加枯芩一錢五分黃耆飲子生黃耆四錢荊芥穗雲苓歸身各二錢忍冬三錢防風白芷香者連翹各一錢去心甘草八分上加大棗十枚水煎溫服濕疥加制乳香一錢五分膿窠疥加木通一錢五分神仙棗歸身一兩金銀花一兩甘草三錢白殭蠶白芷黃耆各五錢紅棗二斤上水六碗共煎三碗渣如前再煎共湯六碗去渣以湯棗勻四五日食食完痊愈獨聖丸荊芥連穗上一味為末用地黃自然汁熬膏為丸桐子大每服三錢茶酒任下服此須忌魚蟹繡球丸川椒紅輕粉樟腦雄黃枯白礬水銀各二錢大風子肉一百粒另研上共研細末同大風子肉再研勻加柏油一兩五錢和藥攪勻作丸如圓眼大先以鼻聞次搽患處參椒湯苦參一兩花椒三錢上用米泔水煎候溫洗之洗後避風拭乾搽藥二黃丹孫真人方黃柏五錢輕粉一錢上共研末雞子黃熬油調搽凡疥瘡膿窠痛甚者宜此搽之止痛立愈荊防敗毒散通用四金銀散通用七十苦參丸見前痘毒瘡疒皷凡患瘡誤用攻劫之藥致毒氣入內腹大脹滿名曰瘡疒皷棗蠶丸主之如痛勢危篤不及合丸者當覓大蟹四五隻約重斤余令其白湯煮食飲酒蓋暖而臥不兩時身上發瘡更很於前則疒皷全消矣再按瘡治蓋瘡疒皷死證也瘡易愈也不可畏其發而自貽伊戚也棗蠶丸白殭蠶紅棗各四兩上先用水煮紅棗一二滾取湯洗蠶棄湯以棗去皮核搗爛將蠶曬乾為末二兩同棗搗和為丸每服三錢早中晚仍用紅棗湯送服三次服完痊愈傲冬瘡凡人每至秋冬項背或周身發瘡如疥如癬或如疙瘩作癢浸水結痂至交春暖即愈名傲冬瘡此寒氣收斂腠理陽氣不能發越怫鬱而作也宜以荊防敗毒散解表再以補中益氣湯實表外搽繡球丸即愈荊防敗毒散通用四補中益氣湯通用三十繡球丸見前疥瘡癤濕熱怫鬱先見紅暈次發腫痛患不滿寸名曰癤毒解暑湯主之初起以發麵一塊調稀貼癤上中留一孔即消或以點毒丹點之亦消如潰膿作痛者貼洞天膏一頭上軟癤大芋頭搗敷妙一瘡癤久不收口用白木槿花煅存性為末摻上神效又方用鱉甲燒存性研末摻之亦效解暑湯連翹金銀花赤芍天花粉滑石飛車前子炒研甘草澤瀉上加淡竹葉十片水煎溫服無時按此方清暑利濕凡男婦大小無論有癤無癤時逢酷暑俱宜服之又按天時炎暑酷熱人未有不傷其正氣者故凡解暑用之更加蜜炙黃耆五七錢以助益元氣尤妙名為黃耆解暑飲如癤毒潰膿亦可加生耆與群藥等分用點毒丹黃柏研極細末入雄豬膽汁調如黏凡熱癤初起未出頭用少許點癤中間即消飛龍丹寒水石三錢血竭沒藥去油紅砒三分乳香去油膽礬雄精蜈蚣三錢去足銅綠穿山甲全蠍酒炒殭蠶各一錢硃砂枯白礬皂角刺冰片輕粉各三分上各製為末用蟾酥三錢酒化共搗為丸胖綠豆大金箔為衣每用蔥白裹一丸嚼爛酒下醉蓋取汗小癤初起服即全消白疽忌用痱癗俗名痱子夏月汗濕怫鬱毛竅發痱如疹用綠豆粉一兩滑石五錢輕粉二錢研和勻以軟絹蘸撲患處或以東壁土研細搽之㾦癗一名鬼飯疙瘩俗名風乘疙瘩初起皮膚作癢次發扁疙瘩形如豆瓣堆累成片由汗出乘風或夜受露風濕相搏而發表虛人多患之宜用荊防敗毒散去前胡獨活加桂枝白芷石膏汗之謹避風涼即愈外取百部浸燒酒以藍布蘸搽之荊防敗毒散通用四葡萄疫此症多生於小兒蓋感四時不正之氣鬱於肌膚不發發成大小青紫斑點色若葡萄頭面遍身隨處可發身熱口渴者羚角化斑湯主之不渴倦怠者補中益氣湯加生地主之一有邪毒傳胃牙根腐爛出血者內用羚角化斑湯去蒼朮加升麻葛根服之外搽珍珠散羚角化斑湯羚羊角八分石膏三錢知母人參甘草元參防風蒼朮牛蒡子各一錢上加淡竹葉十片水煎六分食遠服補中益氣湯通用三十珍珠散見喉部喉癰赤白遊風肌膚初起霞暈由小漸大浮腫成片或高累如粟發熱痛癢相兼遊走無定赤曰赤遊風白曰白遊風白屬氣赤屬血得風則遊行初俱宜荊防敗毒散疏解之赤者次服四物消風飲白者次服補中益氣湯更加防風蟬衣蘇葉鮮首烏外皆用廣膠燉熔塗之塗至愈乃止如遊行太速者須用生麻油塗患處砭之以泄其毒凡從背腹遊散四肢者順從四肢遊入胸腹者逆忌豬羊雞鵝魚腥一切動風燥血之物一小兒赤遊丹由胎中受毒多先患於腿紅腫成片遊走遍身則死治法必先用細瓷鋒竹箸破開夾瓷鋒砭去毒血取孵雞蛋殼內臭水拂上一二次即愈或以廣膠熔塗亦可倘延遲愛惜不砭者不救服藥如前荊防敗毒散通用四四物消風散通用八補中益氣湯通用三十癮疹紅色小點有窠粒隱行於皮膚之中而不出者是也屬心火傷血血不散傳於皮膚四物消風飲去柴胡加連翹木通主之四物消風飲通用八癧瘍風多生於頸項胸腋之間其色紫白點點相連成片如糙皮卻不蔓延亦無痛癢由邪風入於肌膚居久不散而成用加味二陳湯加荊芥防風蟬衣各二錢川芎一錢酒水各半煎服外以荊芥煎湯洗之敷雄蛇散即愈雄蛇散雄黃一錢蛇蛻一條煅存性上共為末麻油調敷加味二陳湯通用十八紫白癜風俗名汗斑初起斑點遊走成片久之可延蔓遍身初無痛癢久則微癢由汗衣經曬著體或帶汗行日中暑濕浸滯毛竅所致白因氣滯紫因血滯俱用五神散姜蘸搽之搽後漸黑次日再搽至黑退便愈此證古方治法雖多取效甚少得此證者忌食魚腥火酒動風發物五神散雄黃硫黃黃丹密陀僧南星上為細末先用蔥搽患處次用姜蘸藥末搽之搽後漸黑搽至黑散則愈白疕一名疕風皮膚燥癢起如疹疥而色白搔之屑起漸至肢體枯燥坼裂血出痛楚十指間皮厚而莫能搔癢因歲金太過至秋深燥金用事乃得此證多患於血虛體瘦之人生血潤膚飲主之用生豬脂搽之生血潤膚飲見面部面遊風血箭一名肌脈血從毛孔中射出如箭由心肺火盛逼血妄行於外宜服涼血地黃湯外用生豬肉一片貼之其血即止或以京墨研末醋調塗亦愈涼血地黃湯生地三五錢黃連一錢當歸一錢五分甘草梔子元參黃芩各一錢五分上水二鍾煎八分量病上下食前後服之血痣初起紅痣漸積大如赤豆觸破則血出不止欲死系肝經怒火鬱血用五靈脂研末摻之即止內服加味逍遙散加味逍遙散通用十六五竅出血耳目口鼻一齊出血藥不及煎死在傾刻先將永當面噴幾口急分開頭髮用粗紙數層蘸醋令透搭在囟門血即止次用當歸一兩煎汁磨沉香降香各五分加童便服血自歸經然後以四物湯加人參五味為丸服愈血汗一名脈溢周身毛竅汗出如血蓋心主血又主汗虛極有火則見血汗脈溢湯主之如搔癢血出不止用糞桶篐燒灰敷之凡人夾肢窩出汗衣服染黃者亦為血汗因虛而致脈溢湯人參黃耆歸身茯神麥冬石蓮肉生地黃五味子硃砂上或丸或煎俱可如煎則以硃砂和服痛風痛風即痛痹周身痹痛或手足不仁遍身麻木皆由血虛風濕凝滯用祛風逐濕散每服二錢好陳酒送下隨量飲醉暖臥取汗服至痛處更痛頭眩背汗昏沉片刻即定定則全愈服後不覺痛麻連服數劑至知覺乃止祛風逐濕散番木鱉制淨末穿山尾甲制淨末各三錢熟附子桂枝當歸延胡索各末一兩上一處研勻每服二錢陳酒調下盡醉取汗小兒胎風一名胎赤嬰兒初生身熱皮紅狀如湯潑火燒由孕母過食辛香熱物致兒脾胃積熱乳母宜用清胃湯嬰兒亦用少許外用煅石膏研細敷之如不焮赤即屬胎母脾虛用白晚米粉干揉或敷之忌服煎藥一有兒大能食米麵而身熱皮紅者系臟腑熱蒸濕氣外乘之故名玉爛瘡用螵蛸散蜜水調敷內服導赤湯清胃散見齒部走馬牙疳螵蛸散通用六十八導赤湯通用十癢風遍身搔癢並無瘡疥搔之不止肝家血虛燥熱生風不可妄投風藥養血定風湯主之外用地膚子蒼耳葉浮萍煎湯暖浴養血定風湯生地五錢當歸三錢赤芍二錢川芎五分天冬二錢麥冬二錢殭蠶二錢生研鮮首烏五七錢丹皮一錢五分或二錢上加桑枝二十寸水煎溫服無時或為丸服亦可內景證治計八證內景肺喉下為肺在咽前主出氣喉系堅空接連肺管為氣息之道路呼吸出入下通心肝之竅肺有兩葉白瑩謂之華蓋以復諸臟虛如蜂窩下無透竅吸之則滿呼之則虛此肺之象也心包絡胸下𩩲骭即心之位包絡捧護位居心之四旁即兩乳之中膻中穴是也凡筋脈由胸下鬲自鬲貫胸如肺心包絡脾肝膽腎七經筋脈皆從此過三焦脈亦布膻中鬲膜人心下有鬲膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣不使上熏心肺十二經脈惟膀胱脈不貫膜三焦隔下為胃上口在臍上五寸上脘穴即上焦臍上四寸為中脘即中焦肺脈起中焦在此臍上二寸為下脘即胃下口屬下焦胃胃者水穀之海五臟六腑之大源故胃氣為一身之本嚥下柔空下接胃為飲食之路咽至胃長一尺六寸統曰咽門下是鬲膜胃上口在鬲下曰賁門臍上二寸即胃下口曰幽門傳入小腸脾脾在胃左與胃同膜而附其上聞聲則動動則磨胃食乃消化大小腸小腸在胃之左胃下口曰幽門即小腸上口盤十六曲至下口曰闌門分泌別清濁即大腸上口大腸即迴腸當腑之左亦盤十六曲至廣腸廣腸即直腸下至肛門肝膽包絡下有鬲膜肝在鬲膜之中有獨葉者有二三葉者其繫上絡心包為血海下無竅肝短葉中有膽附焉膽有苦汁藏而不泄腎腎分左右一身之中有命門附脊骨對臍其右旁一小竅乃三焦之氣所自出即先天無形之火曰腎間動氣左旁一小竅乃真陰水氣所自出亦無形隨相火而潛行周身以榮四末命門居於中各開一寸五分膀胱膀胱齊腰在廣腸左側乃津液之府五味入胃其津液上升精者化血脈或骨髓余濁流入下部至小腸下口曰闌門泌別其汁渣穢入大腸汁滲入膀胱膀胱赤白瑩淨上無所入之竅止有下口全假三焦氣化施行溲便注瀉三焦氣餒則閉隔不通而為病肺癰人身之氣稟於肺肺氣清肅則周身之氣莫不服從而順行肺氣壅濁則周身之氣易致橫逆而犯上故肺癰者肺氣壅而不通也其候咳嗽項強胸脅脹滿呼吸不利咽燥作渴兩腳骨內痛而舌下生如細豆一粒再心口之上隱隱內作微痛此皆肺中生毒之徵也即用甘桔湯服之服下如覺稍安肺之患毒無疑矣以犀黃丸十服分十日同桔梗湯早晚輪服痊愈此是預識預治之法若見腳痛醫腳咳嗽醫咳遷延日久膿成肺壞多致不救且如舌下一粒患未成膿其色必淡患愈亦消患篤其色紫黑倘用刀點立死此證吐出膿色皆白稠濁腥穢速用犀黃丸治之立效又方以陳年醃芥菜滷每晨用半茶杯滾豆腐漿沖服服則胸中有一塊塞上塞下塞至數次方能吐出惡膿日服至愈凡患此證者終身戒食鴨蛋白鯗紅蘿蔔石首魚甲魚食則復發莫治甘桔湯生甘草桔梗各三錢上水煎去渣溫服犀黃丸通用四十八息賁忌服破氣辛熱藥調息丸主之調息丸海石白豆蔻橘皮射干紫菀旋覆花桑白髮白芥子桔梗上為末石鹼水丸伏梁伏梁心之積也起臍下大如臀至心下久則令人心煩因心經氣血兩虛以致邪留不去邪不外泄血與痰火鬱則積聚不散忌熱藥破血汗下宜活血涼血散熱通結震伏丸主之震伏丸鬱金乳香去油沒藥去油五靈脂當歸延胡索赤芍遠志石菖蒲茯神牡蠣上為末酒丸痞氣俗名痞塊痞氣脾之積也脾虛血瘀氣鬱患居中脘患處皮膚定無毫毛須看準以筆圈記用消痞膏貼之初起貼膏一張可消年久須貼兩張方消內服克堅酒至愈乃至一有痞塊成形如龜鱉狀乃病者食鱉肉積毒所致當用鱉甲膏醋炙脆和京三稜莪朮青皮香附為末烏梅醋煮搗丸酒下其物化血水從大便出克堅酒水紅花三錢淨末上用火酒二斤浸之時時呷服或用水紅花子熬膏每日取二錢酒化下消痞膏方有秘傳消痞膏香油斤許密佗熬六兩再入阿魏五錢羌活倍一兩水紅花子一兩麝香調退火攤膏隨患貼積年惡痞化全消肥氣肥氣肝之積也在左脅下如覆杯痛引小腹由氣血兩虛逆氣瘀血相併而成宜和肝散積行血瘠肥丸主之瘠肥丸川芎一兩當歸一兩肉桂五錢沉香五錢紅花一兩延胡索一兩香附一兩莪朮五錢赤芍一兩青皮一兩上為末酒丸或醋丸每服二三錢奔豚奔豚腎之積也其積無形發於少腹上衝至心欲死若豚竄奔突之狀復還乃止上下無時雖系腎邪必從驚恐得之蓋驚傷心恐傷腎兩臟交病也水能勝火腎水凌心治宜瀉腎補心桂枝加當歸茯苓湯主之桂枝加當歸茯苓湯桂枝白芍甘草炙當歸茯苓生薑大棗上水煎溫服胃脘癰胃脘脹痛心下漸高堅硬拒按寒熱如瘧身皮甲錯飲食不進或咳嗽或嘔膿唾血皆胃中生毒之證急宜忍冬湯犀黃丸早晚輪服愈之忍冬湯忍冬藤四兩生甘草三錢上煎服能飲酒煎服犀黃丸通用四十八腸癰患在小腹之內腹皮腫急按之如掌堅硬而熱微痛小便頻數汗出憎寒腹色如故或微腫脈緊實有力者是也多因經行產後或七情勞傷飲食瘀血積結所致用犀黃丸薏苡仁湯輪服如膿成腹中脹痛裡急後重則以薏苡仁湯加大黃一錢五分當歸三錢以下其膿接服蠟礬丸收功患者若遇事驚恐動跳則腸斷而死坐臥轉側皆宜徐緩防護少進薄粥靜養調攝庶可保生無虞臍間出膿者不治薏苡仁湯薏苡仁五錢炒栝蔞仁三錢丹皮二錢桃仁二錢去皮尖上水煎去渣溫服犀黃丸通用四十八蠟礬丸備用二腹內生瘡不可藥治者取皂針不拘多少好酒一碗煎七分溫服其濃血悉從小便出極效不飲酒者水煎亦可惡瘡證治計五證天行瘡天行發斑狀如火燒瘡有豌豆大頭面肢體須臾周遍皆有白漿數日則死乃濕邪惡毒積聚日久而患也用蜜水煎升麻時時服之更以升麻取汁棉蘸拭之頑瘡凡瘡患歷年不愈肌寒口冷頑不結痂名曰頑瘡取馬齒莧搗爛敷不過二三次即愈癩風瘡惡瘡似癩年久不愈用蛇蛻一條燒存性豬脂調敷內仍以溫酒調服罕瘡毒瘡浮腫叫號不得眠用獨蒜頭兩顆搗爛麻油調和厚敷干則易之無名瘡凡惡瘡人不能識者用蟾酥一錢白麵二錢硃砂少許新汲水調為錠如麥粒大每用一錠蔥姜服之汗出即愈若瘡勢緊急者須連進五七粒效奇疾證治計九證血擁周身忽然肉如錐刺既癢且痛不能飲食名血擁用赤皮蔥燒灰水淋汁洗內服淡豆豉湯數盞即愈棠梨泡周身起泡如甘棠梨狀破則出水內有石一片如指甲其泡復生抽盡肌肉則死急用三稜莪朮各二兩為末分三服酒調連進即愈肉人頂上生瘡如櫻桃有五色破則自頂分裂連皮剝脫至足名曰肉人逐日飲牛乳自消肢疒皷寒熱數日四肢堅硬如石擊之如鐘磬聲日漸瘦損用吳萸木耳等分煎湯頻服肉蝶因艾灸瘡瘡痂退落後瘡內鮮肉作片飛如蝶狀騰空而去痛不可言是血肉俱熱用朴硝大黃煅各五錢為末水調下微利即愈肉線婦人產後垂出肉線長三四寸觸之痛引心腹用老薑三斤連皮搗爛入麻油二斤拌勻炒乾先以熱絹五尺折作方結令人輕輕盛起肉線使之屈曲作三團納入產戶乃以絹袋盛姜就近熏之冷則再換一日夜縮入大半二日盡入但不可使線斷斷則殞命產婦腹中癢婦人產後腹中作癢用箭竿及鏇安臥床蓆下勿令婦人知氣旋瘧後口鼻中氣出盤旋不散凝如黑色過十日漸至肩與肉相連堅勝金石無由飲食用澤瀉煎湯日飲三盞連服五日愈氣奔人忽然周身皮里混混如浪聲癢不可忍抓之血出不能解用苦參人參細辛青鹽各一兩水煎慢慢飲完即愈怪蟲證治計九證號蟲蟲形如蟹為筋肉所化走於皮中作聲如兒啼用雷丸雄黃等分末摻豬肉上炙肉食之即愈厲蝨臥時忽渾身蝨出約至四五升致血肉俱壞每宿漸多痛癢不可言狀惟吃水臥床晝夜號哭舌尖血出不止身齒俱黑唇動鼻開但飲鹽醋湯十餘日即安紅線蟲遍身皮內有紅蟲如線長二三寸時或遊動了了可見癢不可當醫莫能治宜用水蛙為脯早晚食之月餘蟲乃自消續命蟲肚腹脹大肉中蟲出不斷斷之復生行坐不得用鶴蝨末水調服五錢自愈濕蟲腹中脹如鐵石臍中出水旋變作蟲行之狀繞匝周身扒搔不盡用蒼朮濃煎湯浴之仍以蒼朮細末入麝香少許調服腐蟲口鼻出腥臭水以碗盛之狀如鐵色蝦魚走躍捉之即化為水此肉壞也但多食雞臛即愈肉蛆頭皮內時有蛆行用竹刀割破以絲瓜葉擠汁搽之蛆出盡愈信蟲婦人每臨經時腰腹脹痛玉戶淫淫蟲出如鼠黏子狀綠色者數十枚後經水隨至蓋厥陰風木生蟲婦人血海屬於厥陰此風木自盛兼脾胃濕熱而化正如春夏之交木盛濕盛之時而生諸蟲是也用酒製黃連為君白朮香附為臣研末粥丸空腹吞之月餘則經至無蟲矣月望蟲婦人月經流出皆作禽獸之狀欲來傷人先以棉塞陰戶用沒藥一兩白湯調服頓愈外因雜傷證治計三十七證金瘡金瘡有刀斧箭鏃傷瓷鋒傷須看傷痕深淺總以止血定痛為主輕者皮肉破損出血不止用勝金散或必效散敷之重者筋斷肉飛血流不住或瘀血不散箭頭不出昏暈疼痛則先以花蕊石散摻之並以熱童便調服一錢其瘀血化為黃水倘血出過多其人面黃眼黑者則不可專攻瘀血宜用八珍湯急固根本加蘇木紅花調之可也更有血亡身體強痙口禁不能言似中風者只宜大補氣血按發痙治法救之若作中風治萬無一生凡兵器所傷出血而渴甚者不可即與飲食恐簇毛在創內須食乾物並油膩切忌食粥血沸心必死所忌有八一嗔怒二喜笑三大言四勞力五妄想六熱羹七飲酒八酸鹽八者犯之未有不死者其不治之證有十一一曰傷腰戶天倉二曰傷臂中跳脈及髀中陰股三曰傷心及乳四曰傷尻尾五曰傷小便六曰傷五臟七曰腦髓出八曰腦破聲啞直視九曰痛不在傷處十曰血出不止前赤後黑十一曰肌肉臭腐有一於此皆不能治除此當診其脈血未出脈宜洪大血既出脈宜虛細沉小者生數實浮大者死血出過多而脈微緩者生勁急者死一殺傷未透膜者急用乳香沒藥皆去油各末二錢和勻以小便半盞酒半盞調末通口服患處以金瘡必效散敷之一所傷瘡口出血不止者用水調千腳泥敷出血處四邊如傷頭面則敷頸周圍傷手則敷臂傷足則敷腿可以截住其血令不來潮其傷口得以用藥敷貼一金瘡久不合口用撮合散敷之一箭入肉內鉗不出者用螳螂一個巴豆半個共研敷傷處微癢忍之候急癢時乃撼拔之以黃連貫眾湯溫洗海螵蛸末敷之或以花蕊石散敷患四圍亦可一毒箭傷人最惡有二種交廣蠻夷用燋銅作箭鏃人若中之才傷皮肉便悶膿沸爛而死急服金汁外以金汁搽之若金汁一時難得即灌人糞汁並外敷之非此不能解毒也又一種是草烏膏喂塗箭鏃名射岡人若中之見血封喉而死急用藍靛汁一碗灌之外亦抹沫傷處如無藍靛則以青布漬汁飲之一法用黑大豆豬羊血內服外敷解毒亦效一金瘡腹破腸出者看其腸若僅一半可治先以大麥煮粥取濃汁溫洗其腸用桑白皮尖茸為線蘸花蕊石散縫腸傷口急於縫處塗活雞冠血隨以清油塗腸令潤將腸輕輕納入腹中外用生人長髮密縫腹傷口之裡肉留外皮撒撮合散以待生肌斂口縫後勿驚笑以米飲少少飲之漸增待二十日再吃濃粥調理而愈一耳鼻被傷落用人發入陽城罐以鹽泥固濟煅過為末乘急以所傷耳鼻蘸藥綴故處以軟絹縛定一筋斷用白膠香一味為細末敷之或以旋覆草根搗爛汁以筋相對而封之即相續如故百不失一一陰莖割去流血疼痛即以所割之莖炙乾為末酒服每一錢一指斷用真蘇木末敷之外取蠶繭包縛完固數日指接如故金瘡必效散龍骨煅乳香制去油沒藥制去油花蕊石火煅紅放地上冷定後再煅凡七次真降香節炒油干碾細紫草各五錢白芷紫蘇葉兒茶各三錢白蠟一兩煅麝香三分上共碾細末研勻瓷瓶密貯聽用花蕊石散花蕊石硫黃上罐盛鹽泥固濟火煅自辰至酉從下生火冷一宿次早取出研細收貯每以末撒患處研花蕊石忌鐵器勝金散參三七上一味磨粉米醋調敷潰者干敷立愈撒合散真降香五倍子制松香各等分上共研細粉收貯聽用刎傷凡看此證不傷氣嗓者易治然氣嗓在食嗓之前或原生左前右前故有左手剖者多傷氣嗓之說然左手用刀不知用力不知輕重其傷更重未有氣嗓斷而食嗓不斷如二嗓皆斷危險之症也治皆同法先用護管藥及扎法如法治之可愈但其脈洪大疾而無至數者脫症也若上護管藥後脈見和平而靜者又屬可生大凡始終宜脈小而四至者是有胃氣易愈其結喉之間割在中三路若割在上下不能用扎法之處必死然上中下及兩旁可以用扎法者可救但視其輕重若何重者全在扎處得力上護管藥一復時方能接續此藥只可上一次接不接生死判矣接之後能低聲言語進湯藥者生反此者莫救或半復時內湯藥漏出一半者俟次日必不漏而管接矣倘仍漏急用手解去加上護管藥亦必接矣總以頭一次上藥周密無滲漏之虞次日生死方定第三日口中不知松香味則管縫矣雖能飲食必以大便過通為穩內以續筋養血去痰消食散瘀為主後三方逐次服之忌食花椒生薑大蒜肚肺蓋氣血壅逆於肺宜瀉不宜補惟白水煮健豬肉腰子黑魚燉鯽魚甜醬油其菜蔬總不可煎炒扎法用舊包頭一個扎二寸半闊要平正以厚皮紙搓軟布二層於包頭上再挑護管藥布於紙上量刀口深淺闊狹以藥布厚為妙再布天鵝絨一層於紙上使先著喉管俟得暖而化黏貼其上以便連絡如無天鵝絨則用金毛狗代之著有膽力三五人將患者扶起正坐頭稍仰看其喉管端正上下相對將包頭之藥對正刀口一合而上不可走氣吹去藥末要緊頭伏稍低合定其藥不可搖動包頭連扎二道打結於項旁包頭要平正不可陷動刀口陷則內管撐開不連臨合口時以意消息內管對不對連不連方為合法若偏脫則內氣不通矣又要先紮緊七八分少刻即松總要鬆緊得宜次用厚火紙半斤襯於腦後主扶立端正以白布綁紮二道打結項旁使頭不致仰側恐其項軟急臥於草地鋪上宜背後高枕頭中凹兩旁高使項常曲而不直俟新肉生時漸仰直可也頭漸有力去白布一道火紙軟翻轉再扎過大半日喉管將續加上止血生肌續筋骨藥再布天鵝絨一層於藥上如前上藥法扎法一樣亦只可上一次次日口中不知松香味內管已實矣則上生肌藥俟有大半新肉及新肉難生者上玉紅膏可望愈也然總以先接內管為急其外止血生肌皆易耳第一日服方當歸蒲黃旋覆花根續斷山楂肉陳皮牛膝黃芩劉寄奴甘草鬱金各一錢生地黃三錢川芎五分上水煎第二日方防嗽桑白皮枇杷葉去毛黃芩川芎續斷楂肉寄奴生蒲黃陳皮川貝母木瓜各一錢薏苡仁麥冬各三錢上水煎嗽甚加白前五分馬兜鈴一錢第三日服方調理當歸茯苓遠志丹皮橘紅條芩川貝各一錢薏苡仁二錢生地黃麥冬各三錢上水煎人虛加玉竹三錢鮮石斛北沙參各一錢五味子三分護管藥松香按法精製為末真參三七切薄片曬乾為末鉤藤鉤微焙炒茜草末天鵝絨肉老鼠無毛者三四個搗爛為餅貼板壁陰處風乾為末上各制細末聽用每料用制松香一錢三七二分肉老鼠二分鉤藤二分茜草二分共為細末一錢八分再加天鵝絨一分入乳缽內以紙蒙上中留一孔乳捶入內擂極細為度瓷瓶貯凡用時記加天鵝絨不碾碎者一層於藥上使先著喉管連絡也如無天鵝絨則以金毛狗毛代之此方藥只六味功效如神但上一次生死判矣不及上二次也止血生肌續筋骨藥上好明淨雞骨炭在銀灰內揀如中指粗者為極細末生嫩松香輕手研入金毛狗同研多用毛則易連絡上二末等分和勻用時亦布天鵝絨一層於藥上如前上藥法扎法一樣在大半日後喉管將續則加此藥亦只上一次生肌藥生嫩松香不拘多少量加金毛狗同研細末一兩真瓜兒血竭碾細末一錢乳香碾細末三錢上三末共一處細研勻上法如前此藥可常用冬天二三日一換如新肉難生者更上玉紅膏無不愈矣金瘡出血不止蒲黃五錢為末熱酒服或以牡蠣粉敷之則止又方白蠟末敷之血立止愈箭鏃傷海螵蛸末敷之出箭鏃白象牙末水調敷四圍自出花蕊石末敷四圍亦出玉紅膏真麻油二兩煎滾去沫二三滾後入老黃蠟一兩或八錢冬季止用攪化勻再煎五六次取起盛瓷器內置冷水中攪三五遍出熱氣急入後細藥輕粉末八分飛丹三分珍珠生研極細末三分黃柏末三分生象皮陰陽瓦焙微黃見風稍脆即研細末三分如無即以象牙末代之上五味細末共一處研勻入前蠟油內不住手攪勻俟冷瓷器收貯臨用以桑皮紙薄薄攤貼跌撲損傷凡跌打磕壓落馬覆車墜屋閃肭諸傷大小便通者輕不通者重初時不問老弱有無瘀血停滯及昏憒氣絕不能言者俱宜服熱童便一大甌以酒佐之推陳致新其功最大且不動臟腑不傷氣血萬無一失然後再看傷之輕重按法治之如皮肉未破胸脅肚腹有作痞悶疼痛者必是瘀血壯實人以復元活血湯攻之老弱人以四物湯加桃仁紅花穿山甲補而行之外用生薑蔥白同搗爛和麵炒熱罨傷處仍多用炒熱者續易之止痛如神如皮肉已破損傷筋骨血流不止而煩躁者名曰亡血急用花蕊石散或金瘡必效散乾摻止血內以八珍湯加酒炒骨碎補紅花續斷補之其有痛傷胃氣作嘔或不飲食者以六君子湯加當歸木香調之其有傷輕別無瘀血等證而肌肉作痛者以復元通氣散宣之蓋有瘀血不先行散而加補劑則成實實之禍設無瘀血而妄行攻利則致虛虛之禍故凡治此證須察其所患輕重有無瘀血及元氣虛實不可概行攻下致成敗證焉凡所傷筋斷骨碎等證另有接骨專科茲書不及詳載一跌撲氣絕用仙人柴即九里香葉搗自然汁一杯灌下即蘇只心中微熱能受一點者無有不活一骨節打斷離脫急取大生蟹搗爛熱陳酒衝入連服數碗即大醉無妨外亦用敷傷處半日覺骨內有聲按預收生蟹陰乾炙末酒服亦可一跌撲筋斷用金沸草根即旋覆草絞取汁以筋相對以汁塗而封之即相續如故百不失一須禁勞動二十七日一孕婦跌傷用阿膠二錢歸身一錢五分艾葉一錢生地黃三錢續斷二錢砂仁八分炒川芎五分炒紅花三分酒水各半煎服一跌打破傷風發熱高腫甚至牙關緊急者用羌活防風蒼朮各一錢五分白芷川芎甘草黃芩生地各一錢細辛二分加生薑三片煎汁外用杏仁搗爛入白麵少許汲水調敷一跌撲極重大小便不通乃危急之候宜先用通導散行下蓄血然後再進他藥此證藥忌酒煎復元活血湯柴胡一錢五分當歸三錢穿山甲炒研天花粉各一錢大黃三錢酒炒桃仁二十個甘草八分紅花八分上酒水各半煎食前後服之以利為度復元通氣散木香茴香炒穿山甲炙研陳皮白芷甘草漏蘆貝母去心上等分為末每服二三錢溫酒調下通導散大黃生地黃桃仁枳殼赤芍當歸各二錢陳皮三錢木通朴硝各一錢甘草六分上水煎熱服以通利為度切不可用酒煎令人悶絕而死打傷眼睛方打傷眼睛突出急揉進用生豬肉一片將當歸赤石脂末少許摻肉上貼之去毒血即愈內麻藥生川烏生草烏各三錢鬧羊花醋炙七次九分半夏生五錢黃麻花一錢蟾酥酒化一錢生南星五錢芋艿葉汁拌上藥曬乾為末瓷器收貯每用八釐服用淡鹽湯一杯即解外麻藥名羊花散生南星生半夏各二錢鬧羊花三錢生川烏生草烏各一錢用麻黃根芋艿葉汁拌上藥末或加蟾酥五分雄黃少許桃花散凡用刀割血出不止用此止之古石灰一升入牛膽內陰乾再入牛膽內陰乾如此七次用牛膽七個方成俟陰乾貯收大黃四兩切片同石灰入鍋內炒石灰桃紅色取起去大黃放地上一夜研收末聽用跌破頭腦方真綠豆粉銅鍋內炒黑鋪地上退火氣再敷破處用包頭布包好避風數日愈跌撲神效散存驗川烏制草烏各二錢制肉桂紅花各一錢七分上共為細末每服二錢酒調下傷重者不過三分即愈接骨丹存驗取路旁牆腳下往來人便溺處年久碎瓦片一塊黃透者佳洗淨火煅紅入米醋淬凡五次刀刮細末每服三錢好酒調下飲醉無妨傷在上食後服在下食前服此乃神方極能理傷續斷屢驗六君子湯通用二十一四物湯通用二十三八珍湯通用二十五花蕊石散見金瘡金瘡必效散見金瘡杖傷凡受扙後急以童便和熱酒飲之隨服邊城十二飲一劑外敷七真膏或捧頭丹傷重者先用熱豆腐鋪傷處其熱如蒸其腐即紫復易之令紫色散盡轉淡血色為度再敷上藥即愈如初時失治日久潰腐疼痛及形氣虛弱者則非補托不可宜用八珍保元之屬耆術等生用大理脾氣以托氣血脾健則元氣日復肌肉自生可保無虞即或縱有瘀滯少加乳香沒藥宣之足矣凡變證宜與跌撲傷損互參通用一有情不得已事出不虞受害重刑難免者當預服鐵布衫丸可以受刑不痛即縱有酷刑辱拷亦可無虞又無一日前將生薑搽受刑處隨用生芋頭同半夏南星末厚塗之則不甚痛一扙癬用海風藤元參防風荊芥等分煎濃湯洗之癢甚者搽槿皮酒一扙後發毒用五倍子一兩南星三錢半夏一錢血竭一錢共為末米醋調敷邊城十二味飲歸尾蒲黃紅花蘇木桃仁丹皮乳香沒藥紫蘇各一錢生地黃赤芍酒大黃各二錢上酒水各半煎七真膏乳香去油另研沒藥去油另研輕粉三七焙兒茶各三錢麝香四分冰片七分上各末共一處研勻瓶貯聽用凡杖傷不可用湯水洗將此藥蜜調敷上薄棉紙蓋之干以蜜水潤之捧頭丹大黃一兩沒藥去油乳香去油樟腦各五錢兒茶三錢上共為末蜜調敷治扙重臨危即時止痛鐵布衫丸歸尾地龍制末川芎無名異兒茶各一兩五錢乳香制制沒藥各五錢血竭一兩麝香一錢木鱉仁制末一兩五錢上共為末醋丸圓眼大酒服一丸不杖以蔥汁解打著不疼方存驗用白蠟一兩切細入碗內滾酒沖服杖瘡方用鳳仙花一棵連根帶蒂葉搗爛塗患處如干又塗一夜血散即愈無鮮的則秋間收起為末保元湯通用二十八八珍湯通用二十五槿皮酒見發無定處疥瘡夾傷夾傷即擠傷也初禁用膏藥敷及泥塗等法恐後必作腫成膿未受刑之先宜服護心丹既受刑之後宜將熱尿飲之亦服護心丹外用銀硃火酒敷之著一人以手十指尖輕啄患者腳心先覺癢次覺疼為止再著一二人以筆管於患者腳面上輕輕趕之助通血脈候傷處凹者突起四圍腫大為度即服瓊液散隨飲至醉次日揩去銀硃敷七真膏服代杖湯至愈乃止如復受重刑破潰者及夾傷多年不愈者亦敷七真膏內服代杖散接用大補氣血之劑如參耆朮草歸地杜仲之屬方可收功一夾死者急將熱尿灌之再用生附子七錢泡去皮臍為末服二分每服酒三盞煎一盞如無附子以生薑汁半盞酒半盞同煎百沸並灌二服一夾碎骨者用土鱉生多年酒缸下生鱉同搗敷之內服護心丹一預防夾棍用獨核肥皂二十個搗爛去皮淨搗極細加川烏末五錢黃麻子末八錢草烏末一兩制乳香一錢末制沒藥一錢末和勻預敷受刑處緊包好次日解去刑後亦可用銀硃敷之人之腿受官刑皮肉腐爛死血未散疼痛呼號似宜用膏藥末藥外治為佳然而受刑深重不急內消專用外治則逍遙膜外安能衛心使惡血不相犯乎今有一方名衛心仙丹一受官刑即時煎服斷無性命之虞服後再用外治內外調治則瘡口易愈護心丹自然銅醋煅七次木鱉子制無名異洗制乳香制沒藥蘇木當歸蚯蚓去土各等分上為細末和勻蜜丸二錢重每用一丸黃酒化下一方內有肉桂土鱉蟲瓊液散鬧羊花揀去梗蒂蕊葉洗去灰沙曬乾砂鍋微炒上為末每服五分壯者七分先飲醇酒至半酣次用調藥服再飲至大醉為度靜臥勿語語則發麻麻至次日其麻方解消腫止痛其功甚捷弱者間一日再服代杖湯當歸生地各三錢制乳香制沒藥蘇木各二錢川芎枳殼麵炒穿山甲炙研甘草各一錢上酒水各半煎服取微汗氣虛人加人參黃耆衛心仙丹大黃三錢當歸一兩紅花三錢桃仁三十粒生地一兩丹皮三錢木耳三錢白芥子二錢上水煎服一劑而惡血散矣然後以膏藥貼之護心散大黃一兩沒藥三錢乳香三錢白蠟一兩松香五錢骨碎補五錢當歸一兩麝香五分各為細末豬板油一兩將白蠟松香同豬油在銅鍋內化開後將各藥末拌勻為膏藥貼在傷處外用油紙包裹再用線纏住輕者一膏即愈重者須貼兩膏夾棍傷重大約四個月即可行動無虞矣此二方至神至奇內方惡血散盡外方使死肉回生七真膏見前杖傷桚傷凡桚傷手指者用皂礬二兩水四五碗砂鍋內熬滾將手熏洗良久血活痛止不致潰爛熬時忌銅鐵器其洗手水過夜即臭惡不可聞傷重者更用銀硃訶子肉研末蜜調敷之服代杖湯代杖湯見前夾傷踢傷凡被踢青紫腫痛用冬青葉同醋煮數沸略滴麻油少許在內取葉換貼患處即愈湯火傷湯火傷者乃好肉暴經湯潑火燒焮赤腫急用地榆磨細如面麻油調敷其痛立止如已起泡則將泡挑破放出毒水然後敷之再加以乾末撒上破損者亦然功靈效速乃湯火傷之神藥也如失治潰爛不斂者取灶心黃土名伏龍肝入炭火煅紅水飛曬乾研細人乳調敷數次即愈此證最忌涼水涼藥浸敷致令熱毒伏內輕則皮肉臭爛重則神昏氣喘多成不救一凡被燙燒將死者用生羅卜汁灌之良久則活敷藥同上一被花炮火藥烘燎者磨爆竹硝黃染火燒者服藥敷藥同上一銃子入肉用蜂蜜沖好酒飲醉即出或用黃蠟沖酒亦效敷藥同上火藥燒傷方急取鮮柏枝搗爛香油調敷神效忌七天不可見水鏃木刺入肉陳臘肉去皮取紅活美好者連肥切細將象皮末及人指甲末拌臘肉內剁合一外厚敷四旁一飯頃其鏃自出謹按葉氏種福堂本原刻作新象牙末又綱目象牙末治云諸鐵及雜物入肉刮牙屑和水敷之立出一出箭頭與鉛炮子鐵針以干莧菜與沙糖塗之即出一鐵針刺入肉內無眼者不動有眼者隨氣遊走若走向心窩胸腫者險極用烏鴉翎數根焙焦黃色研服一二錢外用車脂輦油不拘多少調活磁石末攤如錢許貼之每日二換其針自出又方陳臘肉皮貼之即出又方雙杏仁搗爛羊脂調貼亦出一葦刺入肉用栗子生嚼敷之一骨刺入肉用象牙刮末水煮白梅肉調敷自軟一竹木刺入肉嚼生牛膝根罨之即出又方蓖麻仁搗敷極效一刺傷水中腫痛用韭菜微煮塌之人咬傷人常食炙爆之物牙齒漬有毒初咬時急用熱尿傷處洗去牙垢瘀血以白果生嚼塗之或更以人尿貯瓶內將指浸之一夕可愈如失治則痛爛發腫亦必以尿洗淨以龜版或鱉甲煅末香油調敷俟腫消痛止換上生肌藥熊虎狼咬傷熊虎狼牙爪傷人皮肉成瘡者宜用葛根濃煎內服一二鍾外洗傷處或生鐵煮令有味洗之亦妙用青布卷為繩燃著納竹筒中注瘡熏之出毒水再用獨窠子生杵塗傷處即愈一凡虎傷無論爪牙流血必多大約虎傷多在頸項必有深孔或兩個或四個其孔一時即變黑色痛不可忍急用生豬油塞之無豬油即用生豬肉填之則肉入孔中隨塞隨化庶不致所傷之肉再腐然後急用地榆半斤為極細末敷其所傷之處血即頓止隨用湯藥解其渴蓋虎傷之處流血必多而虎有熱毒直來犯心故口渴之甚斷不與水飲萬不得已小便飲之制虎湯當歸三兩地榆一兩生地三兩三七根末一兩麥冬三兩水十碗煎數碗令其暢飲服完必安而臥明日傷處大癢又服一劑再臥如是五日瘡口生合而愈矣馬咬傷馬咬成瘡用栗子嚼敷傷處如毒氣入里心煩嘔悶者馬齒莧搗爛煎湯頻飲之又方先用艾灸患處七壯後以人尿鼠矢曬乾煅末豬脂調敷效犬咬傷才咬時便以米泔水浸洗傷處用番木鱉切片瓦上炙炭存性研末撒上一二日即愈如潰爛日久者半月愈癲狗傷人必發癲如狂之狀世以為其人必生小狗於腹中此誤傳也因其發癲有如狗狀見人則咬遇女則嬲大小便必一時俱閉虛用努力似生產艱難且外勢急痛腰腹作脹而死急須用藥調治救命木鱉子三個切片斑蝥七個陳土炒去頭足米一撮炒大黃五錢劉寄奴五錢茯苓五錢麝香五分各研細末和勻黃酒調服三錢一劑毒即全解至神之方也不必二服皆能奏功過七日外必須多服數次無不可救服藥切忌色欲兩月並忌發物諸豆及豆油豆腐豆粉秋油凡諸豆造成者皆忌食余無所忌瘋犬傷最毒用糯米一撮斑蝥二十一個去頭足翅先以七個入米內慢火略炒去毛又入七個炒令焦色變亦去毛再入七個炒米出赤煙為度去毛不用只將米研粉用冷水入清油少許空心調服一錢須臾又進一服以二便利下惡物為度未利再進覺腹痛急冷水調靛青服之以解斑蝥之毒或預以黃連甘草煎湯待冷服之亦可敷藥同上不可食熱物一年不食豆類並戒犬肉終身犯則復發不救豬咬傷豬咬成瘡用松脂煉作餅貼之或以龜版燒存性研末香油調搽貓咬傷創處用薄荷煎汁洗之雄鼠矢煅研菜油調敷鼠咬傷鼠咬成瘡用貓毛煅存性入麝香少許香油調敷蛇咬傷凡被蛇傷即以針刺傷處出血以繩扎傷處兩頭庶不致毒氣內攻流布經絡用五靈脂雄黃等分研末酒服二錢外亦以敷之中留一孔令泄毒氣或取三七搗爛罨之毒亦消散神效如毒氣入腹腫昏潰者則急用香白芷一兩為末麥冬煎湯調灌之頃刻傷處出毒水毒盡腫消仍用白芷末敷之而愈一蛇傷久潰不愈毒氣延蔓者先以淨水洗淨用白芷末膽礬麝香少許研勻摻之良久惡水湧出其痛即止日以敷之一月愈一蛇咬牙折肉中疼甚勿令人知用荇菜即葳草復其上以物包之所折牙自出一蛇入七孔耳鼻等處割母豬尾血滴入即出內用雄黃硃砂共末煎人參湯調灌之或食蒜飲酒內毒即解一蛇纏人足令人尿之即解如纏腹即以熱湯淋之亦解一山居人被傷倉卒無藥者急以溺洗傷處以艾灸數壯最良或搗蒜封之亦妙蛇傷或在足上或在頭面或在身腹之間足腫如斗面腫如盤腹腫如箕三日不救則毒氣攻心而死蓋蛇乃陰物藏於土中初出洞時其口尚未飲水毒猶未解故傷人最毒治宜解毒為主用祛毒散祛毒散白芷一兩生甘草二兩夏枯草二兩蒲公英一兩紫花地丁一兩白礬三錢水煎服一劑腫消二劑毒盡從大小便而出三劑全愈蚯蚓傷凡被蚯蚓毒眉發皆落狀如大麻風但夜則蚯蚓鳴於體中為異耳宜用鹽湯頻頻洗之其毒自出更用牡蠣煅粉津調敷之如被咬生瘡者鴨血塗之小兒多受蚯蚓呵毒陰莖及囊俱腫如水泡亦用鴨血塗之或置鴨口含少時即消蜈蚣咬傷此傷取雄雞倒控少時以手蘸雞口涎沫搽傷處其痛立止或捕蜘蛛置咬處待吸毒完蜘蛛不動放水中吐而活之將蜘蛛放去傷盛者內飲生雞熱血蠍螫傷蠍有雌雄二種雄者螫之痛在一處雌者螫人痛牽遍體方用大蝸牛一個搗爛塗之其痛立止如一時不得蝸牛則用膽礬末醋和敷傷處徐春甫云蠍怕膽礬親見蠍螫疼痛用膽礬搽之立消此制蠍第一藥也射工傷俗名沙發溪澗有射工蟲常含沙射人形影人中其毒則病如瘧狀或如傷寒瘡偏聚一處異於常瘡中之深者死急用蔥白一握切豉半斤葛根二兩升麻七錢共末每以四錢水煎不拘時溫服移時再服外用大蜈蚣一條炙研醋和敷之蠼螋蟲傷即多腳蟲俗名蓑衣蟲此蟲藏於壁間以尿射人則皮膚腫痛起泡狀如茱萸中央白膿或初如糝粟漸大如豆如火烙漿泡疼痛之至繞身即死用鹽湯棉蘸塌瘡上數次即消或用犀角磨汁塗之或用雞矢塗之或以大黃末塗之亦效蜘蛛咬傷蜘蛛咬人成瘡用薑汁調胡粉敷或用清油和鹽搽之內飲羊乳本草云蜘蛛咬人令人一身生絲惟羊乳飲之可解天蛇咬傷即花蜘蛛天蛇即草中花蜘蛛人被其傷與毒蛇無異復浸露中則皮膚似癩非癩宜用秦艽煎湯徐徐飲之外以雄黃白礬研敷甚效或用蒼耳草搗汁內服外敷亦效羊辣子螫傷此傷用蚯蚓泥干搽或灶心土醋搓痛處俱妙又細嚼甘草敷之效蜂螫傷才傷即用小便浸洗拭乾以香油塗之愈又方米醋磨雄黃塗之又方用井水調蚯蚓糞塗立止痛蠶咬傷蠶咬人毒入肉中令人發寒熱用苧根或葉搗汁塗之愈按蠶怕苧麻故今之養蠶家以苧麻近蠶則不生髮也壁虎咬傷此傷用桑葉燒灰水調濃漉汁調白礬末塗之或用青苔搗塗內服敗毒散加青苔三錢煎服謹按綱目苔草類僅屋遊治犬咬瓦松治病犬咬惟隰草類青黛治諸毒蟲傷或傳寫之誤螻蛄咬傷醋和石灰敷之效螞蟥咬傷用鹽並香油調塗之蟻螯傷蟻鉗傷人以頭垢封之或反手取地上土敷之醋調亦可沙蝨傷此蟲在水中人洗澡則著人身鑽入皮內初時皮上赤如小豆黍粟狀摩之痛如刺三日後寒熱發瘡若入骨則殺人嶺南多此用茅葉刮去搗苦苣菜汁塗之或以小蒜搗敷又方用斑蝥二枚以一枚末服一枚燒至煙盡研末敷之立痊石蛭傷山中草木枝上有石蛭著人足則穿肌入骨害人凡山行宜以臘豬脂和鹽塗足脛趾即不著人闢蚊鱔魚骨夜明砂水上浮萍楝樹花曬乾燒一次七日蚊蟲不入家一方鱉甲骨鱔魚骨楝樹花苦參藜蘆各等分末每晚取一撮燒之蚊自去闢蝨百部秦艽為末於竹籠內燒煙燻之亦可煎湯洗衣又方白果三十個去殼研爛入漿內漿衣則不生蝨辟虼𧎇樟腦雌黃鱔魚骨等分末燒煙燻之即以樟腦摻衣席極妙闢臭蟲番胡椒即大椒碎末放火上燒煙燻之人須離遠否則人聞煙入鼻即出血一方用茱萸末灑入褥上即滅又方白檀香芸香各一兩茱萸五錢三樣為末放炭火內燒煙燻之要屋內不透風方好乩仙治臭蟲方用硫黃數錢為末和棉花子燒棉花子重下二三次即絕
