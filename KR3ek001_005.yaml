水甚者臨時對加五美散用二味拔毒散六十九治風濕諸瘡紅腫癢痛痱癗等疾甚效明雄黃白礬等分上為末用茶清調化鵝翎蘸掃患處癢痛即止紅腫即消金銀散七十專治惡瘡癢徹骨硫黃一兩銀硃五錢上將硫黃打碎入銅勺熔化再加銀硃攪和離火傾油紙上冷定取起研末醋調敷止癢神效如破爛爛孔癢極者白蜜調敷金霜散七十一治不癢惡瘡楊梅瘭疽火赤天疱等證杏仁三錢去皮尖研雄黃一錢五分輕粉一錢上研細末雄豬膽汁調敷五寶散七十二治癰疽潰爛余腐未盡肌肉不生用此定痛化腐生肌人指甲象皮薄切長髮各五錢麝香一錢冰片二分上用紅棗去核逐枚包甲以長髮捆扎同象皮在瓦上炭火炙溶成團存性研粉加麝冰研勻貯用山蓮散七十三治一切潰爛不堪與內腑止隔一膜者敷之立效大活鯽魚一尾山羊矢上將魚破腹去雜以山羊矢打碎塞實魚腹放瓦上慢火炙乾存性為末加麝香一錢研和貯用象皮散七十四治癰潰久爛孔如掌之大者以此摻之至孔收小後再用六和散敷此藥並治刀傷跌損出血豬前蹄扇骨十兩煅炭研象皮一兩炙存性研上共研極細聽用六和散七十五治一切癰疽等毒痛止腐盡破爛不收者摻上即愈海螵蛸龍齒水飛象皮炙存性研末瓜兒血竭乳香去油輕粉等分研末上研極細末或乾摻或熬雞蛋油調拂洞天膏七十六治陽癰瘡癤香白芷四兩木鱉子肉萆麻子仁獨活各三兩大黃三兩乳香沒藥各二兩老蔥二斤洗去泥風乾後入上用麻油三斤浸藥春秋五日夏三日冬七日用桑火熬至藥枯用絹將藥渣瀝去將油復入鍋內熬至滴水不散遂離火少頃每油一斤入炒透黃丹研極細六兩旋攪旋下下完攪勻再慢火熬至滴水成珠以兩手取珠為丸不黏指為度離火置陰處俟退火氣以油紙攤用如作嫩膏則每斤油內入黃丹三兩不用六兩熬黑取用陽和解凝膏七十七治一切陰疽潰爛瘰癧凍瘡濕痰流注等證並可貼背心截瘧新鮮大力草即牛蒡子草連根葉三斤白鳳仙花四兩活者上用香油十斤將二味熬枯去渣次日再入後藥川芎四兩川附子桂枝大黃當歸草烏川烏地龍無則用穿山甲殭蠶赤芍白芷白蘞白芨各二兩續斷防風荊芥五靈脂木香香圓陳皮各一兩上熬枯住火片時油將冷用夏布濾淨渣將油稱准斤兩用細絹將油入鍋內要清淨為度用火熬滾每油一斤加飛過黃丹六兩五錢徐徐投入攪和文火慢熬至滴水成珠不黏指為度即以濕粗紙罨火將油鍋移冷灶上下後藥末制乳香末制沒藥末各二兩麝香末一兩蘇合油四兩上將三味研極細同藥合油入膏熔化攪勻半月後攤貼備用要方計九方紫金錠一名神仙太乙丹一名玉樞丹一名萬病解毒丹解除一切中毒積毒蟲毒蠱毒砒石菌菌死牛馬河豚等毒及時行疫癘山嵐瘴氣喉閉喉風顛邪鬼氣狂亂迷死牙關緊急小兒急驚等證凡行兵興役之處尤不可無五倍子捶碎洗淨焙末三兩山慈菰去皮淨末二兩千金子即續隨子仁去油取霜一兩紅牙大戟去蘆焙乾淨末一兩五錢麝香三錢另研上和勻用糯米煮濃飲為度分作四十錠每服半錠用井花水或薄荷湯磨服利一二次用粥止之若治癰瘍惡毒火湯蛇蟲犬獸所傷以東流水磨服並敷患處如治顛邪鬼氣鬼胎攣急疼痛以暖酒磨服凡修合時日須用端午七夕重陽或天醫天德月德日於淨室內焚香修制凡奇怪之病屢用如神醫家大家均宜預配應用蠟礬丸一名黃礬丸治金石發毒一切癰疽托裡止痛護臟腑神妙不問老少皆可服之黃蠟一兩黃色者佳熔開離火入礬末白礬一兩明亮淨者為末上和勻多人衆手急作成丸桐子大每服二三十丸漸加至四五十丸熟水或鹽湯送下日進二三服服至三四兩之上愈見功矣此方不惟止痛生肌亦能護膜止瀉消毒作膿及內癰排膿托毒千金化毒丸治諸惡毒明白礬上為丸每服三錢以蔥頭七莖煎湯送下則痛腫俱退再用仙方活命飲二劑去其餘毒此方原用礬末以蔥頭湯調服因難服故易為丸一方士治瘡疽不問腫潰先用此藥二三服後用消毒之藥其效異常治芻蕘之人用此即退不用托裡藥亦愈若金石毒藥發疽者尤效蓋礬能解金石之毒也一方用礬末五錢硃砂五分熱酒下亦效此藥托裡固內止瀉解毒排膿不動臟腑不傷氣血其藥易得其功甚大偏僻之處不可不知此方或蟲蛇咬傷熔化熱滴患處痛止毒消或熱酒服數錢皆效呂祖一枝梅凡男婦大人小兒新久諸病生死難定之間用此芡實大一餅貼印堂之中點官香一枝香盡去藥一時後視貼藥處有紅斑暈色腫起飛散謂之紅霞捧日病雖危篤其人不死如貼藥處一時後不腫不紅皮肉照舊不變謂之白雲漫野病雖輕淺終歸冥路小兒急慢驚風一切老幼痢疾俱可貼之凡病用之皆可預知其生死也雄黃五錢硃砂三分五靈脂三錢巴豆仁五錢不去油萆麻仁五分銀硃一錢五分麝香三分上研細末於端午日淨室中午時共研加油燕脂為膏瓷合收貯勿經婦人之手臨用豆大一圓捏餅貼印堂中其功立見用過餅送入河中瓊酥散此麻藥也治一切腫毒等瘡服之開刀不痛蟾酥一錢半夏六分鬧羊花六分胡椒一錢八分川椒一錢八分川烏一錢八分蓽茇一錢上共為細末每服半分黃酒調服如欲大開加白酒藥一丸整骨麻藥此藥開取箭頭服之不痛麻黃胡茄子薑黃川烏草烏各等分鬧羊花倍用上共為末每服五分茶酒任下欲解用甘草湯服之即蘇敷麻藥此藥敷於患上則麻木任割不痛川烏尖五錢草烏尖五錢胡椒一兩蟾酥四錢生南星五錢生半夏五錢上為末用燒酒調敷一方加蓽茇五錢一方加細辛一兩沖和湯治瘡屬半陰半陽似紅非紅似腫非腫此因元氣虛弱宜補托消之人參陳皮各二錢黃耆白朮當歸白芷各錢半茯苓川芎皂針制乳香制沒藥金銀花甘草節各一錢上酒水各半煎服完瘡散治濕爛諸瘡肉平不斂及諸瘡毒內肉既平而口有不收者用此最妙滑石一兩飛赤石脂五錢飛粉甘草三錢上為末乾摻或用麻油調敷或加枯礬一錢癢者極宜附中毒類計五十六條飲食中毒凡食物經蛇蟲百腳遊過皆有毒人若中之覺焮熱脹滿者急用苦參三兩苦酒升半煮半沸陸續飲之吐食出即瘥或甘草煎湯服吐十餘次或生韭汁服數升俱效中酒毒飲酒中毒者經日不醒是也用黑豆一升煮汁溫服一盞不過三盞即愈中燒酒毒者用鍋蓋上氣汗水半盞灌下即愈或用葛粉冷水調灌之亦醒如燒酒醉死急以新汲水浸其發外以舊布浸濕貼其胸膈仍時時灌之醒乃已中面毒食麵後胃脘脹悶煩渴宜用蘿蔔生啖之或搗汁服之蓋麥面大熱蘿蔔能解其性或用大蒜嚼食之亦善解面毒中瓜毒食諸瓜及黃瓜中毒每多腹痛而泄以糯米煮粥飲之中果毒凡果品不時有毒中之以豬骨燒灰冷水下一二匙中桐油毒桐油令人嘔泄飲熱酒即解若清油則柿餅湯解之中牛馬肉毒急用甘草末四兩無灰酒調服儘量飲須臾當吐泄若渴不可飲水飲水必死又方用淡豆豉搗汁和人乳服之即解中肉脯毒凡肉經密器蓋過夜者為郁肉屋漏沽著者為漏脯皆有毒誤食者殺人宜飲韭汁解之中狗肉毒凡食狗肉脹滿不消用蘆柴根鮮者搗汁飲之乾者煮汁飲之中魚毒凡食魚中毒煩亂者用橘皮煎濃汁服之即解或搗冬瓜汁飲之鱔毒食蟹即解中河豚毒毒之所在腹之子目之睛脊之血故浸血不淨有紫赤斑眼及誤破腸子或修治不如法及染屋塵者皆脹殺人中之用橄欖汁或蘆根汁及糞汁並解甘蔗汁亦解中蟹毒凡食蟹中毒用紫蘇葉煎汁飲之或藕汁或搗蒜汁俱可解中鱉毒凡食鱉中毒用豆豉一合新汲水一碗煎濃汁頓服中雞毒好醋飲之即愈未愈再服雞子亦然中雉毒犀角末新汲水調服中鴨毒糯米泔水熱服一二盞中鳥雀毒豆汁飲之又生扁豆末冷水服之中斑鳩毒葛粉二合薑湯調服或用生薑一味搗取汁將渣焙乾為末即以薑汁糊丸日服按斑鳩常食烏頭半夏苗中其毒故以生薑解之中諸菜毒食後腹脹是也以醋解之中菌毒忍冬藤葉生啖之即愈或煎濃汁飲之一方用地漿水飲之一方用白礬少許溫湯服中鉤吻毒鉤吻生池旁與芹菜相似惟根有毛以此別之誤食則殺人用薺苨即甜桔梗煮湯頓服一方服桂心湯效中砒毒凡中砒毒者其人煩躁如狂心腹絞痛頭眩欲吐不吐面色青黑四肢逆冷六脈洪數飲食中得者為易愈空心酒醋服者難救治宜掘地成坑以水灌注攪成渾水謂之地漿頓服之如吐出再服所謂洗淨腹中毒全憑地下漿是也或用明礬四五錢研末水化冷服亦解其毒如已服久急以黑鉛一塊不拘多少用涼水於石上磨汁旋磨旋灌如吐泄交作則解後以甘草煎濃汁灌之醒後仍顛倒不語每日用生緑豆研粉冷水和飲之中巴豆毒其證口乾兩臉赤五心煩熱下利不止用緑豆煮湯冷服之或甘草黃連煎汁冷飲之利止而安中附子毒凡服附子中毒頭腫面裂血流或見內熱諸證急用緑豆黑豆搗汁飲之或濃煎二豆湯常飲之一方用田螺搗碎和水飲之中烏頭草烏毒甘草煎濃湯服之或米醋調砂糖服之俱可解中硫黃毒其證背膊疼痛作悶目暗漠漠用黑錫煎湯飲之或冷服豬血或烏梅肉一兩焙沙糖五錢漿一大盞煎七分呷之中硇砂毒生緑豆磨粉水和飲一二碗中雄黃毒漢防己煎湯飲之有用雄黃搽瘡或熏陰瘡而瘡受其毒者防己煎湯洗數次即愈中鐘乳石毒其證口渴下利不止食豬肉則愈中藤黃毒蘆粟葉煎湯入倒瀲西瓜汁一碗服之中藜蘆毒雄黃為末用水調服一錢或煮蔥汁飲之俱可解中木鱉毒生薑自然汁和熱酒飲之中蒼耳子毒蒼耳子不可同粳米飯食食則猝發心痛急燒倉米灰和蜜漿服如遲即死中皂礬毒麵糊一鉢急服愈中斷腸草毒一名水莽藤又名莽草黑豆一碗甘草五錢共煎濃汁服下登時即解又冬青樹葉冷水搗汁服下即解生羊血亦解中半夏毒其證口不能言倒地將死者速用薑汁灌之須臾蘇中狼毒毒杏仁搗爛和水服之中花椒毒凡服川椒氣閉欲死者新汲水飲之即解地漿水更妙中鴆毒葛粉二兩水二盞調服口噤者灌之或緑豆粉三合水調灌如已死但心口溫者可急灌之中斑蝥毒黑豆汁緑豆汁靛汁黃連濃茶蔥汁俱可解中蜈蚣毒雄黃雞冠血浸舌並咽之中地龍毒鹽水飲之可解中青娘子亭長地膽蟲毒平胃散加酒炒黃連五分黑豆三十粒兩服可解或以豬脂和豆汁飲之中狼煙毒醋少許飲之中輕粉毒藥中有輕粉中其毒骨痛筋攣用出山鉛五斤打壺一把盛燒酒十五斤納土茯苓半斤乳香三錢封固湯煮一日夜埋土中出火毒每早晚任飲數杯後用瓦盆接小便有粉出為驗服至筋骨不疼乃止服輕粉口破者以三年陳醬化水頻頻漱之中鉛粉毒沙糖調水服或急搗蘿蔔汁飲之中銀金幼毒飲黃泥水二茶杯即愈或用飴糖四兩作成小丸以真麻油吞下即愈又方用烏梅煎濃汁灌之中煤炭毒一時暈倒者急宜風涼處以清水灌之中煙毒沙糖調水飲之中杏仁毒藍子研水服即解中烏梅毒生白扁豆研末冷水服之中諸藥相反毒蠶蛻紙即出過蠶之故紙也燒灰細研一錢冷水服下或荸薺取汁調靛青服中鹽滷毒凡服鹽滷垂危者急取活鴨或活雞斬去頭將頸塞口中以熱血灌之可解如服滷多者必用數只方足盡收其毒更宜熱豆腐漿灌之中蒙汗藥及悶香毒飲冷水即安每臨臥時食大棗一二枚或含口中便不致迷中丹石毒其證頭眩耳鳴發熱困篤恐懼不安用地漿服之為上或蚌肉食之良或用黑鉛一斤溶化投酒一升如此十餘次待酒至半升頓服即解中挑生毒即蠱毒此淫術也嶺南閩廣有之而福之古田長溪為最乃於飲食中行厭勝之法魚肉能反生於人腹中人已死則陰役其家初得覺胸腹痛次日刺人十日則生腹中矣故凡入有毒之鄉飲食當先以銀器試之有毒即黑或用犀角攪試有毒則起白沫又驗中蠱之法吐津在水中沉則是浮則非又嚼生黑豆不腥嚼明礬而甘其人頭面上有光他人手近之如火熾者此中蠱也胸膈痛毒在上則服白礬升麻以吐之膈下痛毒在下則以米湯調鬱金末二三錢服以瀉之或將三味合服不吐即下宋李巽岩侍郎為雷州推官鞫得此方活人無算載範石湖集一蝦蟆蠱蝌蚪蠱其證心腹脹痛口乾思水不能飲食悶喘用車轄脂半斤熱酒漸漸服之其蠱自出一蛇蠱飲食中得之咽中如有物咽不下吐不出心下熱悶用馬兜鈴一兩煎服即吐出一金蠶蠱用石榴根皮煎汁飲一中蠱吐血或下血如鵝肝或心腹急疼如有物咬不即治者死用敗鼓皮燒灰酒服二錢或小麥面三合分為三服以冷水調下半日服盡下蠱即愈附五種蠱毒方雄黃麝香等分上共末用生羊肺如指大以刀切開納藥末兩匙在內吞下
