body:
  text: 卷五通用法計七法針法外科用針因癰疽膿成不得外泄毒氣壅遏瘡腫肌膚內漬故用針決之俾膿泄氣通而愈經云鈹針末如鋒鋭以取大膿此之謂也用針之際雖雲量其患之淺深尤當隨其肉之厚薄如皮薄針深則反傷好肉轉增其潰肉厚針淺則毒膿不出反益其痛用針可不慎哉大抵用針以斜鋒偏鋒為善其法從旁刺入以防透膜欲大開口則將針斜出欲小開口則將針直出所謂順而導之也然用針自有其時果其膿熟不能自潰則用之若未成膿不必用針在膏粱怯弱之人及肚臍骨節近筋之處自有代刀散咬頭膏等藥備用不必用針也砭法凡赤遊丹毒疔瘡紅絲走散或時毒瘀血壅實等證皆宜行砭法然不可太深內經所云刺皮無傷肉也法用細瓷器打碎取有鋒芒者一塊以箸一根劈開頭尖夾之用線縛定兩手指輕撮箸尾令瓷鋒正對患處約懸寸許再用重箸一根頻擊箸頭令毒血遇刺即出毒氣自退若毒氣入腹膨脹者難治灸法經云榮衛稽留於經脈之中則血瘀不行不行則衛不通故熱大熱不止則肉腐為膿蓋癰疽瘡毒總由氣血壅積不行可知故通壅積暢榮衛而灸法誠外科之要訣也竊有疑者諸疽白塌木腫本屬陰寒得灸之力回陽溫腠實為盡善若一切陽毒紅腫焮痛概用灸法雖云宣壅散結恐火攻反致逼毒入里大痛大腫神昏痰湧吁吁作喘奈何既不敢以人試藥又不忍糊混相傳故特辨明此條以待高明校定閲諸灸法有用隔蒜灸者用蠐螬灸者用附子餅豆豉餅木香餅香附餅灸者其法不一總以通壅積暢榮衛而已至於灸壯之大小則量瘡勢定也隔蒜灸法按陰疽流注及麻木痹寒濕痹痛等證以此灸之疔瘡生下部偏僻之處或可用大蒜頭去皮切片約至三個錢厚安患頂上用艾壯於蒜上灸之三壯即換蒜片再灸每日灸二三十壯愈多愈妙如瘡勢大以蒜搗爛鋪於瘡上將艾鋪蒜上灸之蒜敗再換附子餅按潰疽血氣虛寒不能收斂以此灸之炮附子去皮臍研末以津唾和為餅約三個錢厚置患口上以艾壯灸之每日灸數壯但令知熱勿令痛如餅乾再易餅灸之以患口紅活為度豆豉餅按頑瘡惡癬以此灸之江西淡豆豉為末量患大小唾津和作餅或黃酒和亦可約三個錢厚置瘡上艾壯灸之餅乾再易如有瘡孔勿復孔上在孔旁四布豉餅燃艾灸之令微熱勿令肉破日灸三度令瘡孔出汗瘥木香餅按撲損閃肭血瘀氣滯以此灸之以木香五錢為末生地黃一兩杵膏和勻量患處大小作餅置腫上以艾灸之香附餅按瘰癧痰毒或風寒襲於經絡結腫以此灸之生香附為末生薑自然汁和量患大小作餅復患處以艾灸之蠐螬灸法按疳瘻惡瘡諸藥不效者以此灸之取蠐螬剪去兩頭安瘡口上以艾灸之七壯一易不過七枚無不效者凡艾灸火瘡不收口用瓦松陰乾為末先以槐枝蔥白煎湯洗過然後以末搽之即收尉法凡流注痰核鶴膝肢體腫塊或風寒襲於經絡筋攣骨痛及跌撲損傷用之止痛散血誠良法也或先用隔蒜灸法余腫未消最宜用尉助血氣行壅滯用大蔥白細切杵爛炒熱敷患處尉之腫痛即止一法用大蔥一握束作數節切為餅置患處以熱物尉之或鋪艾灸之必易餅多灸多尉為妙拔毒法萆麻拔法此惟紅腫非常不得已而用之若胎前産後及患白色者禁用用萆麻子仁搗爛如泥鋪絹上照患處大小取絹蓋上貼患處用布扎好痛止即去之黃蠟拔法按潰瘡日久臭爛色黑翻花起肛及不痛頑瘡潰爛用之拔毒最妙用黃蠟為屑先以濕面隨腫根作圈高寸許實貼皮上如井口形圈外圍布數重防火氣烘膚於是鋪蠟屑三四分厚於圈內次以銅漏杓盛桑木炭火懸蠟上烘之令蠟化透又添蠟屑隨化隨添以井滿為度去火杓噴冷水少許於蠟上俟冷取起蠟底青黑色即毒出之徵也繃縛法凡陰疽潰後敷貼藥外用絹帛四五層安蓋上面再用棉布八寸見方兩塊四角用軟棉紗細帶釘之以一塊繃實患處將帶縛所餘一塊預備洗滌上藥時更換不但無外邪乘襲且使皮膜連屬融融然氣血流暢易生肌肉也洗滌法凡癰疽潰後膿水腥臭不洗滌之則毒遏延膚或穢積生蛆氣血不能融舒安望其生新肌膚故洗滌亦為要事其洗也或用解毒散或用集芳散或用蛇椒神效散洗藥不一惟在臨證措宜重者一日一洗輕者間日一洗每次用淘米第二次泔水糯米者尤妙六七碗投藥於內入鍋煎至湯醇瀝去渣以新綿蘸湯淋洗患處湯冷再易並輕手捺患旁令宿膿隨湯而出以淨為度洗訖用軟綿紙挹干隨敷貼以應用之藥蓋洗之以藥湯者疏暢榮衛一舉兩得也煎之以米泔水者以泔之逐穢生新惠而不費也人之氣血得香則行得臭則逆故洗藥中又當以集芳散為最解毒散洗一切潰久惡腐甚者先用此藥後用集芳散白礬四兩雄黃一兩貫衆二兩研細末和滾水待溫洗之集芳散洗一切潰爛癰疽官白芷川芎藿香木香防風各三錢甘草三錢五分蔥一大把蛇椒神效散洗風陰濕諸瘡備用法計六法神燈照法凡癰疽輕證初起七日前後神燈照法最宜能使未成者消已成者潰實有奇驗其法用雄黃硃砂真血竭沒藥各一錢麝香二分共研細末每用三分綿紙卷裹為捻約長尺許以真麻油潤透點照離瘡半寸許自紅暈外圈周圍徐徐照之以漸照入瘡口上所謂自外而內也更須將捻猛向外提以引毒氣使藥氣從火頭上出內透瘡中則毒隨氣散自不內侵臟腑初用三條漸加至五七條瘡熱漸消可漸減之照罷隨用後敷藥如大膿已出則不必敷藥只用膏藥貼之敷藥方用車前草豨蘞草金銀花五爪龍草各等分鮮者搗爛加陳米粉兩許飛鹽二三分共打為稠黏敷瘡上中留一頂以膏蓋貼避風如冬月無鮮草預採陰乾為末醋調敷亦妙倘五爪龍草一時難得即單用四味亦能奏功不必一定拘執也騎竹馬灸法其法令病人以手肘憑几而坐男左女右將手臂豎起要直用竹篾一條自臂腕中曲處橫紋間量起貼肉上至中指尖盡處截斷為則不量指甲另用竹竿一條令病人脫衣正身騎定前後用二人扛起令病者腳不著地仍使人扶定勿令傴僂卻將前量臂篾從竹槓上尾骶骨坐處直貼脊背量至篾盡處記之此取中之處非灸穴也又用薄篾量男左女右手中指節兩橫紋處截為同身寸法將此寸篾即安前脊中點記處兩邊各開一寸盡處即是灸穴各灸五七壯疽發左則灸右疽發右則灸左兩邊俱甚則左右皆灸此穴乃心脈所過之處凡癰疽皆心火留滯灸此則心脈流通則毒自散矣有起死回生之功屢效麻油截法凡癰疽一切惡瘡預防毒氣內攻真麻油一斤銀器內熬十數沸候冷用酒兩碗入麻油五盞通口熱服一日用盡緩則數日服之吳世安云吾家三世用之無有不效又聞獵者云凡中藥毒急飲麻油藥毒即消屢效按此方凡大便祕結而毒蓄於內者最宜用之以疏通其毒如陰疽及大便不實者卻非所宜洪丞相蜞針法凡癰瘍初作勢焮毒盛血凝不散者宜用此法以殺其勢取大螞蝗一條入筆管內以管口對瘡頭使蜞飲惡血其毒自散如瘡大須換三四條若吮正穴蜞必死矣屢試屢效若血不止以藕節上泥塗之即止若瘡頭未明以井邊泥塗上先干處即是桑枝火烘法凡陰疽發背流注附骨等證俱宜用之取桑木枝長九寸劈如指粗一頭燃著少頃吹息其焰以火向患處烘片時火盡再換每次烘三四枝每日烘二三次未潰則解寒凝止疼痛消瘀腫已潰則補陽氣散餘毒生肌肉如陰症痛甚或重如負石初起用此法出毒水即內消其日久用之雖潰亦淺且無苦楚牛膠蒸法凡癰疽發背痔漏惡瘡臁瘡久頑不斂等證用牛皮膠一塊水熬稀稠攤厚紙上每剪一塊貼瘡口次用釅醋煮軟布二塊乘熱罨膠紙上蒸之稍溫再易蒸至瘡癢膿出用貫衆二兩煎湯熱洗去膠紙外用膏藥貼之次日再照前蒸洗直至膿盡瘡干為度通用方計七十七方以下內治方仙方活命飲一治一切陽毒未成膿者內消已成膿者即潰此止痛消毒之聖藥也穿山甲蛤粉炒白芷陳皮當歸制沒藥防風金銀花皂刺天花粉甘草節貝母去心赤芍上酒一盞煎數沸溫服敗毒湯二治癰瘍焮赤熱痛煩熱作渴連翹赤芍銀花當歸黃芩天花粉各二錢甘草節一錢上酒水各半煎去渣溫服小兒減半凡紅癰初起及膿作未潰熱毒壅盛者以此方煎送醒消丸三錢立效人參敗毒散三治四時傷寒瘟疫憎寒壯熱風濕風眩項強身痛等證人參雲苓甘草枳殼麩炒桔梗柴胡前胡羌活獨活川芎薄荷各等分上研粗末每用一兩生薑三片水煎服暖臥取汗荊防敗毒散四發散瘡疹及時氣風毒邪熱本方即人參敗毒散去人參加荊防陽和湯五熟地黃一兩鹿角膠三錢白芥子二錢肉桂一錢甘草一錢薑炭五分麻黃五分上酒水各半煎去渣入鹿角膠溶化和服陽和丸六即前方內肉桂薑炭麻黃三味照分為丸防風通聖散七治三陽表裡實熱熟軍芒硝歸身白芍荊芥麻黃桔梗滑石加倍二錢石膏梔子仁黃芩連翹薄荷川芎白朮甘草防風各一錢上加蔥三根姜三片水煎去渣熱服按方內滑石石膏體重力輕宜倍用四物消風飲八治血虛內熱皮膚遊風癮疹瘙癢等證及勞傷冒風身熱口燥生地黃四錢歸身赤芍各二錢荊芥薄荷蟬蛻各一錢五分柴胡川芎黃芩各一錢二分生甘草一錢上水煎服龍膽瀉肝湯九治肝經濕熱小便赤澀或囊癰下疳便毒楊梅凡肝經有餘之證宜服之龍膽草歸尾防風知母木通丹皮甘草各二錢連翹黃芩金銀花天花粉赤芍各一錢五分上水煎去渣溫服或對陳酒一杯服導赤湯十治心火及小腸熱證小便赤澀作渴木通生地黃甘草梢各等分竹葉二十片上水煎服一方加人參麥冬散消飲十一消癰散表羌活荊芥淡豆豉當歸防風各二錢川芎制乳香制沒藥柴胡各一錢五分枳殼甘草各一錢薄荷葉五分上水煎去渣熱服復臥取汗如兼燥渴加生石膏三五錢托邪飲十二西黨參去梢生用五錢歸身三四錢白芷一錢五分防風二錢荊芥穗桔梗各二錢橘皮二錢甘草川芎各一錢上水煎去渣對陳酒一杯溫服取微汗如頭痛項強加羌活潤腸煎十三治大腸乾燥或津液枯竭或風熱氣祕宜用此方通潤之枳殼二錢氣虛減半油當歸二錢血弱倍用杏仁泥二錢槐角二錢橘皮二錢火麻仁五七分上水煎頓服小柴胡湯十四治邪在膽肝半表半裡寒熱往來喜嘔或日晡發熱脅痛耳聾鬱怒等證人參柴胡黃芩炙甘草半夏生薑大棗上水煎絞去渣再入火滾數沸溫服逍遙散十五治肝脾血虛鬱怒傷肝脅痛等證柴胡歸身酒洗白芍酒炒白朮土炒各一錢甘草五分炙薄荷葉五片上水煎加味逍遙散十六治肝脾血虛發熱等證即前方加丹皮梔子仁各一錢二陳湯十七治痰飲嘔惡風寒咳嗽中脘不快脾胃不和等證陳橘皮陳半夏各二錢茯苓一錢五分甘草八分上水煎加味二陳湯十八治流注癧核皮裡膜外之凝痰宜兼陽和丸用即前方橘皮易薄橘紅五錢加白芥子二錢獨參湯十九治氣虛氣脫及反胃嘔吐喘促粥湯入胃即吐凡諸虛垂危者人參二兩如無人參則以真阿膠黨參蜜炙代之上水一升煮取四合乘熱頓服日再進之兼以參煮粥食之更妙一方加大棗十枚四君子湯二十治脾胃虛弱飲食少思或大便不實面黃體瘦等證人參二錢白朮二錢炙草一錢茯苓三錢上加薑棗水煎或加粳米百粒六君子湯二十一治脾胃虛弱飲食難化胸膈痞悶嘔吐吞酸等證即前方加陳皮半夏各一錢五分香砂六君子湯二十二治過服涼藥以致食少作嘔或中氣虛滯噁心脹滿等證即六君子湯加藿香砂仁各八分四物湯二十三治血虛營弱一切血病當以此為主歸身三錢酒洗白芍