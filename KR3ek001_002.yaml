body:
  text: 卷二鼻部證治計十一證筋脈山根一名下極即俗所謂鼻梁是也足陽明胃脈交山根面王在鼻頭相家曰準頭亦曰明堂足陽明胃脈起面王筋亦結面王旁鼻孔即面王兩旁一名鼻隧手陽明大腸脈挾鼻孔手太陽小腸脈抵鼻孔足太陽膀胱筋結鼻孔鼻柱癰生鼻柱屬督脈經鼻為肺竅故又屬肺色紫腫硬時覺木痛多由鬱火壅結初宜服千金漏蘆湯宣解鬱毒次用仙方活命飲加梔子木通薄荷桔梗消之如勢欲潰膿按陽癰則例潰後治法千金漏蘆湯漏蘆一兩枳殼一兩麩炒朴硝一兩大黃一兩五錢生甘草一兩麻黃一兩黃芩一兩白蘞一兩連翹一兩去心升麻一兩上共研末每用三錢水一鍾薄荷葉一錢煎五分溫服以取便利為度仙方活命飲通用一鼻痔一名瘜肉痔癰生鼻孔內如肉贅下垂色紫微硬撐塞鼻孔氣息不通香臭莫辨或臭不可近痛不可搖此厚味擁濕熱蒸於肺門如雨霽之地突生芝菌也內服加味瀉白散外用黃白散點之戒酒腥暴怒加味瀉白散桑白皮生地骨皮各三錢生甘草八分桔梗辛夷各二錢黃芩陳皮木通各一錢五分上水煎食遠服一方加山梔仁生研一錢黃白散輕粉杏仁去皮尖白礬雄黃各一錢麝香少許上五味用乳鉢先研杏仁如泥後入雄礬麝香同研極細瓷器收貯患者於臥時用箸頭蘸米粒許點瘜肉上一日臥點一次半月效千金瘜肉方存驗瓜蒂華陰細辛等分上為末綿裹少許塞鼻中一方加枯礬雄黃等分麝香少許鼻齄一名酒齄鼻鼻準及鼻兩邊紅赤系陽明血熱好酒者多得此病肺受熱鬱所致亦或血熱遇寒汙濁凝結見紫黑色治宜化滯血生新血四物湯加酒芩紅花生甘草陳皮赤苓煎好入陳酒一杯調五靈脂末二錢熱服氣弱者加黃耆酒炒三五錢如不好酒者肺風致病不用五靈脂加防風荊芥外俱用硫黃膏臨臥洗面淨塗硫黃膏硫黃白芷天花粉水粉各五分全蠍一枚芫青七個去頭足翅蟬蛻五個上為細末用麻油一酒杯黃蠟一錢許熬勻離火方入前藥末和勻每於臨臥時洗面淨以少許塗面勿近眼數日間腫處自平赤鼻亦消如退風刺一夕見效硫黃散存驗硫黃輕粉各一錢杏仁五分上為末用蜜酒調於臥時塗上次早洗去效或用津唾調搽更妙附石殿撰鼻齄方存驗天台烏藥三錢銅緑三錢樟腦三錢大楓子三兩上為細末將大楓子仁去殼搗如泥入瓷罐內隔水重湯煮三柱香取出炸油和藥搽鼻患處三次即愈此藥極效未搽時與搽後皆戒酒色一月除根不發搽後患處腫痛勿畏肺風粉刺面鼻起碎紅疙瘩形如黍屑破出白粉汁宜用硫黃膏洗面後塗之數日愈硫黃膏見前鼻齄鼻疔生鼻孔內腫脹痛引腦門寒熱交作甚則唇腮俱浮腫須速治宜服奪命湯奪命丹更以奪命丹研細吹鼻內奪命湯奪命丹俱見發無定處疔瘡內鼻瘡生鼻竅內狀如粟米初覺乾燥疼痛甚則鼻外色紅微腫痛似火炙乃肺經壅熱上攻內用黃芩湯清之外用辰砂定痛散搽鼻內如干燥者以麻油頻潤之黃芩湯黃芩二錢酒炒桑皮三錢生梔子一錢五分連皮酒炒桔梗赤芍連翹各一錢薄荷一錢五分生甘草五分上水煎食後服辰砂定痛散辰砂五分末石膏一兩煅胡黃連五錢冰片二分上共研極細末生地汁調搽鼻中或麻油調亦可鼻䘌瘡多生小兒鼻翅兩旁色紫斑爛膿汁浸淫癢而不痛乃肺經風熱內服澤瀉散外搽青蛤散即愈澤瀉散澤瀉鬱金生山梔仁生甘草各一錢上水煎或為末開水調服青蛤散蛤粉石膏各一兩黃柏生末輕粉各五錢青黛三錢上共研細末先用香油調成塊次加涼水調稀塗瘡上鼻淵鼻流濁涕經年纍月不止當別寒熱涕臭屬熱膽移熱於腦風寒伏郁所致用奇授藿香丸涕清不臭覺腥者屬虛寒用八味地黃丸加川芎升麻蒼耳子所以用腎藥者腦屬腎也又有虛暈腦痛不出水者即控腦痧有蟲食腦中用天蘿散外以桃葉作枕枕之自愈奇授藿香丸藿香連枝葉八兩上研細末雄雞膽汁和丸如桐子大每服五錢食後蒼耳子湯下或清酒送下天蘿散絲瓜藤近根處者燒存性上為末每服三錢食後清酒送下八味地黃丸通用四十五鼻衄陰虛火動氣逆於肝血隨鼻出不甚不足慮甚而久者與吐血無異治宜涼血行血用黃芩白芨各二兩水丸服之神效如不甚只用外治一用水紙搭鼻沖責其火在胃也一用涼水拊後頸責其火在膀胱也一用線扎中指左衄扎左右衄扎右左右皆衄左右皆扎責其火在心胞絡也皆治鼻衄捷法齆鼻鼻竅常塞不聞香臭用鐵鎖在石上磨取末豬脂調綿裹塞鼻內又方用乾薑為末蜜調塞鼻鼻毛癰鼻毛一晝夜忽長一二尺漸粗圓如繩摘去更生痛不可忍因食豬羊血過多所致用硇砂乳香飯丸早晚水下十粒自落耳部證治計十四證筋脈耳中腎氣通耳耳中病責在腎手太陽小腸足少陽膽手少陽三焦脈俱入耳中耳前足陽明胃脈上耳前筋結耳前足少陽膽脈手少陽三焦脈俱走耳前三焦脈從耳前屬目耳後手太陽小腸筋足太陽膀胱筋俱走耳後完骨足陽明胃脈之支足少陽膽脈手少陽三焦脈俱過耳後鋭毒一名耳後毒發在耳後宜別陰陽治之患色白者按陰疽例治患色紅者按陽癰例治如發耳垂後名耳根毒辨治亦然膿耳停耳耵耳耳孔內時出膿曰膿耳赤腫潰爛流膿曰停耳膿濕結塊塞耳暴聾曰耵耳皆內火攻衝郁聚不散歸芍地黃湯熟地易生地白芍易赤芍加山梔仁柴胡主之甚者用龍膽瀉肝湯加柴胡外俱用紅棉散一有耳忽大痛如有蟲在內奔走或血水流出或痛不可忍者用蛇蛻燒灰存性研細末鵝翎管吹之立愈紅棉散海螵蛸枯礬各三錢干燕脂一錢五分燒存性麝香五分上共研細末瓷器收貯聽用每少許吹入耳內或摻潰爛處俱效膿耳方存驗菖蒲根水洗淨上搗取汁先用棉碇卷干耳內膿然後將菖蒲汁灌入蕩洗數次即愈耵耳方存驗地龍糞釜底墨生豬脂上共搗勻蔥汁和捏如棗核綿裹塞耳潤則換歸芍地黃丸通用三七十龍膽瀉肝湯通用九耳痔耳菌耳梃三證皆生耳竅內耳痔形如櫻桃亦有形如羊奶者耳菌形如蘑菰頭大蒂小耳梃形如棗核細條而長努出耳內皆系肝腎濕熱鬱於血分所致以脾胃主九竅故也微腫悶疼色紅皮破偶一觸犯痛引腦巔內俱用加味逍遙散甚者龍膽瀉肝湯外用雞矢白炒研敷之或黃白散點之漸漸消化又方以火酒滴入仰之半時即可鉗出加味逍遙散通用十六龍膽瀉肝湯通用九黃白散見前鼻部鼻痔耳疔一名黑疔生耳竅暗藏之處色黑形如椒目疼如錐刺引及腮腦破流血水急服奪命湯外用蟾酥雄黃等分為末水和濃滴入耳內奪命湯見發無定處疔瘡內傷耳痛耳內不膿不腫只作干痛或作癢或出水或經年不愈或交接便發此皆肝腎二家虛火為病加減八味丸主之加減八味丸通用四十六耳鳴耳鳴者耳中有聲或若蟬鳴或若鐘鳴或若火熇熇然或若流水聲或若簸米聲或睡著如打戰鼓如風入耳皆因腎元虧損肝木疏泄陰氣升至上竅竅隔一膜不能越出竅外止於竅中汩汩有聲格外入之者為其內聲所混聽之不清服攝陰煎脾胃弱者兼服補中益氣湯一有因怒而鳴者乃三焦氣逆小柴胡湯加當歸川芎山梔仁主之攝陰煎活磁石一兩地黃首烏龜版鱉甲各五錢山茱萸肉白芍山藥各二錢五味子一錢五分上水煎二次去渣食前溫服治元陰虛損高年逆上之氣屢有奇效如為丸將方內磁石減半龜鱉首烏各減二錢依方合十劑水跌為丸每清晨淡鹽湯下五六錢補中益氣湯通用三十小柴胡湯通用十四暴聾暴聾者猝然閉塞無聞腎氣虛脫則有之亦或三焦氣逆氣鬱而然者其證必哄哄焞焞脹悶煩熱四物湯加柴胡山梔中氣弱者加減歸脾湯亦或肝膽風熱上攻而然者其證必兼頭痛小柴胡湯加川芎歸身山梔仁亦或因損傷挖傷雷炮震傷患聤耳潰膿不止等證而聾者則宜用開通之法如腎虧精脫或年衰或病後或勞倦過度或大恐氣結漸至耳聾者須大培根本用八珍湯地黃丸補中益氣湯之類然多難愈開通法一用酒浸針砂一日至晚去砂將酒含口中取活磁石一塊塞耳左聾塞左右聾塞右此導氣古法也一用巴豆一粒去心皮斑蝥一枚去翅足二物合搗綿裹塞耳中再易甚效一用大蒜一瓣中剜一孔以巴豆一粒去皮膜入蒜內慢火炮極熟用新棉包定塞耳中三次效一用全蠍四十九枚以生薑厚片如數鋪鍋內置蠍於其上輕烙薑片至黃色取蠍去毒並頭足研為末酒調送下隨量飲醉取汗外取生蠍去毒為末酒調滴耳中聞流水聲即愈四物湯通用二十三小柴胡湯通用十四補中益氣湯通用三十旋耳瘡一名月蝕瘡生耳後縫間延及耳折上下色紅如刀裂之狀時流黃水乃膽脾濕熱用穿粉散搽之即愈輕粉隔紙微炒研穿山甲炙鉛粉黃丹各三錢飛用上共研細末香油調搽附方存驗胡黃連上一味研細末麻油調搽耳衄耳竅中時流鮮血肝腎火升所致用地芩飲或六味地黃湯加山梔仁赤苓外用蒲黃炒黑研末摻入即止地芩飲生地黃一兩黃芩二錢酒炒上加青荷葉五錢水煎去渣微溫服六味地黃湯通用四十三百蟲入耳凡蟲偶入耳中以生薑搽貓鼻其尿自出取尿滴入耳內蟲即出或用米醋滴入其蟲不出亦死用細蘆管入耳吸之蟲隨出一蜈蚣入耳用香雞肉置耳邊豬肉炙香亦可一飛蛾入耳用雞管極氣吹之或擊銅器於耳邊一蟻入耳用韭汁灌一蜒蚰入耳用鹽撒耳內即化水或以苦酒注之一螞蝗入耳取田中泥一盆枕耳聞氣即出一磕頭蟲其蟲按其後即磕頭有聲入耳灌以生油即出不可殺之一蚤蝨入耳用菖蒲末炒熟袋盛枕之一蛆蟲入耳用杏仁搗爛取油滴入不出即死一水銀入耳用金銀著耳邊即出一水入耳中用薄荷汁滴入立效口部證治計八證筋脈口脾氣通口口之四周為吻足陽明胃筋脈俱挾口手陽明大腸脈出兩吻涎俗名口水脾主之脾虛不能約束則涎自出脾損發熱則涎泛濫口糜滿口糜爛色紅作痛口乾舌燥甚者腮舌俱腫初宜服導赤湯加麥冬五味子薄荷如斑爛延及咽喉不能飲食日輕夜重者用蘇子利喉湯如口臭泄瀉脾虛濕熱者用連理湯如口燥大便溏屬虛熱用補中益氣湯加麥冬五味最善或兼服六味地黃丸以滋化源外俱用珍珠散搽之連理湯人參白朮各二錢炒乾薑一錢黃連一錢甘草一錢炙上水煎熱服導赤湯通用十補中益氣湯通用三十蘇子利喉湯見後喉癰下六味地黃丸通用四十三珍珠散見後喉癰口瘡鵝口滿口白色斑點甚者陷露龜紋口乾不渴此屬心腎不交虛火上炎宜服歸芍地黃湯加麥冬五味子或少加肉桂以為嚮導從治之法也外吹珍珠散如舌乾黃硬或熱從腳起乃無根之火宜服加減八味地黃丸以滋化源一初生小兒口內滿生白屑名鵝口一名雪口先用棉蘸水絞去口中白屑以珍珠散頻吹內服犀角汁即愈口瘡神效方存驗吳茱萸上為末米醋調敷兩足心一夜即愈不拘多少小兒纍用神驗引虛火歸元之功也附方存驗用陳白螺螄殼燒灰加兒茶少許為末吹患處一次即愈諸疳悉治歸芍地黃湯通用三十七加減八味丸通用四十六珍珠散見後喉痛口菌一名口菌多生在牙齦肉上隆起形如菌或如木耳紫黑色火盛血熱氣滯而生宜內服加味甘桔湯外吹珍珠散如火鬱火熾則生舌上治法詳見舌部加味甘桔湯甘草三錢生桔梗荊芥牛蒡子炒貝母去心薄荷各一錢五分上水煎服如內熱盛或飲食入口即吐者加黃連一錢如口渴唇焦舌燥便祕溺赤者加生地黃芩山梔仁如有腫處加金銀花五錢珍珠散見後喉癰連珠疳舌下生水泡初起一枚漸發至七八枚刺破吹珍珠散口疳一名脾疸有經年不愈者有時愈時發者皆因素食肥甘所致食肥多熱食甘滿中其氣上溢生疳用天冬麥冬元參等分白蜜丸彈子大不時取一丸入口噙咽久服自效外吹珍珠散一小兒口疳用生香附生半夏等分為末雞子白調作餅貼男左女右腳心一周時愈珍珠散見後喉癰螳螂子小孩腮內生一紅塊不能食乳名螳螂子用生地五錢酒浸搗爛塗腳心男左女右外用布縛好干則易之至愈乃止小兒口內生黃馬牙即螳螂子口噤頰腫證重者以針微刺患處出血即用京墨磨塗立愈附驗口球口內生肉球有根線長四五寸余吐球出方能飲食以手輕按痛徹心腑每日用生麝香一分水調頻服之三日根化即愈懸癰一名上齶癰生於上齶形如紫李脾經蘊熱所致不急治恐毒氣上攻頭腦則不可救宜用銀針針破癰頭用鹽湯攪淨瘀血吹珍珠散內服加味甘桔湯加味甘桔湯見前目菌珍珠散見後喉癰唇部證治計八證筋脈唇脾胃肝三經所主脾之榮在唇四白足陽明胃脈環唇足厥陰肝脈環唇唇癰生上唇不拘上下左右大者如李小者如棗色紫有頭腫硬疼痛甚者寒熱交作內用仙方活命飲外敷螵蛸散即消仙方活命飲通用一螵蛸散通用六十八唇疔一名反唇疔一名鎖口疔生上下唇角初起形如粒米堅硬腫盛麻癢木痛憎寒發熱甚則令唇外翻或口不能開故有反唇鎖口之名須按疔瘡法速治之遲則走黃致命繭唇唇上起白皮小泡漸腫漸大如蠶繭或唇下腫如黑棗燥裂癢痛皆七情火動傷血治宜補脾氣生脾血則燥自潤火自平腫自消補中益氣湯加梔仁芍藥丹皮最妙或加味歸脾湯亦妙外用紫歸油頻潤之如日久失治誤服清火之藥多致翻花不治紫歸油紫草當歸上等分麻油熬去渣出火氣以棉蘸油頻頻潤之補中益氣湯通用三十加味歸脾湯通用三十一唇風一名唇瞤多在下唇初發癢紅腫日久破裂流水疼如火燎似無皮之狀此脾經血燥也如風燥則不時瞤動四物消風飲主之宜倍用歸地外用紫歸油頻抹愈四物消風飲通用八紫歸油見前繭唇唇沉濕爛曰沉脾家濕熱內用白朮散外取葵根燒存性研末豬脂調塗白朮散白朮三錢微炒雲苓二錢薏苡仁五錢炒鮮石斛四錢葛根二錢木瓜五分生甘草五分上加石蓮肉二十枚水煎溫服唇裂唇上乾燥漸裂開縫作疼系脾熱以紫歸油潤之內服滋唇飲滋唇飲生地黃四錢鮮石斛三錢竹茹石膏生研當歸白芍各二錢生生甘草一錢上水煎去渣加白蜜少許和服紫歸油見前繭唇唇瘡蟲食肛上唇生瘡聲必啞蟲食臟下唇生瘡咽必干皆因腹內生熱而食少者腸胃空虛三蟲求食之故用烏梅湯主之亦有氣鬱生瘡者則無聲啞咽乾之證用甑上滴下氣汗水塗之如神白荷花瓣貼之亦效烏梅湯烏梅三枚醋浸黃連一錢二分乾薑一錢犀角二錢木香八分雄黃一錢五分人參二錢桃仁泥八分上水煎頓服缺唇先敷麻藥用刀刮取兩邊薄皮用絲縫在一處以蟹黃敷之自收口麻藥備用七齒部證治計十六證筋脈齒牙內床曰齒外板曰牙皆骨之餘故齒牙屬腎足陽明胃脈入上齒縫中手陽明大腸脈入下齒縫中牙癰一名牙蜞風又名牙舌䪞生牙根肉上不拘上下內外其狀高硬小塊或如豆大紅腫疼痛宜用針刺出毒血以珍珠散吹之內服龍膽瀉肝湯龍膽瀉肝湯通用九珍珠散見後喉癰齒痛齒痛多在內床內床主嚼勞而易傷若是腎虛搖動不痛痛則必是風火蟲風從外入火自內出蟲又風之所化而風痛居多內服牙疼飲用二辛煎漱之即愈一有因食蟹致齦腫肉努出者用生地汁一碗以豬牙皂蘸炙汁盡為末敷之即愈牙疼飲石膏四錢研升麻一錢五分大生地五錢防風薄荷葉荊芥穗前胡天麻各二錢甘草一錢生上水煎食後熱服避風如牙腫加金銀花羌活各二錢如牙燥去升麻前胡加元參一錢五分如牙爛去前胡天麻加木通梔仁各一錢五分二辛煎北細辛五分石膏五錢上二味為粗末濃煎頻漱即愈不可咽下齒齲齒䘌齒齲齒䘌皆屬蟲齒䘌齦內腐爛出膿血齒齲牙黑不腐爛不出膿血以此為別皆系腸胃濕熱郁久生蟲凡齧齒齒碎齧齦齦痛不齧則微痛齦癢又或癢或脹痛忽然而止者皆蟲蠹之故與風火大異用五靈脂如米大咬在痛齒上少頃溫水漱出必有蟲又靈升散最妙遇蟲痛塞痛處少許立愈靈升散一名升丹樟腦五分川椒紅一撮上藥等分研碎放銅杓內茶鍾蓋上稠面封四圍勿令走氣放風爐上微火升之少頃覺樟腦氣透出即取安放地上候冷揭開藥俱升在茶鍾底刮下入瓷器密貯聽用熏蟲牙法驗過用撇盆一個盛水少許中覆一粗碗取瓦片煅紅置碗底上放韭子一撮清油數點待煙起用竹筒上口小下口大如喇叭式罩碗上以上口對痛齒熏之良久煙盡以溫水漱吐必有小蟲出未盡再熏骨槽風牙骨及腮內疼痛不腫不紅痛連臉骨者是也加味二陳湯入陽和丸主之甚者用陽和湯數劑即愈此證初起往往有誤為牙痛而用涼藥者致牙齦蝕爛透骨穿腮延及咽喉則不救宜急用陽和湯犀黃丸每日早晚輪服外用南星散搽之如有多骨以推車散吹入隔一夜其骨不痛自出吹至次日無骨退出用生肌藥服保元湯加肉桂芎歸收功南星散用天南星一枚挖空入雄黃一塊麥麵包裹火燒俟雄黃融以杯合定遠火俟冷去面研末加麝香一分研拂患處加味二陳湯通用十八陽和丸通用六陽和湯通用五犀黃丸通用四十八推車散通用六十六保元湯通用二十八牙疔又名穿牙疔先一二日牙痛寒熱交作後痛更甚牙縫齦上發一紅粒齦肉皆紫黑色是也痛引腮項若兼癢麻破流血水用銀針刺之搽拔疔散服奪命湯如失治則走黃不救矣拔疔散見疔瘡奪命湯見疔瘡牙宣牙齦盡腫宣露於外或衄血不止清胃散加薄荷忍冬藤主之外搽珍珠散清胃散石膏四錢生研生地黃四錢丹皮一錢五分黃連一錢黃芩一錢升麻一錢五分甘草一錢或五分生上水煎去渣熱服珍珠散見喉部喉癰牙衄亦名牙宣齒縫出血無論大人小兒當別虛實治之陽明實熱則血出如湧口必臭而牙不動清胃散主之陽明壅實之甚口渴便祕而衄不止者用調胃承氣湯入童便和服下黑糞即愈然必便祕口渴燥熱方可用如陽明虛熱牙齦腐爛血水滲流不已者二參湯主之或補中益氣湯加山梔丹皮如腎陰不固虛火上熾口不臭牙不痛但搖動不堅或微痛不甚而牙縫點滴出血者治宜滋腎六味地黃丸加猴姜主之或有陽虛火浮者則宜用加減八味丸加猴姜隨手應效如小兒疳積氣盛者必兼服蘆薈丸外俱用小薊散擦之調胃承氣湯大黃三錢酒製元明粉一錢五分甘草一錢枳殼一錢五分上水煎去渣入元明粉熔化頓服二參湯人參元參等分上水煎溫服一加麥冬甘草小薊散小薊百草霜蒲黃炒香附醋製上等分研細末用擦牙上半刻以溫茶漱之又方存驗青竹茹上一味醋浸一宿含漱甚效清胃散見前牙宣補中益氣湯通用三十六味地黃丸通用四十三加減八味丸通用四十六蘆薈丸見後陰肛門作癢牙咬生於牙盡咬中牙關緊閉此證初起勢甚危夜尤甚然不難愈先用珍珠散吹牙齦外用黃熟香附削釘漸漸𢶍進牙門漸開即將珍珠散吹患處珍珠散見喉部喉癰牙漏患牙證久不愈齒縫出膿甚至齒落如上邊左門牙落則不治外吹珍珠散內服滋陰降火之劑歸芍地黃湯加元參麥冬珍珠散見喉部喉癰歸芍地黃湯通用三十七蟲疳齦腫出血疼痛臭穢惡寒惡熱此皆腸胃濕熱為患兼風則開口呷風更痛積熱則臭穢難近宜用清胃散去黃連加歸身元參各二錢風加防風臭加山梔又要知喜惡寒熱胃血受傷用此方固佳若惡寒喜熱胃氣受傷必用補中益氣湯外俱搽珍珠散附方存驗胡黃連五分膽礬兒茶各一分上共研細末搽之治牙齦疳爛立效清胃散見前牙宣補中益氣湯通用三十珍珠散見喉部走馬牙疳初牙間紅腫漸變紫黑腐爛臭穢此係胎毒或痘毒殺人最速一日爛一分兩日爛一寸走馬喻其速也鼻梁上發紅點如珠則不治上唇左門牙落者死急服清胃散外以童便漱其毒赤霜散吹之雖致延爛穿腮不堪危險之候並效赤霜散用紅棗一枚去核入紅砒如黃豆大一粒扎好放瓦上炭火炙至棗枯煙盡為度取起蓋熄俟冷加冰片一分研吹立效又方存驗用白馬前蹄修下之腳皮炙炭存性為末加冰片少許吹患處立愈清胃散見前牙宣齒豁牙床不痛齒疏豁動搖脫落系腎虛六味地黃湯加枸杞續斷猴姜主之外用青鹽二兩食鹽四兩川椒煎汁拌鹽炒乾研末常以搽牙永無齒疾牙縫脹滿口牙齒浮而脹不能咬嚼此元氣大虛補中益氣湯十全大補湯酌用補中益氣湯通用三十十全大補湯通用二十六髓溢牙齒長出分余漸至難食名髓溢用白朮煎湯漱服又方常咋生地黃妙馬牙初生小孩牙齦有白色如脫骨者是將發此毒即打嚏日日要挑珍珠散吹之珍珠散見喉部取齒牙活鯽魚一尾約重十兩以白砒一錢入魚腹放無風無貓犬處七日魚身發出白毛用雞羽拂毛以少許膏藥收之每遇病牙取些微膏藥貼其上片刻即落附固齒方採旱蓮草洗淨每斤用青鹽四兩淹十日取出曬乾為末每日早晚擦牙舌部證治計九證筋脈舌舌為心苗舌根為舌本足太陰脾脈連舌本散舌下足少陰腎脈挾舌本足太陽膀胱經結舌本手少陽三焦脈系舌本紫舌脹一名木舌舌腫色如豬肝脹塞滿口堅硬疼痛不能轉動粥藥不入乃心脾壅熱先用衣針扎箸頭上露分許當舌尖或舌兩旁刺出紫血舌之下不可刺恐傷舌系傷則不能收功次用箸卷棉蘸甘草湯潤其唇旋蘸生蒲黃細末在舌四旁頻擦至腫消舌軟方止內服九味敗毒湯九味敗毒湯黃連荊芥黃芩連翹牛蒡子薄荷葉木通山梔各一錢甘草四分生上加燈心一撮水煎去渣溫服附方存驗雄雞冠血浸舌咽下即消重舌一名子舌又名舌䪞舌舌之下血脈脹起如小舌狀故名不可用針刺宜用桑皮殭蠶發灰等分末醋調厚敷舌下或珍珠散吹之又方用鏽鐵鎖燒紅打下鐵鏽研末水調一錢噙咽痰包生舌下結腫如匏棉軟不硬塞脹舌下有妨飲食言語色黃作痛不安乃痰飲熱氣凝注舌絡宜用小剪將包剪破則出痰涎如雞子清稠黏不斷拭淨搽珍珠散服二陳加芩連薄荷湯忌煎炒火酒等物二陳加芩連薄荷湯陳皮二錢半夏二錢茯苓二錢甘草一錢黃芩一錢黃連五分薄荷一錢五分上水二鍾煎八分食後服珍珠散見後喉部喉癰舌疔舌生紫泡其形如豆堅硬寒熱疼痛應心宜服奪命湯倍黃連煎好口含徐徐咽之或再服奪命丹三粒以解蘊毒奪命湯奪命丹俱見發無定處疔瘡下舌菌一名舌痔一名舌芝其證生舌上初如豆次如菌頭大蒂小亦有如雞冠樣者妨礙飲食言語諸書云是心脾鬱火實熱亦有不盡然者如色赤疼痛口渴煩躁或舌紫腫脹時流臭涎或因怒氣上衝忽崩裂血出不止此可作鬱火治用瓷鋒刺破菌處擦北庭丹以蒲黃末蓋之內服九味敗毒湯加犀角汁少許連服數劑自然縮愈如色白木木然不甚痛舌上枯白口不作干或舌本強硬短縮或兼項頷結核外勢頗類喉風但喉風咽喉常腫湯水不能下咽此症咽喉不腫湯水可以下咽多緣心境不佳元氣虧損若誤服寒涼則致爛開透舌穿腮湯水漏出又名為瘰癧風百無一生總因偏執清火敗毒故耳初起治法以補中益氣湯加桂枝白芍或歸脾湯潰爛者用犀黃丸十全大補湯輪服多獲全愈故辨證不可不明北庭丹硇砂人中白各五分瓦上青苔瓦松溏雞矢各一錢上用傾銀罐子一個將藥裝入罐內鹽泥封固入炭火煅紅取出俟冷加麝香冰片各一分研細末收瓷瓶聽用九味敗毒湯見前舌紫脹補中益氣湯通用三十歸脾湯通用三十一犀黃丸通用四十八十全大補湯通用二十六舌核舌上生核強硬作痛宜用衣針點破以冰硼散擦之內辨寒熱虛實用藥冰硼散冰片五分硼砂五分共研細末瓷瓶密貯每用少許搽擦瘡處如咽喉腫痛並效一方有元明粉五錢硃砂五分舌衄舌上忽生孔血出如縷由心脾腎三經火鬱而然用槐花炒研末敷之自止內服導赤散如血出舌硬者用小薊搗汁和酒服乾者為末冷水服舌吐不收舌出數寸連日不收者有傷寒産後中毒大驚四種傷寒用冰片末搽舌上則應手而收病重者用五錢方愈産後用硃砂末敷舌上仍令作産子狀以二女掖之乃於窗外潛纍盆盎置危險處墮地作聲令患者驚聞即收如中毒舌忽脹出口外用雄雞血浸之或冬青濃煎汁浸之受驚者驚定則收舌尖咬去用螃蟹一隻搗爛取汁以雞毛拖汁掃上即長或以栗子一個去殼同搗噙口內亦好如無生蟹則用蟹殼煅存性研極細摻上亦可漸漸長完附接舌仙方用馬蘭花根如天門冬樣螃蟹共搗爛陰陽瓦焙乾為末敷之七日可長成或用熟蟹黃同馬蘭根搗爛陰乾為末敷之效更速喉部證治計十五證筋脈喉嚨喉在咽前通肺主出氣故喉嚨曰肺系又曰喉氣通天足陽明胃足少陰腎二脈循喉手少陽三焦脈由喉咽咽在喉後通胃主納食胃口在膈膜下咽至胃長一尺六寸通胃之咽門咽門下有膈膜故咽氣通地手少陰心足太陰脾二脈挾咽手太陽小腸脈循咽足厥陰肝脈循咽後嗌咽之低處曰嗌會厭音聲之戶曰會厭當咽上司開闔掩喉食下咽不掩則錯必舌齶抵上齶則會厭方掩喉辨證大略咽喉之地尤為急證咽喉嗌會厭為飲食氣息之道路四者缺一則食廢息閉而死故證屬要緊之地當急治也頃刻而痛難忍實系寒生寒生者陰寒也外象似熱內系真寒治當引火歸元如方中桂薑湯歸源丹是也婉轉而痛方騰乃為熱病熱病者風熱也風無熱不熏熱無風不熾治當疏風降火如方中蘇子利喉湯黃連清喉飲是也譬之龍雷之火焰因陰生龍雷之火虛火也龍雷之性必陰雲四合然後遂其升騰之勢得雨益熾若天清日朗則退藏不動矣人身腎中之相火亦猶是平素不能節欲致命火衰腎中陰盛龍火無藏身之地暴越於外則現頃刻急證如喉痹之類是也燎火之熾由漸著也燎火之火凡火也積薪蔓草之中初得一點凡火星星然其勢不覺殊不知由星星而至於焰焰由焰焰至於炎炎遂不可止遏不可向邇在人身或為外邪所傷或為內虧所致津枯液竭邪熱灼熾蓋非一朝一夕之故如喉癰喉蛾之類是也經云驟起非火緩起非寒此引靈樞內難之旨以證辨虛實也龍雷之火潛伏陰中當其未動不知其為火也及其一發暴不可御故病則驟起若夫五行有形之陽火星星至於燎原逐漸而甚故病則緩起火指陽火寒指虛火蓋驟起緩起之間正有陽火陰寒之別也虛寒實熱識透者獲濟虛寒宜溫補實熱宜涼泄識病有危微之辨用藥有天壤之殊故治病非難識病惟難耳能於虛實寒熱之間辨得明識得透而投藥未有不獲濟於反掌者是在明睿之士知所區別乃隨所投而無誤耳陰寒之證誤投陽火之藥則致頑痰塞滿口鼻聲如曳鋸呼吸閉絶而死陽火之證誤投陰寒之藥則致咽喉腫閉潰爛舌如紫茄飲食廢絶而死噫毫釐千里性命系焉豈可視醫為小道哉苟隨證知所區別投藥百無一誤非明睿之士不能喉痹痹者不仁也驟起也危極之證痰在喉中作響響如打鼾鼻色白而不腫諸書皆稱肺絶不救蓋緣誤服寒涼以致死耳如果用桂薑湯服之立愈倘喉內痰邪塞滿舌有痰護此痰不出聲如曳鋸惟誤服寒劑方有是證遲則痰塞鼻內氣無出入即死急取鵝毛一根黏釐許桐油入喉一卷則痰隨油吐出進桂薑湯或歸源湯桂薑湯肉桂炮姜甘草各五分上共歸碗內取滾水衝入更將碗燉於滾水中掉藥口許慢慢咽下立愈按此方專治頃刻而起前無毫恙者此陰火虛寒之證服之立愈歸源湯大附子生者一枚去皮臍切作大片用白密塗炙令透老黃色為度上收貯臨用取如粞一粒口含咽津治格陽喉痹頃刻暴痛之證立愈喉癰喉間紅腫疼痛無別形狀宜先服蘇子利喉湯一劑接後服黃連清喉飲外吹珍珠散即愈如舌下若生一小舌連喉腫痛為舌䪞舌喉癰二者相兼則凶用珍珠散吹舌根舌下及兩旁不得間斷服藥如喉癰一咽中結塊腫痛水食不通此危證也治法如前兼服百靈丸一女人患喉閉腫痛乳蛾等證當問其月經調否如經閉者宜用四物湯加茺蔚子牛膝香附桃仁各二錢服之俾經脈流通喉證自愈如仍未愈服蘇子利喉湯蘇子利喉湯蘇子前胡赤芍各二錢甘草桔梗各一錢元參連翹浙貝各一錢五分上水煎溫服按此方可加薄荷二錢或一錢黃連清喉飲川連一錢桔梗牛蒡子炒元參赤芍荊芥各一錢五分甘草一錢連翹黃芩天花粉射干防風各一錢五分上水煎熱服此方治喉癰實火證也但喉病實火者少虛火者多不可輕試若寒必先投蘇子利喉湯一二劑不應且有口乾便祕煩熱之證方可用之如便泄口和雖有喉癰腫痛之甚亦只用蘇子利喉湯倍桔梗加牛蒡射干各錢半治之兼服百靈丸必愈尤為善法百靈丸百草霜即鍋底煤也系燒山柴草樹方是除當底及邊口不用浮面與著鐵不用取中一層收貯上用煉蜜丸芡實大每用一丸新汲水化服按此方取消化積滯火化從治之義珍珠散硼砂雄精川連兒茶人中白冰片薄荷葉黃柏各末等分大破珠子研末減半上各末戥足共歸一處如研勻細瓷瓶密貯聽用吹喉散附驗冰片三分殭蠶五釐硼砂二錢牙硝七錢五分上共為末吹喉神效附刺少商穴法治一切喉證腫痛凡於道路乏醫藥之處遇有喉患藥未及備宜用此法急救之穴在手大指內側去爪甲角如韭葉刺入二分許以手自臂勒至刺處出血即愈四物湯通用二十三乳蛾其形圓如箸頭白色生於咽喉關上者輕生於關下者重或左有右無或右有左無曰單左右皆有曰雙雙者輕單者重用蘇子利喉湯數劑即愈外吹珍珠散又以土牛膝絞汁含口慢咽妙急救乳蛾方附驗用兩手從臂上抹至大拇指間四五十下以繩扎住男左女右以針刺大指縫中出血即愈乳蛾破爛神效方附驗人中白三分煅冰片二分上共研細末吹之蘇子利喉湯珠珠散俱見前喉癰鎖喉喉內無蛾形痰聲不響而喉欲閉者是也治同喉蛾喉閉此證兩三日前即氣急喉痛手足厥冷忽然痰壅氣閉命懸頃刻者是治同喉蛾若兩三日前並無喉恙而屬驟起者須用歸源湯或桂薑湯忌服前藥纏喉風喉內熱結喉外腫繞且癢且麻者是治同喉蛾喉菌狀如浮萍色紫生喉旁憂鬱氣滯血熱則生婦人多患之輕則半月重則月餘宜守戒忌口內用蘇子利喉湯加山梔丹皮香附兼服百靈丸外吹冰硼散蘇子利喉湯百靈丸俱見前喉癰冰硼散見前舌部舌核喉珠腦門生一紅線如發懸一黑泡大如櫻桃血絲相裹掛至咽門此肺經鬱熱所致如用刀點即死取土牛膝活根搗汁以好醋二三滴和勻滴入鼻中三四次絲斷珠破吐出瘀血立愈喉瘤形如圓眼核大紅絲相裹或單或雙生於喉旁亦有頂大蒂小者由肝膽鬱怒鬱熱而成忌用刀針宜服益氣左金湯外以碧玉散頻點之益氣左金湯苦桔梗三錢黃芩二錢酒炒浙貝母一錢五分去心研人參一錢陳皮牛蒡子各一錢五分麥冬一錢五分生梔仁薄荷葉甘草生蘇葉雲苓各一錢上加竹葉三十片水三鍾煎一鍾食遠服渣再煎服碧玉散硼砂三錢膽礬冰片各三分上共研細末用時以箸頭蘸點患處喉癬喉間生紅絲如戈窯紋又如秋海棠葉背不閉不腫氣出如常乾燥而癢飲食不遂乃系虛火上炎最淹纏難愈癆瘵多生此證至喉啞則不救用青靈丹不時噙服外以清溪祕傳礬精散吹之斯疾要清心戒飲忌鹽醬及助火之物否則縱然見效不能除根也青靈丹牛黃冰片各一分膽礬三分雄精硼砂兒茶山豆根各八分上為細末用白梅三枚去核共搗作十丸分十日噙服清溪祕製礬精散用白礬不拘多少研末取方磚一塊以火燒紅灑水於磚上將礬末布於磚上以瓷盤覆蓋四面灰擁一日夜礬飛盤上掃下用二錢白霜梅兩個去核明雄黃穿山甲炙各一錢共研細末以細筆管吹入喉內喉瘻一名喉瘡喉間生肉層層相迭漸漸腫起不痛有竅出臭氣廢飲食用枸橘葉煎湯頻服消腫導毒喉中腥臭此肺胃熱毒用黃芩射干煎服咽喉痛不能納唾與食此為地氣閉塞屬虛火蘇子利喉湯加荊芥倍桔梗元參主之吹珍珠散蘇子利喉湯珍珠散俱見前喉癰梅核氣喉中似有物如龍眼大吞不入吐不出名梅核氣男婦皆有此證宜用甘草苦桔梗老蘇梗橘紅厚朴半夏茯苓金沸草生薑之類服之漸愈或針少商穴亦妙骨梗類諸物梗於喉中或刺或骨必有鋒芒所以刺而不下凡下而逆者反而上之則順矣故治此者當借飲食之勢湧而吐之使之上出則如拔刺之捷也如遲延芒刺既深或飲食已消無可推送以致腫痛者用捕梗丸噙口化咽不十丸其梗不出即消雖梗死之人但有微氣服之必活一諸魚骨梗用白飴糖食之自消一魚骨橫在胸間不上不下痛楚之甚飲食不得欲死者用橄欖食之即消或將橄欖核研末急流水調服愈一魚鱗梗在胸間則眼中常見一小鏡子用芥醋一甌半飢啜之即愈一誤吞犬肉骨梗於喉間引手可揣摩百計不下用南硼砂一塊汲水洗淨含化終食間愈一雞骨梗喉用鳳仙花根搗爛噙咽即下急以溫水漱口否則損齒亦治魚骨梗一蟹殼梗喉用活鴨一隻倒懸取鴨口涎半盞咽之即下一稻麥芒梗喉用紫花地丁嚼爛咽下即安或頻食飴糖亦安一桃李核梗喉用狗骨煮湯磨摩頭上一竹木梗喉用舊鋸或稱錘燒紅淬酒熱飲之極效又方取牛口涎開水對服即下一頭髮梗喉用舊木梳燒灰酒服或將亂髮燒灰存性開水調下即愈一鐵針誤入咽喉無藥可施宜取癩蝦蟆數個將頭剁去倒垂流水以碗接之得一杯許水灌入喉中移時則連針吐出針自軟曲或用飴糖一斤食盡則便出如針已入腹百藥不能治用蠶豆韭菜同煮日食則隨大便出捕梗丸尋多年懸掛麻繩上有灰塵堆積者連繩解來用新瓦盛之炭火煅枯存性研末洋糖丸如芡實大每用一丸含在口中化下不十丸其梗物不出即消雖梗死之人但有微氣服之必活按此方治諸骨梗喉極效誤吞類計八條誤吞銅錢一誤吞銅錢多食荸薺即可化堅為軟從大便出又方多食胡桃自化而出胡桃與銅錢共食即成粉可證誤吞鐵骨等物一誤吞鐵骨等物腸中不能轉送覺墜者多食青菜豬油則送入大腸與糞同出甚效誤吞黃金一誤吞黃金昔江應宿治一王姓者因事犯鹽院驚懼自吞黃金一二錢心中憒憒無可奈何少頃已獲正犯其事遂平因欲求生遍治不效迎宿視之四肢厥冷六脈沉伏計無所出沈思銀工熔金必用硼砂硼砂制金故也急市硼砂四錢為末米粥分二次服下少頃煎承氣湯服利下硼砂裹金從大便而出或誤服金屑未死者用鴨血灌之可活誤吞鐵釘一誤吞鐵釘昔張景嶽先生治一王氏子甫周歲其母以鐵釘與之玩弄不覺納之口中吞入喉間其父號呼求救先生往視之但見其母倒提兒足以冀其出口鼻皆血危劇之甚先生曉之曰豈有倒懸可以出釘而能無傷命哉因速令抱正遂聞啼聲乃釘已下咽不在喉矣其父曰嬌嫩之臟安能堪此先生因其哀求之切不能不允故以慰之然計無從出而逼索方藥頃刻再四只得靜坐齊頭潛思熟計亦無所得乃取本草一玩覬啓其機見所載云針畏朴硝逐悟得一方用活磁石一錢朴硝二錢並研為末付其父令以熬熟豬油加蜜和調藥末與之食於申未之頃盡吞之至次早其父匍匐階前曰昨於三鼓忽解下一物大如芋子瑩如蓴菜潤滑無稜藥護其外撥而視之則釘在其中矣乃京中釘鞋所用蘑菰釘也蓋硝非磁石不能使藥附釘磁石非硝不能逐釘速出非油則無以潤非蜜則未必吞合是四者則著者著逐者逐潤者潤同功合力裹護而出矣誤吞銀一誤吞銀用韭菜一把入滾水略煮不切斷淡食之少頃菜抱銀嘔出或從大便出誤吞釣鉤一誤吞釣鉤昔有漁人誤吞釣鉤劉遵導令溶蠟為丸以線灌下鉤鋭入臘即曳而出誤吞水蛭一誤吞水蛭即螞蝗水蛭入腹經停日久復生水蛭吮呷精血令人面目肌肉黃瘦每飲食下咽少時腹中攢攻且癢且痛不可忍不治必死用田中泥一塊小死魚三個同豬膏熔搗勻再用巴豆十粒去油淨同魚膏四味搗勻丸如緑豆大用田中泥水空心吞下大人五七丸小兒三丸須臾泄下蛭盡用八珍湯調理誤吞蜈蚣一誤吞蜈蚣昔有婢用火筒吹火不知內有蜈蚣向火一吹蜈蚣驚竄入口不覺下喉求救人無措手適有人云取小雞一隻斷喉取血頓飲之復灌以香油取吐蜈蚣隨出又金莊一農夫夏晝臥地熟寐間蜈蚣入其口既寤喉中介介然如梗狀咯不能出咽不能下痛癢不定甚為苦楚一醫用雞卵打破入酒調勻頓服仍以大黃為末和麻油飲之頃刻泄下蜈蚣尚活蓋蜈蚣被卵拘攣其足不能舒動以利藥下之故從大便而出且雞性好食蜈蚣亦取相制之義也承氣湯大黃厚朴去皮炙枳實炙上藥煎頓服八珍湯通用二十五
