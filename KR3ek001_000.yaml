front:
  text: 序士人讀書明理期於世有所濟立功名以見重當時此體用兼備之學也若學成理明無意立名而慈祥之念無時無地不期於濟世此其品詣不又加人一等乎哉余觀倫聲許生外科證治一書而有感焉倫聲少嗜學經史而外旁及諸子百家一名一藝之微手披目覽各有所得山居數十年怡然自樂不肯以學自炫間因良善之家式微為之指示趨吉修方或嬰孩疾痛時醫束手為之施送藥餌無不速效人始奇之由是名噪於士大夫間延訪遂衆辭之不獲已擇近地大山水處始一命駕人與之款洽言皆經濟文章絶不及他事庚寅春余遇於皖江郡城年逾八十白髮蕭疏神明弗衰非學養之醇耶嗣余權篆蕪關通尺素書邀其掉扁舟冒雪而來圍爐談論競日叩其生平閲歷如郡縣學宮添建文峰高閣不周歲而人文蔚發是何神速倫聲則謙未遑謂吉凶皆盈虛消長自然道理一有走避必乾造物之忌若乃勝地名區善人多則吉祥自生趨吉之説皆事之適然相合非盡關人力也其言似謙其實有至理存焉臨別檢行篋余見有外科證治一書則續成其故友畢蒼霖未競之業其部首分別陰陽證治其卷末並列急治五條共書五卷自記甚悉余益嘆其品學之優也書成不獨擅其美必推善於創始之良友其所分門列類者皆二十餘年曆試活人無算之實學非借著書立説以求聲譽者比余將遠別數千裡外此書若仍攜歸恐久而失傳為借抄副本付剞劂以質世之精醫理者雖曰小道亦足見倫聲所學之緒餘與濟人之素心云爾生名克昌和州國學生倫聲其字也時道光歲次辛卯夏月督榷使者雲夢程懷璟書於上海榷署序有學問之醫有閲歷之醫外科古有專業無專書故閲歷為尤切漢唐作家十數然多亡佚無徵今其理則具於靈樞素問其病名治要則莫先於病源莫精於千金莫詳於外臺顧閎深奧衍未易通曉且時異事殊即方藥所載或至貴而驟不可得或甚賤而莫識其名是以精而用之者益鮮自後源流不一治遂多歧其專門名家大率由閲歷而進之學問者也近世外科證治一書不為高論一以陰陽虛實為之端法期簡要方必中和深有取於王氏全生集而刪繁補缺幾於明備覽之而得其歸用之而有其效視他書徒炫名目侈陳古義或不甚切於日用者有間夫自武進曹畸庵有瘍醫雅言之述千金外臺將可以復明於世獨於宋後諸家等之自檜以下今以此書為碻矢則學問即閲歷閲歷亦學問溯流窮源庶無遺憾耳謹識其大概以諗世之篤嗜斯道者同治乙丑冬孝感屠仁守書於成都寓齋
