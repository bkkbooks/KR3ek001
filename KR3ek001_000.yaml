body:
  text: 自記昌性好醫少時誦讀之暇訪求名醫著述見外證與小兒痘證兩門生死反掌非比內證尚可延遲待治聞東臺周舒軒先生精醫術昌往從學焉十餘年深究精思稍知梗概繼得鄭西賓痘證必讀雖集腋成裘而分門析類瞭如指掌又得前明耿仁齋麻科明鏡遺稿惜乎殘缺過半昌為之增著刪繁分列四篇便於習學二書皆梓行於世第外證一書汗牛充棟偏執者多適中者寡有同人畢蒼霖者著外科證治闡發透徹於外證大有裨益蒼霖甫著兩卷年未三十而卒書成廢帙昌雖不敏廣集諸名家外科考證訪求效方立癰疽就簡於各證部之首分別陰陽臟腑經絡認證醫治歷試二十餘年診視送藥無不獲效四遠就醫者歲無虛日又增內景外因奇證蠱證中毒五條並立應驗藥方附於書末以備急用共成五卷非敢問世聊以備遺忘耳許克昌自識重刻外科證治辨言一此書創刻於吾鄉程玉農廉訪垂今三十餘年未見別本將來流傳必且益少蜀中同官諸君子相與醵資重刻誠為快舉一蜀中論外科推王氏全生集為善本此書於全生集採托尤備於其所不備者又皆大備故此書較全生集有過之無不及也一此書初刻體例多未畫一舛錯尤甚茲刻屬知醫者再三讎校凡是正二百餘條仍間有誤文實因無可勘據不若姑闕疑以傳疑一此書引用各家皆未注明來歷系是隨時甄録意在得瘥而止茲刻亦不及遍考識者詳之一附刻全生集醫案因與此書足相印證參閲良便一此書不及丹藥茲得瘍醫雅言丹藥方簡明切要録附於後以成完璧其意詳見識語中同治丁卯仲春月京山易崇階倥侗氏書凡例一是書逐證措治條分部款甚詳其有證治同而部位名異者因癰疽就簡於各部之首辨明紅白陰陽按癰疽治法便於查閲萬無一失一凡有方而僅治某證者則列於某證之後有方而通治諸證者則另立通用方類逐方排著不致雜亂其用藥分量俱備庶無臨證乖方之誤一人身臟腑陰陽各具形義經絡部位各分攸司猶兵家之地利也不知地利不可以為軍師不知臟腑經絡而克得為醫師乎歷來諸書經絡歌括文句參差聯章成誦辨晰為難今閲陳見飛先生小集中有外至頭目以至足內自心肝脾肺腎以及六腑筋脈景説次第成列良為盡善爰採以分列各部為學者便以因證參閲也一五善七惡歌是書本不欲取蓋癰疽之初不過營氣壅遏衛氣鬱滯致成瘡腫因其勢而利導之皆屬善全何惡之有逮其日久潰腐或陰陽誤治或氣血衰羸則七惡蜂起斯時反惡歸善回天之力不可謂非醫家之責也茲録二歌者一以畏矯古之譏一以備吉凶之鑑耳願世之醫家勿以現有惡象盡諉不治苟有一線可挽當參酌援之更以內科脈理詳審之庶不愧為仁術一世人以升降藥為外科拔膿之要藥殊不知升降藥乃鹽礬砂汞火力鍛鍊而成藥之霸道者也去瘀生新或有賴焉若證患日久氣血本已虛虧豈可任用霸劑必補氣血為主禁痛禁爛全生集中已切言之焉可忽諸凡外證之初起者消之痛癢者止之潰爛者斂之臨危者救之去瘀用平安餅針頭散生新用象皮散六和散獲效奏功百無一誤是知升降藥雖有益而亦有損也故二方不入選用一各部癰疽證治分別陰陽言語每多重贅恐人偶一認錯為害不淺學者詳之一罕見罕聞之奇疾醫書亦不可缺載其按部位而患者分列部位其患無定處共集一類又如血擁號蟲等類者茲更集奇病怪蟲兩門冀或偶有是病便於醫治一方藥所當炮製者須按本草照法精製不可忽略如制番木鱉等與本草稍異另附列製法於後一惡蟲證中有蟲證皆稟陰陽不和濕熱毒生凡有蟲傷則於蟲傷門尋類推治一中毒類似與外科無涉要知醫乃仁術何在非救人之道即飲食藥餌亦有中其毒者待及求方問藥人命休矣故亦録附卷後且可為養生者知所慎防云耳一是書採集群書並經親見獲效其間折衷萃輯五易稿而始成癰疽證治皆所親驗苟依方修合認證用藥洵使窮荒僻壤咸慶生全識者當不以鄙言為狂僭也
